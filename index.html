let lastSaveTime = 0;

// Load from Firebase on startup
async function loadFromFirebase() {
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) {
      const fbData = snap.data();
      if (fbData.inventory) {
        D = fbData;
        ensureFields(); if(typeof syncCrackList==="function") syncCrackList();
      }
    }
    firebaseReady = true;
    render();
    showToast('🔄 Connected — data synced from cloud');
  } catch(e) {
    console.error('Firebase load error:', e);
    firebaseReady = true;
    render();
    showToast('⚠️ Offline mode — using local data');
  }
}

// Save to Firebase (debounced)
async function saveToFirebase() {
  if (saving) { pendingSave = true; return; }
  const now = Date.now();
  if (now - lastSaveTime < 1000) {
    pendingSave = true;
    setTimeout(() => { pendingSave = false; saveToFirebase(); }, 1000);
    return;
  }
  saving = true;
  lastSaveTime = now;
  try {
    await setDoc(DOC_REF, JSON.parse(JSON.stringify(D)));
  } catch(e) {
    console.error('Firebase save error:', e);
  }
  saving = false;
  if (pendingSave) { pendingSave = false; saveToFirebase(); }
}

// Real-time listener — updates when partner makes changes
onSnapshot(DOC_REF, (snap) => {
  if (!snap.exists() || saving) return;
  const fbData = snap.data();
  if (fbData && fbData.inventory) {
    D = fbData;
    ensureFields(); if(typeof syncCrackList==="function") syncCrackList();
    render();
  }
});

// METRICS
// ============================================================
function M() {
  const inv=D.inventory,sales=D.sales,exp=D.expenses,gr=D.grading;
  const active=inv.filter(c=>c.status!=='Sold');
  const tSale=sales.reduce((s,r)=>s+num(r.salePrice),0);
  const tPlatFee=sales.reduce((s,r)=>s+num(r.platformFee),0);
  const tConFee=sales.reduce((s,r)=>s+num(r.consignFee),0);
  const tShip=sales.reduce((s,r)=>s+num(r.shipCost),0);
  const tCOGS=sales.reduce((s,r)=>s+num(r.costBasis),0);
  const netRev=tSale-tPlatFee-tConFee-tShip;
  const tGrade=gr.reduce((s,r)=>s+num(r.totalCost),0);
  const gross=netRev-tCOGS-tGrade;
  const tExp=exp.reduce((s,r)=>s+num(r.amount),0);
  const net=gross-tExp;
  const gm=tSale?gross/tSale:0;
  const nm=tSale?net/tSale:0;
  const sc=sales.length;
  const avgP=sc?gross/sc:0;
  const invCost=active.reduce((s,r)=>s+num(r.costBasis)+num(r.gradingCost),0);
  const invMkt=active.reduce((s,r)=>s+num(r.marketValue),0);
  const statusCounts={};
  active.forEach(c=>{const st=c.status||'Unknown';statusCounts[st]=(statusCounts[st]||0)+1;});
  const byPlat={};
  sales.forEach(r=>{const p=r.platform||'Other';if(!byPlat[p])byPlat[p]={rev:0,prof:0,cnt:0};byPlat[p].rev+=num(r.salePrice);byPlat[p].prof+=num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);byPlat[p].cnt++;});
  const invByType={};
  active.forEach(r=>{const t=r.cardType||'Other';invByType[t]=(invByType[t]||0)+1;});
  const monthly={};
  sales.forEach(r=>{const m2=(r.date||'').slice(0,7);if(!m2)return;if(!monthly[m2])monthly[m2]={rev:0,prof:0};monthly[m2].rev+=num(r.salePrice);monthly[m2].prof+=num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);});
  const expByCat={};
  exp.forEach(r=>{const c=r.category||'Other';expByCat[c]=(expByCat[c]||0)+num(r.amount);});
  const gradData=gr.map(r=>({name:(r.cardName||'').slice(0,16),fee:num(r.totalCost),pre:num(r.preValue),post:num(r.postValue),va:num(r.postValue)-num(r.preValue)-num(r.totalCost)})).filter(r=>r.name);
  const cap=D.capital||[];
  const sett=D.settings||{};
  const totalContributions=cap.filter(r=>r.type==='Contribution').reduce((s,r)=>s+num(r.amount),0);
  const totalDraws=cap.filter(r=>r.type==='Draw').reduce((s,r)=>s+num(r.amount),0);
  const startingCash=num(sett.startingCash);
  const otherAssets=num(sett.suppliesInventory)+num(sett.equipment)+num(sett.otherAssets);
  // Auto-calculate unpaid grading fees (submissions not yet returned)
  const unpaidGrading=gr.filter(r=>!r.dateReturned).reduce((s,r)=>s+num(r.totalCost),0);
  const totalLiabilities=num(sett.accountsPayable)+unpaidGrading+num(sett.salesTaxOwed)+num(sett.creditCardBal);
  const tPurchases=D.purchases.reduce((s,r)=>s+num(r.grandTotal||num(r.qty)*num(r.unitCost)+num(r.shipping)+num(r.tax)),0);
  const paidGrading=gr.filter(r=>r.dateReturned).reduce((s,r)=>s+num(r.totalCost),0);
  // Cash = Starting Cash + Contributions - Draws + Sales Revenue - All Fees - Purchases - Expenses - All Grading Fees
  const cashBalance=startingCash+totalContributions-totalDraws+tSale-tPlatFee-tConFee-tShip-tPurchases-tExp-paidGrading-unpaidGrading;
  // For the balance sheet, Total Equity = Contributions + Retained Earnings - Draws
  // Total Assets should = Total Liabilities + Total Equity
  // We show cash, inventory, and other assets separately, but note the balance sheet
  // may not perfectly balance if purchase totals don't match inventory cost basis assignments
  const totalAssets=cashBalance+invCost+otherAssets;
  const totalEquity=startingCash+totalContributions-totalDraws+net;
  const balanceCheck=totalAssets-totalLiabilities-totalEquity;
  const totalInvested = startingCash + totalContributions + tPurchases;
  const bizROI = totalInvested ? net / totalInvested : 0;
  return {tSale,netRev,tCOGS,gross,tExp,net,gm,nm,sc,avgP,invCost,invMkt,ac:active.length,statusCounts,byPlat,invByType,monthly,expByCat,gradData,tPlatFee,tConFee,tShip,tGrade,gc:gr.length,totalContributions,totalDraws,startingCash,otherAssets,totalLiabilities,sett,totalInvested,bizROI,cashBalance,unpaidGrading,tPurchases,paidGrading,totalAssets,totalEquity,balanceCheck};
}

      <div class="mc" style="border-left-color:${m.net>=0?'var(--green)':'var(--red)'}"><div class="lbl">Net Income</div><div class="val ${m.net>=0?'pos':'neg'}">${fmt(m.net)}</div><div class="sub" style="color:var(--text-dim)">After ${fmt(m.tExp)} expenses</div></div>
      <div class="mc" style="border-left-color:var(--yellow)"><div class="lbl">Avg Profit/Card</div><div class="val">${fmtD(m.avgP)}</div></div>
      <div class="mc" style="border-left-color:var(--purple)"><div class="lbl">Inventory (Cost)</div><div class="val">${fmt(m.invCost)}</div><div class="sub" style="color:var(--text-dim)">${m.ac} cards</div></div>
      <div class="mc" style="border-left-color:var(--cyan)"><div class="lbl">Inventory (Market)</div><div class="val">${fmt(m.invMkt)}</div><div class="sub" style="color:${m.invMkt>m.invCost?'var(--green)':'var(--red)'}">${m.invMkt>m.invCost?'+':''}${fmt(m.invMkt-m.invCost)} unrealized</div></div>

      <div class="mc" style="border-left-color:${m.bizROI>=0?'var(--green)':'var(--red)'}"><div class="lbl">Business ROI</div><div class="val ${m.bizROI>=0?'pos':'neg'}">${m.totalInvested?pct(m.bizROI):'—'}</div><div class="sub" style="color:var(--text-dim)">Net income ÷ total invested</div></div>
    </div>

function renderCharts(m) {
  destroyCharts();
  const p=Object.keys(m.byPlat);
  if(p.length){charts.c1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:p,datasets:[{label:'Revenue',data:p.map(x=>m.byPlat[x].rev),backgroundColor:'#4E7CFF',borderRadius:6},{label:'Profit',data:p.map(x=>m.byPlat[x].prof),backgroundColor:'#00D68F',borderRadius:6}]},options:cOpts()});}
  const st=Object.keys(m.statusCounts);
  const sc2={Raw:'#FFBE0B',Submitted:'#A855F7',Graded:'#4E7CFF',Listed:'#06D6A0',Hold:'#7878A0',Cracked:'#FF4757',Sold:'#00D68F'};
  if(st.length){charts.c2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:st,datasets:[{data:st.map(s=>m.statusCounts[s]),backgroundColor:st.map(s=>sc2[s]||'#7878A0'),borderWidth:0}]},options:pOpts()});}
  const mo=Object.keys(m.monthly).sort();
  if(mo.length){charts.c3=new Chart(document.getElementById('ch3'),{type:'line',data:{labels:mo,datasets:[{label:'Revenue',data:mo.map(x=>m.monthly[x].rev),borderColor:'#4E7CFF',backgroundColor:'#4E7CFF22',fill:true,tension:.3},{label:'Profit',data:mo.map(x=>m.monthly[x].prof),borderColor:'#00D68F',backgroundColor:'#00D68F22',fill:true,tension:.3}]},options:cOpts()});}
  const ty=Object.keys(m.invByType);
  const tc=['#FF3366','#4E7CFF','#00D68F','#FFBE0B','#A855F7','#06D6A0'];
  if(ty.length){charts.c4=new Chart(document.getElementById('ch4'),{type:'doughnut',data:{labels:ty,datasets:[{data:ty.map(t=>m.invByType[t]),backgroundColor:tc,borderWidth:0}]},options:pOpts()});}
  const gd=m.gradData;
  if(gd.length){
    const gdSorted=[...gd].filter(g=>g.post>0).sort((a,b)=>b.va-a.va);
    const top10=gdSorted.slice(0,10);
    const top10va=[...gd].filter(g=>g.post>0).sort((a,b)=>(b.post-b.pre)-(a.post-a.pre)).slice(0,10);
    if(top10.length){
    charts.c5=new Chart(document.getElementById('ch5'),{type:'bar',data:{labels:top10.map(g=>g.name),datasets:[{label:'Grading Fee',data:top10.map(g=>g.fee),backgroundColor:'#FF3366',borderRadius:6},{label:'Net Value Added',data:top10.map(g=>g.va),backgroundColor:top10.map(g=>g.va>=0?'#00D68F':'#FF4757'),borderRadius:6}]},options:{...cOpts(),indexAxis:'y',scales:{x:{ticks:{color:'#7878A0',font:{family:'JetBrains Mono',size:9},callback:v=>'$'+v.toLocaleString()},grid:{color:'#252545'},border:{display:false}},y:{ticks:{color:'#E4E4F0',font:{family:'DM Sans',size:11}},grid:{display:false},border:{display:false}}}}});
    }
    if(top10va.length){
    charts.c6=new Chart(document.getElementById('ch6'),{type:'bar',data:{labels:top10va.map(g=>g.name),datasets:[{label:'Pre-Grade Value',data:top10va.map(g=>g.pre),backgroundColor:'#4E7CFF44',borderColor:'#4E7CFF',borderWidth:1,borderRadius:6},{label:'Post-Grade Value',data:top10va.map(g=>g.post),backgroundColor:'#00D68F44',borderColor:'#00D68F',borderWidth:1,borderRadius:6}]},options:cOpts()});
    }
  }
}

// ============================================================
// TABLE ROW RENDERER (avoids deeply nested template literals)
// ============================================================
function renderTableRow(type, row, i, s) {
  let html = '<tr';
  // Highlight selected grading cards
  if (type === 'inventory' && window.gradingSelectMode && window.gradingSelectedCards.has(i)) {
    html += ' style="background:rgba(168,85,247,.08)"';
  }
  html += '>';
  
  // Grading checkbox column
  if (type === 'inventory' && window.gradingSelectMode) {
    const isEligible = row.status !== 'Sold' && row.status !== 'Submitted' && row.status !== 'Graded';
    const isChecked = window.gradingSelectedCards.has(i);
    if (isEligible) {
      html += '<td style="text-align:center"><input type="checkbox" ' + (isChecked ? 'checked' : '') + ' onchange="toggleGradingCard(' + i + ')" style="width:18px;height:18px;cursor:pointer;accent-color:var(--purple)"></td>';
    } else {
      html += '<td style="text-align:center"><span style="color:var(--text-faint);font-size:10px" title="' + (row.status || '') + '">—</span></td>';
    }
  }
  
  // Data columns
  s.cols.forEach(function(c) {
    const val = c.render ? c.render(row[c.k], row) : (row[c.k] || '');
    html += '<td' + (c.r ? ' class="r mono"' : '') + '>' + val + '</td>';
  });
  
  // Action column
  html += '<td class="r">';
  if (type === 'inventory') {
    html += '<select class="quick-status" onchange="quickStatus(' + i + ',this.value)" title="Quick status change"><option value="">⚡</option>';
    ['Raw','Submitted','Graded','Listed','Sold','Hold','Cracked'].forEach(function(st) {
      html += '<option value="' + st + '"' + (row.status === st ? ' disabled' : '') + '>' + st + '</option>';
    });
    html += '</select> ';
  }
  html += '<button class="btn btn-sm" onclick="openEdit(\'' + type + '\',' + i + ')">✏️</button> ';
  html += '<button class="btn btn-sm btn-danger" onclick="if(confirm(\'Delete?\'))delRow(\'' + type + '\',' + i + ')">🗑</button>';
  html += '</td></tr>';
  return html;
}

function rTable(type,m) {
  const s=SCHEMAS[type];let data=D[type];
  const addBtn=`<button class="btn btn-accent btn-sm" onclick="openAdd('${type}')">${s.addLabel}</button>`;
  const quickAddBtn=type==='inventory'?` <button class="btn btn-sm" style="background:var(--blue);color:#fff" onclick="openQuickEntry()">⚡ Quick Add</button>${window.ebayState.appId?` <button class="btn btn-sm" onclick="refreshAllMarketValues()">💰 Refresh Prices</button>`:''} <button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="startGradingSelect()">📦 Select for Grading</button>`
    :type==='sales'?` <button class="btn btn-sm" style="background:var(--blue);color:#fff" onclick="openQuickSales()">⚡ Quick Log</button>`:'';
  // Apply search and sort
  const filtered = filterData(data, type);
  const sorted = sortData(filtered, s.cols);
  // Build original index map so edit/delete still work on the right record
  const idxMap = sorted.map(row => data.indexOf(row));

  const searchBar = `<div class="search-bar"><input type="text" placeholder="🔍 Search ${s.title.toLowerCase()}..." value="${window.searchTerm}" oninput="setSearch(this.value)" class="search-input">${window.searchTerm?'<button class="btn btn-sm" onclick="clearSearch()" style="margin-left:6px">✕ Clear</button>':''}<span class="search-count">${window.searchTerm?`${sorted.length} of ${data.length}`:''}</span></div>`;

  // Show quick entry mode if active
  if(type==='inventory' && window.quickEntryMode) return rQuickEntry(data, addBtn, quickAddBtn);
  if(type==='sales' && window.quickSalesMode) return rQuickSales(data, addBtn, quickAddBtn);

  if(!data.length) return `<div class="panel"><h3>${s.title} ${addBtn}${quickAddBtn}</h3><div class="empty"><div class="icon">📋</div>No ${type} records yet. Click "${s.addLabel}" to get started.</div></div>`;

  // Grading select mode toolbar for inventory
  const gradingToolbar = (type==='inventory' && window.gradingSelectMode) ? `
    <div style="background:var(--purple);background:linear-gradient(135deg,rgba(168,85,247,.15),rgba(78,124,255,.1));border:1px solid var(--purple);border-radius:var(--radius-sm);padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;animation:fadeUp .3s ease">
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:20px">📦</span>
        <div>
          <div style="font-weight:700;font-size:13px;color:var(--text)">PSA Grading Submission</div>
          <div style="font-size:11px;color:var(--text-dim)">${window.gradingSelectedCards.size} card${window.gradingSelectedCards.size!==1?'s':''} selected</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
        <label style="font-size:11px;color:var(--text-dim);white-space:nowrap">Declared Value ($)</label>
        <input type="number" id="grading_declared_value" class="search-input" style="width:100px;font-size:12px" step="0.01" placeholder="e.g. 50" value="${window.gradingDeclaredValue}" oninput="window.gradingDeclaredValue=this.value">
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="gradingSelectAll()" style="font-size:11px">☑ Select All</button>
        <button class="btn btn-sm" onclick="gradingDeselectAll()" style="font-size:11px">☐ Deselect All</button>
        <button class="btn btn-accent btn-sm" onclick="generatePSASubmission()" style="font-size:11px" ${window.gradingSelectedCards.size===0?'disabled':''}>📋 Generate PSA Submission</button>
        <button class="btn btn-sm" onclick="cancelGradingSelect()" style="font-size:11px">✕ Cancel</button>
      </div>
    </div>` : '';

  return `<div class="panel"><h3><span>${s.title}</span><span class="right">${addBtn}${quickAddBtn}</span></h3>
    ${gradingToolbar}
    ${searchBar}
    <table><thead><tr>${type==='inventory'&&window.gradingSelectMode?'<th style="width:36px"></th>':''}${s.cols.map(c=>`<th class="${c.r?'r ':''}sortable${window.sortCol===c.k?' sorted':''}" onclick="toggleSort('${c.k}')">${c.l}${window.sortCol===c.k?(window.sortDir==='asc'?' ↑':' ↓'):''}</th>`).join('')}<th style="width:${type==='inventory'?'100':'70'}px"></th></tr></thead>
    <tbody>${sorted.length?sorted.map((row,si)=>{const i=idxMap[si];return renderTableRow(type,row,i,s);}).join(''):`<tr><td colspan="${s.cols.length+1+(type==='inventory'&&window.gradingSelectMode?1:0)}" style="text-align:center;padding:20px;color:var(--text-dim)">No results matching "${window.searchTerm}"</td></tr>`}
    </tbody></table></div>`;
}

window.saveSetting = function(key, value) {
  if(!D.settings) D.settings={};
  D.settings[key]=parseFloat(value)||0;

};

window.saveModal = async function() {
  const s=SCHEMAS[window.modal.type];
  const row=window.modal.mode==='edit'?{...window.modal.data}:{};
  s.fields.forEach(f=>{
    if(f.type==='cardpicker'){
      const el=document.getElementById('f_cardpicker');
      if(el) row.cardName=el.value;
    } else if(f.type==='pokemonsearch'){
      const hidden=document.getElementById('f_cardName');
      const search=document.getElementById('f_pokemon_search');
      if(hidden && hidden.value) row.cardName=hidden.value;
      else if(search && search.value) row.cardName=search.value;
      if(window.modal.data._pokemonImg) row._pokemonImg=window.modal.data._pokemonImg;
      if(window.modal.data._pokemonSetId) row._pokemonSetId=window.modal.data._pokemonSetId;
      if(window.modal.data._pokemonNumber) row._pokemonNumber=window.modal.data._pokemonNumber;
      if(window.modal.data._tcgdexId) row._tcgdexId=window.modal.data._tcgdexId;
    } else {
      const el=document.getElementById('f_'+f.k);
      if(el)row[f.k]=f.type==='number'?parseFloat(el.value)||0:el.value;
    }
  });
  if(s.onSave)s.onSave(row);
  // Preserve linked data not in form fields (only for sales with linked inventory cards)
  if(window.modal.type==='sales' && window.modal.data._linkedInvIdx !== undefined){
    if(window.modal.data.gradingCompany) row.gradingCompany = window.modal.data.gradingCompany;
    if(window.modal.data.grade) row.grade = window.modal.data.grade;
  }
  
  // Auto-fetch eBay market value for inventory adds if no market value set
  if(window.modal.type==='inventory' && window.modal.mode==='add' && !num(row.marketValue) && row.cardName && window.ebayState.appId) {
    try {
      showToast('Fetching eBay price...');
      const query = `${row.cardName} -PSA -CGC -BGS -SGC -graded -slab`.trim();
      const results = await ebaySearch(query, 15);
      const summary = ebayPricingSummary(results);
      if (summary && summary.median) {
        row.marketValue = Number(summary.median.toFixed(2));
        showToast(`Market value set: $${row.marketValue} (eBay median)`);
      }
    } catch(e) { /* continue without pricing */ }
  }
  
  if(window.modal.mode==='add'){
    row.id=nextId(s.idPrefix);D[window.modal.type].push(row);
    // Auto-update inventory card status when linked
    if(window.modal.data._linkedInvIdx !== undefined){
      const card = D.inventory[window.modal.data._linkedInvIdx];
      if(card && card.status !== 'Sold'){
        const oldStatus = card.status;
        if(window.modal.type==='grading'){
          card.status = 'Submitted';
          showToast(`${card.cardName}: ${oldStatus} → Submitted`);
        } else if(window.modal.type==='sales'){
          card.status = 'Sold';
          showToast(`${card.cardName}: ${oldStatus} → Sold`);
        }
      }
    }
    showToast(`Record added & synced`);
  }
  else{
    D[window.modal.type][window.editIdx]=row;
    // Auto-update inventory when grading entry is edited with return date and grade
    if(window.modal.type==='grading' && row.cardId && row.dateReturned && row.gradeReceived){
      const card = D.inventory.find(c => c.id === row.cardId);
      if(card && (card.status === 'Submitted' || card.status === 'Raw')){
        card.status = 'Graded';
        card.grade = row.gradeReceived;
        card.gradingCost = num(row.totalCost);
        card.gradingCompany = row.company || '';
        if(num(row.postValue)) card.marketValue = num(row.postValue);
        showToast(`${card.cardName}: → Graded (${card.grade})`);
      }
    }
    showToast('Record updated & synced');
  }
  saveData();window.modal=null;render();
};

window.delRow = function(type,idx) { D[type].splice(idx,1); saveData(); showToast('Record deleted & synced'); render(); };

// Refresh all inventory market values from eBay
window.refreshAllMarketValues = async function() {
  if (!window.ebayState.appId) { showToast('Set eBay keys in Scanner tab first'); return; }
  const unsold = D.inventory.filter(c => c.status !== 'Sold');
  if (!unsold.length) { showToast('No active inventory to refresh'); return; }
  if (!confirm(`Refresh market values for ${unsold.length} cards? This will make multiple eBay API calls and may take a minute.`)) return;
  
  let updated = 0, failed = 0;
  showToast(`Refreshing prices for ${unsold.length} cards...`);
  
  for (let i = 0; i < unsold.length; i++) {
    const card = unsold[i];
    if (!card.cardName) { failed++; continue; }
    
    try {
      let query = '';
      const hasGrade = card.grade && card.gradingCompany;
      
      if (hasGrade) {
        // Graded card — search with grade
        const company = card.gradingCompany.toUpperCase();
        let gradeStr = card.grade;
        
        // Handle CGC Pristine (stored as 10.1)
        if (company === 'CGC' && (gradeStr === '10.1' || gradeStr === '11')) {
          query = `${card.cardName} CGC Pristine 10`;
        } else {
          query = `${card.cardName} ${company} ${gradeStr}`;
        }
      } else {
        // Raw card — exclude graded terms
        query = `${card.cardName} -PSA -CGC -BGS -SGC -graded -slab`;
      }
      
      const results = await ebaySearch(query.trim(), 15);
      const summary = ebayPricingSummary(results);
      
      if (summary && summary.median) {
        card.marketValue = Number(summary.median.toFixed(2));
        updated++;
      } else {
        failed++;
      }
      
      // Update progress every 5 cards
      if ((i + 1) % 5 === 0) {
        showToast(`Progress: ${i + 1}/${unsold.length} cards...`);
        render();
      }
      
      // Small delay to avoid rate limiting
      await new Promise(r => setTimeout(r, 300));
      
    } catch(e) {
      failed++;
    }
  }
  
  saveData();
  render();
  showToast(`Done! ${updated} prices updated, ${failed} couldn't be found`);
};

// Pokemon search for Quick Add
let qePokemonTimers = {};
window.qePokemonSearch = function(rowIdx, val) {
  clearTimeout(qePokemonTimers[rowIdx]);
  const resultsEl = document.getElementById('qe-pokemon-'+rowIdx);
  if (!resultsEl) return;
  if (!val || val.length < 2) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
  qePokemonTimers[rowIdx] = setTimeout(async () => {
    try {
      let url;
      const val_lower = val.toLowerCase().trim();
      const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
      let setFilter = '', nameFilter = val;
      for (const setKw of setKeywords) {
        if (val_lower.startsWith(setKw + ' ') || val_lower === setKw) { setFilter = setKw; nameFilter = val.slice(setKw.length).trim(); break; }
      }
      let params = [];
      if (setFilter) params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
      const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
      if (remainingNumMatch) {
        if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
        params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
      } else if (nameFilter) {
        params.push(`name=like:${encodeURIComponent(nameFilter)}`);
      }
      params.push('pagination:itemsPerPage=6');
      url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
      const resp = await fetch(url);
      if (!resp.ok) return;
      const cards = await resp.json();
      if (!cards.length) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
      // Fetch details for set info
      const details = await Promise.all(cards.slice(0,6).map(async c => {
        try {
          const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`);
          if (r.ok) return await r.json();
          return c;
        } catch(e) { return c; }
      }));
      resultsEl.style.display = 'block';
      resultsEl.innerHTML = details.map((c, idx) => {
        const setName = c.set ? c.set.name : '';
        const number = c.localId || '';
        const formatted = `${setName} ${c.name||''} #${number}`.trim();
        const img = c.image ? c.image + '/low.webp' : '';
        const tp = c.pricing?.tcgplayer || {};
        const tcgPrice = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice ||
                         tp.holofoil?.marketPrice || tp['1stEditionHolofoil']?.marketPrice ||
                         tp.holo?.midPrice || tp.normal?.midPrice || tp.reverse?.midPrice || '';
        const priceTag = tcgPrice ? ` · <span style="color:var(--green)">$${Number(tcgPrice).toFixed(2)}</span>` : '';
        window._qePokemonResults = window._qePokemonResults || {};
        window._qePokemonResults[rowIdx+'_'+idx] = {formatted, img, tcgPrice, tcgdexId: c.id||''};
        return `<div class="picker-item" style="display:flex;align-items:center;gap:8px;padding:6px 10px" onclick="qeSelectPokemon(${rowIdx},'${rowIdx}_${idx}')">
          ${img?`<img src="${img}" style="width:32px;height:45px;object-fit:contain;border-radius:3px" loading="lazy">`:''}
          <div><div style="font-weight:600;font-size:12px">${formatted}</div><div style="font-size:10px;color:var(--text-dim)">${c.rarity||''}${priceTag}</div></div>
        </div>`;
      }).join('');
    } catch(e) { /* silently fail */ }
  }, 400);
};

let pokemonSearchTimer = null;
window.pokemonSearchDebounce = function(val) {
  clearTimeout(pokemonSearchTimer);
  const statusEl = document.getElementById('pokemon-search-status');
  if (!val || val.length < 3) {
    const resultsEl = document.getElementById('pokemon-search-results');
    if (resultsEl) resultsEl.innerHTML = '';

    return;
  }
  if (statusEl) statusEl.textContent = 'Searching...';
  pokemonSearchTimer = setTimeout(() => pokemonSearch(val), 600);
};

async function pokemonSearch(query) {
  const resultsEl = document.getElementById('pokemon-search-results');
  const statusEl = document.getElementById('pokemon-search-status');
  if (!resultsEl) return;
  try {
    // Smart search: detect patterns like "base set charizard", "charizard 130", "base set charizard 4"
    let url;
    const query_lower = query.toLowerCase().trim();
    
    // Pattern: "name number" (e.g. "charizard 130")
    const nameNumMatch = query.match(/^(.+?)\s+#?(\d+)$/);
    
    // Known set keyword patterns to detect set names in queries
    const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
    
    let setFilter = '';
    let nameFilter = query;
    
    // Check if query starts with a known set name
    for (const setKw of setKeywords) {
      if (query_lower.startsWith(setKw + ' ') || query_lower === setKw) {
        setFilter = setKw;
        nameFilter = query.slice(setKw.length).trim();
        break;
      }
    }
    
    // Build URL with filters
    let params = [];
    if (setFilter) {
      params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
    }
    
    // Check if remaining nameFilter ends with a number
    const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
    if (remainingNumMatch) {
      if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
      params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
    } else if (nameFilter) {
      params.push(`name=like:${encodeURIComponent(nameFilter)}`);
    }
    
    params.push('pagination:itemsPerPage=8');
    url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API status: ' + resp.status);
    const cards = await resp.json();
    if (statusEl) statusEl.textContent = cards.length ? `${cards.length} found` : 'No results';
    if (!cards.length) {
      resultsEl.innerHTML = `<div class="pokemon-no-results">No cards found. Try a different name or set number.<br><span style="font-size:11px">You can also type the name manually and close this.</span></div>`;
      return;
    }
    // Fetch full details for each card to get set info and pricing
    const details = await Promise.all(cards.slice(0,8).map(async c => {
      try {
        const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`);
        if (r.ok) return await r.json();
        return c;
      } catch(e) { return c; }
    }));
    resultsEl.innerHTML = details.map((c, idx) => {
      const setName = c.set ? c.set.name : '';
      const number = c.localId || '';
      const formatted = `${setName} ${c.name||''} #${number}`.trim();
      const img = c.image ? c.image + '/low.webp' : '';
      const rarity = c.rarity || '';
      // Extract TCGPlayer market price - try multiple variant keys
      const tp = c.pricing?.tcgplayer || {};
      const tcgPrice = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice || 
                       tp.holofoil?.marketPrice || tp['1stEditionHolofoil']?.marketPrice ||
                       tp.holo?.midPrice || tp.normal?.midPrice || tp.reverse?.midPrice || '';
      const priceDisplay = tcgPrice ? `<span style="color:var(--green);font-weight:600">$${Number(tcgPrice).toFixed(2)}</span>` : '<span style="color:var(--text-faint)">No price</span>';
      // Store card data for selection
      window._pokemonResults = window._pokemonResults || [];
      window._pokemonResults[idx] = {formatted, img, setName, setId: c.set?c.set.id:'', number, rarity, tcgPrice, tcgdexId: c.id||''};
      return `<div class="pokemon-result" onclick="selectPokemonCard(${idx})">
        ${img?`<img src="${img}" class="pokemon-result-img" loading="lazy">`:'<div class="pokemon-result-img" style="background:var(--bg)"></div>'}
        <div class="pokemon-result-info">
          <div class="pokemon-result-name">${formatted}</div>
          <div class="pokemon-result-meta">${setName} · #${number} · ${rarity||'Unknown'} · ${priceDisplay}</div>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    console.error('Pokemon search error:', err);
    if (statusEl) statusEl.textContent = 'Search failed';
    resultsEl.innerHTML = `<div class="pokemon-no-results">Search error: ${err.message}. Try again or type the name manually.</div>`;
  }
}

window.modalScanHandle = async function(event) {
  const file = event.target.files[0];
  if (!file || !window.modal) return;
  event.target.value = '';
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64DataUrl = e.target.result;
    window.modal.data._scanImg = base64DataUrl;
    window.modal.data._scanStatus = 'Identifying card...';
    render();
    
    try {
      const match = base64DataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
      if (!match) throw new Error('Invalid image format');
      
      // Resize image if too large (mobile photos can be huge)
      let imgData = match[2];
      let mediaType = match[1];
      if (imgData.length > 500000) {
        // Compress by resizing via canvas
        const compressed = await compressImage(base64DataUrl, 800);
        const cMatch = compressed.match(/^data:(image\/\w+);base64,(.+)$/);
        if (cMatch) { mediaType = cMatch[1]; imgData = cMatch[2]; }
      }
      
      const ss = window.scannerState;
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ss.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 500,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: imgData } },
              { type: 'text', text: `Identify this Pokemon trading card. Respond ONLY with a JSON object, no other text or markdown. Use this exact format:
{"name":"Card Name","set":"Set Name","number":"Card Number","edition":"1st Edition or Unlimited or Shadowless or Pre-Release or Promo or empty string if none","rarity":"Rarity","holo":true/false,"cardType":"Pokemon or Trainer or Energy"}
Important: For the number field, use ONLY the card number itself, NOT the set total. For example if the card shows 8/102, return just "8". If it shows 051/193, return just "051". If it shows sv4-6, return just "6".
Check carefully for edition stamps - look for a 1st Edition symbol (circled 1), Pre-Release stamp, Promo star, or Shadowless indicators. Include any special variant in the edition field.
If not a Pokemon card: {"error":"Not a Pokemon card"}` }
            ]
          }]
        })
      });
      
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }
      
      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const cleaned = text.replace(/```json\s*|```/g, '').trim();
      const cardInfo = JSON.parse(cleaned);
      
      if (cardInfo.error) {
        window.modal.data._scanStatus = '❌ ' + cardInfo.error;
        render();
        return;
      }
      
      const setName = cardInfo.set || '';
      const cardName = cardInfo.name || '';
      const number = cardInfo.number || '';
      const edition = cardInfo.edition || '';
      let formatted = `${setName} ${cardName}`.trim();
      if (number) formatted += ` #${number.replace('#','').split('/')[0].trim()}`;
      if (edition && edition !== 'Unlimited' && edition !== '') formatted += ` ${edition}`;
      
      window.modal.data.cardName = formatted;
      window.modal.data.cardType = cardInfo.cardType || 'Pokemon';
      window.modal.data._pokemonRarity = cardInfo.rarity || '';
      window.modal.data._scanStatus = '✅ ' + formatted;
      
      // Instead of auto-picking, trigger search dropdown so user can confirm correct card
      render();
      showToast(`Identified: ${formatted}`);
      
      // Trigger pokemon search with card name + number for user to pick correct match
      setTimeout(() => {
        const searchEl = document.getElementById('f_pokemon_search');
        if (searchEl) {
          const cleanNum = (number||'').replace(/[^\d]/g,'');
          const searchQuery = cleanNum ? `${cardName} ${cleanNum}` : cardName;
          searchEl.value = searchQuery;
          pokemonSearch(searchQuery);
        }
      }, 200);
      
    } catch(err) {
      window.modal.data._scanStatus = '❌ ' + err.message;
      render();
    }
  };
  reader.readAsDataURL(file);
};

// Image compression helper for large mobile photos
async function compressImage(dataUrl, maxWidth) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = dataUrl;
  });
}

window.generatePSASubmission = function() {
  const selected = Array.from(window.gradingSelectedCards).sort((a,b) => a - b);
  if (!selected.length) { showToast('No cards selected'); return; }
  
  const declaredVal = window.gradingDeclaredValue ? parseFloat(window.gradingDeclaredValue) : 0;
  const today = new Date().toISOString().slice(0, 10);
  
  // Build the submission list
  const lines = [];
  const cards = selected.map(idx => D.inventory[idx]).filter(Boolean);
  
  lines.push('PSA GRADING SUBMISSION — ' + today);
  lines.push('═'.repeat(60));
  lines.push('');
  lines.push(padRight('Card Name', 35) + ' | ' + padRight('Set', 25) + ' | ' + padRight('Number', 8) + ' | ' + 'Declared Value');
  lines.push('─'.repeat(35) + ' | ' + '─'.repeat(25) + ' | ' + '─'.repeat(8) + ' | ' + '─'.repeat(14));
  
  cards.forEach(card => {
    // Parse card name: format is typically "SetName CardName #Number"
    const cardName = card.cardName || '';
    let parsedSet = '', parsedName = '', parsedNumber = '';
    
    const numMatch = cardName.match(/^(.+?)\s+#(\S+)\s*(.*)$/);
    if (numMatch) {
      const fullName = numMatch[1].trim();
      parsedNumber = numMatch[2];
      const suffix = numMatch[3] || '';
      
      // Try to split set from card name — last 1-2 words are usually the pokemon name
      const words = fullName.split(/\s+/);
      if (words.length >= 3) {
        // Heuristic: pokemon names are 1-2 words at the end
        // Try finding where the card name starts (capitalize after set pattern)
        parsedName = words.slice(-1).join(' ');
        parsedSet = words.slice(0, -1).join(' ');
      } else if (words.length === 2) {
        parsedSet = words[0];
        parsedName = words[1];
      } else {
        parsedName = fullName;
      }
      if (suffix) parsedName += ' ' + suffix;
    } else {
      parsedName = cardName;
    }
    
    const dv = declaredVal ? '$' + declaredVal.toFixed(2) : (num(card.marketValue) ? '$' + num(card.marketValue).toFixed(2) : '—');
    lines.push(padRight(parsedName || cardName, 35) + ' | ' + padRight(parsedSet, 25) + ' | ' + padRight(parsedNumber, 8) + ' | ' + dv);
  });
  
  lines.push('');
  lines.push('═'.repeat(60));
  lines.push(`Total Cards: ${cards.length}`);
  if (declaredVal) lines.push(`Blanket Declared Value: $${declaredVal.toFixed(2)} per card`);
  lines.push(`Total Declared Value: $${(declaredVal ? declaredVal * cards.length : cards.reduce((s, c) => s + num(c.marketValue), 0)).toFixed(2)}`);
  
  const submissionText = lines.join('\n');
  
  // Create grading entries and update inventory status
  let gradingCount = 0;
  selected.forEach(idx => {
    const card = D.inventory[idx];
    if (!card) return;
    
    // Update inventory card status to Submitted
    const oldStatus = card.status;
    card.status = 'Submitted';
    
    // Create grading entry linked to this inventory card
    const gradingEntry = {
      id: nextId('G'),
      cardName: card.cardName || '',
      cardId: card.id || '',
      company: 'PSA',
      serviceLevel: '',
      dateSubmitted: today,
      dateReturned: '',
      gradingFee: 0,
      shipTo: 0,
      shipBack: 0,
      totalCost: 0,
      preCondition: '',
      gradeReceived: '',
      preValue: declaredVal || num(card.marketValue) || num(card.costBasis) || 0,
      postValue: 0,
      action: 'New Grade',
      notes: 'Auto-created from PSA batch submission'
    };
    D.grading.push(gradingEntry);
    gradingCount++;
  });
  
  saveData();
  
  // Show the submission in a modal for copying
  window.gradingSelectMode = false;
  window.gradingSelectedCards = new Set();
  window.gradingDeclaredValue = '';
  
  // Use a special modal to show the copyable text
  window._psaSubmissionText = submissionText;
  window._psaSubmissionCount = gradingCount;
  render();
  
  // Show submission result modal after render
  setTimeout(() => {
    showPSASubmissionModal(submissionText, gradingCount);
  }, 100);
};

function padRight(str, len) {
  str = String(str || '');
  if (str.length > len) return str.substring(0, len - 1) + '…';
  return str + ' '.repeat(Math.max(0, len - str.length));
}

window.toggleSort = function(col) {
  if (window.sortCol === col) {
    window.sortDir = window.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    window.sortCol = col;
    window.sortDir = 'asc';
  }
  render();
};
window.clearSearch = function() { window.searchTerm = ''; window.sortCol = null; window.sortDir = 'asc'; render(); };

function filterData(data, type) {
  if (!window.searchTerm) return data;
  const term = window.searchTerm.toLowerCase();
  return data.filter(row => {
    return Object.values(row).some(v => String(v).toLowerCase().includes(term));
  });
}

function sortData(data, cols) {
  if (!window.sortCol) return data;
  const col = cols.find(c => c.k === window.sortCol);
  if (!col) return data;
  return [...data].sort((a, b) => {
    let va = a[col.k], vb = b[col.k];
    // For computed columns, compute the value
    if (col.sortVal) { va = col.sortVal(a); vb = col.sortVal(b); }
    else { va = num(va) || va; vb = num(vb) || vb; }
    if (typeof va === 'number' && typeof vb === 'number') {
      return window.sortDir === 'asc' ? va - vb : vb - va;
    }
    return window.sortDir === 'asc' ? String(va||'').localeCompare(String(vb||'')) : String(vb||'').localeCompare(String(va||''));
  });
}

function rAnalytics(m) {
  const sales = D.sales;
  const inv = D.inventory;

  // Top cards by profit
  const salesWithProfit = sales.map(r => {
    const profit = num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);
    const cost = num(r.costBasis);
    const roi = cost ? profit/cost : 0;
    return {...r, _profit: profit, _roi: roi};
  });
  const topProfit = [...salesWithProfit].sort((a,b) => b._profit - a._profit).slice(0,10);
  const topROI = [...salesWithProfit].filter(r => num(r.costBasis) > 0).sort((a,b) => b._roi - a._roi).slice(0,10);
  const worstROI = [...salesWithProfit].filter(r => num(r.costBasis) > 0).sort((a,b) => a._roi - b._roi).slice(0,10);

  // Performance by card name (group duplicates)
  const byName = {};
  salesWithProfit.forEach(r => {
    const name = (r.cardName||'').toLowerCase().trim();
    if (!name) return;
    if (!byName[name]) byName[name] = { name: r.cardName, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0 };
    byName[name].count++;
    byName[name].totalProfit += r._profit;
    byName[name].totalRevenue += num(r.salePrice);
    byName[name].totalCost += num(r.costBasis);
  });
  const namePerf = Object.values(byName).sort((a,b) => b.totalProfit - a.totalProfit);

  // Performance by card type
  const byType = {};
  salesWithProfit.forEach(r => {
    const t = r.cardType || 'Unknown';
    if (!byType[t]) byType[t] = { type: t, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0 };
    byType[t].count++;
    byType[t].totalProfit += r._profit;
    byType[t].totalRevenue += num(r.salePrice);
    byType[t].totalCost += num(r.costBasis);
  });
  const typePerf = Object.values(byType).sort((a,b) => b.totalProfit - a.totalProfit);

  // Performance by platform
  const byPlatPerf = {};
  salesWithProfit.forEach(r => {
    const p = r.platform || 'Unknown';
    if (!byPlatPerf[p]) byPlatPerf[p] = { platform: p, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0, totalFees: 0 };
    byPlatPerf[p].count++;
    byPlatPerf[p].totalProfit += r._profit;
    byPlatPerf[p].totalRevenue += num(r.salePrice);
    byPlatPerf[p].totalCost += num(r.costBasis);
    byPlatPerf[p].totalFees += num(r.platformFee) + num(r.consignFee);
  });
  const platPerf = Object.values(byPlatPerf).sort((a,b) => b.totalProfit - a.totalProfit);

  // Unsold inventory by value (biggest opportunities)
  const unsold = inv.filter(c => c.status !== 'Sold' && num(c.marketValue) > 0).map(c => {
    const cost = num(c.costBasis) + num(c.gradingCost);
    const mv = num(c.marketValue);
    return {...c, _upside: mv - cost, _roi: cost ? (mv-cost)/cost : 0};
  }).sort((a,b) => b._upside - a._upside).slice(0,10);

  if (!sales.length && !inv.length) return '<div class="panel"><div class="empty"><div class="icon">📊</div>Add some inventory and sales data to unlock analytics.</div></div>';

  return `
    <div class="charts-grid">
      <div class="panel">
        <h3 style="color:var(--green)">🏆 Top 10 Most Profitable Sales</h3>
        ${topProfit.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Sale</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${topProfit.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.salePrice))}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono pos"><strong>${fmt(r._profit)}</strong></td><td class="r mono pos">${pct(r._roi)}</td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
      <div class="panel">
        <h3 style="color:var(--accent)">🎯 Top 10 Best ROI Sales</h3>
        ${topROI.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${topROI.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono ${r._profit>=0?'pos':'neg'}">${fmt(r._profit)}</td><td class="r mono ${r._roi>=0?'pos':'neg'}"><strong>${pct(r._roi)}</strong></td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
    </div>
    <div class="charts-grid">
      <div class="panel">
        <h3 style="color:var(--red)">📉 Worst ROI Sales (Learn From These)</h3>
        ${worstROI.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${worstROI.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono ${r._profit>=0?'pos':'neg'}">${fmt(r._profit)}</td><td class="r mono ${r._roi>=0?'pos':'neg'}"><strong>${pct(r._roi)}</strong></td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
      <div class="panel">
        <h3 style="color:var(--cyan)">💎 Biggest Unrealized Upside (Inventory)</h3>
        ${unsold.length?`<table><thead><tr><th>Card</th><th>Status</th><th class="r">Cost</th><th class="r">Market</th><th class="r">Upside</th><th class="r">ROI</th></tr></thead><tbody>

        </tbody></table>`:'<div class="empty">Add market values to inventory to see opportunities</div>'}
      </div>
    </div>
    <div class="charts-grid">
      ${typePerf.length?`<div class="panel">
        <h3 style="color:var(--purple)">🃏 Performance by Card Type</h3>
        <table><thead><tr><th>Type</th><th class="r">Sold</th><th class="r">Revenue</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>

        </tbody></table>
      </div>`:''}
      ${platPerf.length?`<div class="panel">
        <h3 style="color:var(--yellow)">🏪 Performance by Platform</h3>

      </div>`:''}
    </div>`;

    ${rs.crackCandidates.length?`
    <div style="overflow-x:auto">
      <table style="width:100%;border-collapse:collapse;font-size:12px">
        <thead><tr>
          <th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Card</th>
          <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Buy (PSA 8)</th>
          <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">CGC 9</th>
          <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">CGC 10</th>
          <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Best Profit</th>
          <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">ROI</th>
          <th style="padding:6px;border-bottom:1px solid var(--border)"></th>
        </tr></thead>
        <tbody>
          ${rs.crackCandidates.sort((a,b) => b.roi - a.roi).map((c, i) => {
            const feeRate = rs.includeEbayFee ? 0.16 : 0;
            const gradingFee = num(rs.gradingFee) || 20;
            const totalCost = c.buyPrice + gradingFee;
            const cgc9net = c.cgc9 * (1 - feeRate);
            const cgc10net = c.cgc10 * (1 - feeRate);
            const bestNet = Math.max(cgc9net, cgc10net);
            const profit = bestNet - totalCost;
            const roi = totalCost > 0 ? (profit / totalCost) * 100 : 0;
            const isProfit = profit >= 0;
            return `<tr>
              <td style="padding:6px 8px;border-bottom:1px solid var(--border)"><strong>${c.cardName}</strong></td>
              <td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right">$${c.buyPrice.toFixed(2)}</td>
              <td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;color:${cgc9net-totalCost>=0?'var(--green)':'var(--text-dim)'}">$${c.cgc9?c.cgc9.toFixed(2):'—'}</td>
              <td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;color:${cgc10net-totalCost>=0?'var(--green)':'var(--text-dim)'}">$${c.cgc10?c.cgc10.toFixed(2):'—'}</td>
              <td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;font-weight:700;color:${isProfit?'var(--green)':'var(--red)'}">${isProfit?'+':'-'}$${Math.abs(profit).toFixed(2)}</td>
              <td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;color:${isProfit?'var(--green)':'var(--red)'}">${roi.toFixed(0)}%</td>

            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
    `:'<div style="color:var(--text-dim);font-size:12px;text-align:center;padding:12px">Research cards and click "+ Add Current Card" to save to your crack list. Uses PSA 8 price as buy cost and CGC 9/10 as target values from the graded matrix.</div>'}
  </div>`;
}

function rResearchCard(rs) {
  const c = rs.selectedCard;
  const img = c.image ? c.image + '/low.webp' : '';
  const setName = c.set ? c.set.name : '';
  const tp = c.pricing?.tcgplayer || {};
  const cm = c.pricing?.cardmarket || {};
  
  // Collect all available TCGPlayer variant prices
  const variants = [];
  for (const [key, val] of Object.entries(tp)) {
    if (typeof val === 'object' && val !== null && key !== 'updated' && key !== 'unit') {
      variants.push({variant: key, ...val});
    }
  }
  // If no variant objects found, check if prices are at top level (flat structure)
  if (!variants.length && (tp.marketPrice || tp.lowPrice || tp.midPrice)) {
    variants.push({variant: 'market', marketPrice: tp.marketPrice, lowPrice: tp.lowPrice, midPrice: tp.midPrice, highPrice: tp.highPrice});
  }
  
  // Build Cardmarket fallback data
  const cmHasData = cm.avg || cm.low || cm.trend;
  const cmEstUSD = cm.avg ? (cm.avg * 1.08).toFixed(2) : cm.trend ? (cm.trend * 1.08).toFixed(2) : '';
  
  return `
    <div style="display:flex;gap:20px;margin-bottom:20px">
      ${img?`<img src="${img}" style="width:120px;height:168px;object-fit:contain;border-radius:8px;flex-shrink:0">`:''}
      <div style="flex:1">
        <div style="font-size:18px;font-weight:700">${c.name||''}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${setName} · #${c.localId||''} · ${c.rarity||'Unknown'} · <span style="color:var(--text-faint)">${c.id||''}</span></div>
        ${c.hp?`<div style="font-size:12px;color:var(--text-dim);margin-top:2px">HP: ${c.hp} · ${(c.types||[]).join(', ')}</div>`:''}
        <div style="margin-top:12px">
          <div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:6px">TCGPlayer PRICING (Raw/Ungraded)</div>
          ${variants.length?variants.map(v=>`
            <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px;font-weight:600;width:100px;text-transform:capitalize">${v.variant}</span>
              ${v.marketPrice?`<span style="color:var(--green);font-weight:600">Market: $${Number(v.marketPrice).toFixed(2)}</span>`:''}
              ${v.lowPrice?`<span style="color:var(--text-dim);font-size:11px">Low: $${Number(v.lowPrice).toFixed(2)}</span>`:''}
              ${v.midPrice?`<span style="color:var(--text-dim);font-size:11px">Mid: $${Number(v.midPrice).toFixed(2)}</span>`:''}
              ${v.highPrice?`<span style="color:var(--text-dim);font-size:11px">High: $${Number(v.highPrice).toFixed(2)}</span>`:''}
            </div>
          `).join(''):cmHasData?`
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">No TCGPlayer (US) pricing — showing Cardmarket (EU) as reference:</div>
            <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px;font-weight:600;width:100px">Cardmarket</span>
              ${cm.avg?`<span style="color:var(--green);font-weight:600">Avg: €${Number(cm.avg).toFixed(2)}</span>`:''}
              ${cm.low?`<span style="color:var(--text-dim);font-size:11px">Low: €${Number(cm.low).toFixed(2)}</span>`:''}
              ${cm.trend?`<span style="color:var(--text-dim);font-size:11px">Trend: €${Number(cm.trend).toFixed(2)}</span>`:''}
            </div>
            ${cmEstUSD?`<div style="font-size:11px;color:var(--text-faint);margin-top:4px">~$${cmEstUSD} USD estimate (approximate conversion)</div>`:''}
          `:'<div style="color:var(--text-dim);font-size:12px">No pricing data available for this card</div>'}
        </div>
    </div>
  `;
}

function rGradedMatrix(rs) {
  const rows = [
    {label:'Pristine', psa:'', cgc:'10.1', bgs:''},
    {label:'10', psa:'10', cgc:'10', bgs:'10'},
    {label:'9.5', psa:'', cgc:'9.5', bgs:'9.5'},
    {label:'9', psa:'9', cgc:'9', bgs:'9'},
    {label:'8.5', psa:'', cgc:'8.5', bgs:'8.5'},
    {label:'8', psa:'8', cgc:'8', bgs:'8'},
    {label:'7', psa:'7', cgc:'7', bgs:'7'},
    {label:'6', psa:'6', cgc:'6', bgs:'6'}
  ];
  function cell(val, key) {
    if (!key) return '<td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;color:var(--text-faint)">\u2014</td>';
    if (val) return `<td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right"><span style="color:var(--green)">$${Number(val).toFixed(2)}</span></td>`;
    return `<td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right"><input type="number" class="qe-input" style="width:80px;text-align:right;display:inline-block" placeholder="\u2014" step="0.01" oninput="window.researchState.prices['${key}']=this.value"></td>`;
  }
  return `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr>
      <th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Grade</th>
      <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">PSA</th>
      <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">CGC</th>
      <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">BGS</th>
    </tr></thead>
    <tbody>${rows.map(r => {
      const p = r.psa ? (rs.prices['PSA_'+r.psa]||'') : '';
      const c = r.cgc ? (rs.prices['CGC_'+r.cgc]||'') : '';
      const b = r.bgs ? (rs.prices['BGS_'+r.bgs]||'') : '';
      return `<tr${r.label==='Pristine'?' style="background:rgba(255,215,0,.06)"':''}>
        <td style="padding:6px 8px;border-bottom:1px solid var(--border);font-weight:600">${r.label}</td>
        ${cell(p, r.psa?'PSA_'+r.psa:'')}${cell(c, r.cgc?'CGC_'+r.cgc:'')}${cell(b, r.bgs?'BGS_'+r.bgs:'')}
      </tr>`;
    }).join('')}</tbody>
  </table>
  <div style="font-size:10px;color:var(--text-faint);margin-top:8px;font-style:italic">Prices auto-populate from eBay. You can also enter manually.</div>`;
}

function rRegradeResult(rs) {
  const buy = num(rs.buyPrice);
  const fee = num(rs.gradingFee);
  const ebayFeeRate = rs.includeEbayFee ? 0.16 : 0;
  if (!buy || !rs.targetGrade) return '<div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:var(--radius-sm);text-align:center;color:var(--text-dim);font-size:12px">Enter a buy price and target grade, then click Calculate.</div>';
  
  const totalCost = buy + fee;
  const targetKey = rs.targetCompany + '_' + rs.targetGrade;
  const targetPrice = num(rs.prices[targetKey]);
  
  // Net after eBay fees
  const targetNet = targetPrice ? targetPrice * (1 - ebayFeeRate) : 0;
  
  // One grade below for risk analysis
  const gradeNum = parseFloat(rs.targetGrade);
  const belowGrade = gradeNum >= 10 ? '9.5' : gradeNum >= 9.5 ? '9' : gradeNum >= 9 ? '8.5' : gradeNum >= 8.5 ? '8' : String(gradeNum - 1);
  const belowKey = rs.targetCompany + '_' + belowGrade;
  const belowPrice = num(rs.prices[belowKey]);
  const belowNet = belowPrice ? belowPrice * (1 - ebayFeeRate) : 0;
  
  return `
    <div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:var(--radius-sm)">
      <div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:10px">ANALYSIS${rs.includeEbayFee?' (after ~16% eBay fees)':''}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">Total Cost</div>
          <div style="font-size:18px;font-weight:700;color:var(--text)">$${totalCost.toFixed(2)}</div>
          <div style="font-size:10px;color:var(--text-faint)">$${buy.toFixed(2)} card + $${fee.toFixed(2)} grading</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">${rs.targetCompany} ${rs.targetGrade} ${rs.includeEbayFee?'Net':'Value'}</div>
          <div style="font-size:18px;font-weight:700;${targetPrice?'color:var(--green)':'color:var(--text-faint)'}">${targetPrice?(rs.includeEbayFee?'$'+targetNet.toFixed(2):'$'+targetPrice.toFixed(2)):'Enter price →'}</div>
          ${targetPrice?`<div style="font-size:10px;color:var(--text-faint)">${rs.includeEbayFee?`Sell $${targetPrice.toFixed(2)} - $${(targetPrice*ebayFeeRate).toFixed(2)} fees`:''}</div>`:''}
          ${targetPrice?`<div style="font-size:10px;color:${(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?'var(--green)':'var(--red)'}">Profit: $${((rs.includeEbayFee?targetNet:targetPrice)-totalCost).toFixed(2)} (${totalCost?((((rs.includeEbayFee?targetNet:targetPrice)-totalCost)/totalCost)*100).toFixed(0):'0'}% ROI)</div>`:''}
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">${rs.targetCompany} ${belowGrade} ${rs.includeEbayFee?'Net':'Value'}</div>
          <div style="font-size:18px;font-weight:700;${belowPrice?'color:var(--yellow)':'color:var(--text-faint)'}">${belowPrice?(rs.includeEbayFee?'$'+belowNet.toFixed(2):'$'+belowPrice.toFixed(2)):'Enter price →'}</div>
          ${belowPrice?`<div style="font-size:10px;color:${(rs.includeEbayFee?belowNet:belowPrice)-totalCost>=0?'var(--green)':'var(--red)'}">If downgraded: $${((rs.includeEbayFee?belowNet:belowPrice)-totalCost).toFixed(2)}</div>`:''}
        </div>
      </div>
      ${targetPrice?`
      <div style="padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-align:center;${(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?'background:rgba(46,213,115,.12);color:var(--green);border:1px solid var(--green)':'background:rgba(255,71,87,.12);color:var(--red);border:1px solid var(--red)'}">
        ${(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?
          `✅ PROFITABLE at ${rs.targetCompany} ${rs.targetGrade} — $${((rs.includeEbayFee?targetNet:targetPrice)-totalCost).toFixed(2)} profit (${((((rs.includeEbayFee?targetNet:targetPrice)-totalCost)/totalCost)*100).toFixed(0)}% ROI)`:
          `❌ NOT PROFITABLE at ${rs.targetCompany} ${rs.targetGrade} — loss of $${Math.abs((rs.includeEbayFee?targetNet:targetPrice)-totalCost).toFixed(2)}`}
      </div>
      ${belowPrice&&(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?`
      <div style="margin-top:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;text-align:center;background:var(--bg);border:1px solid var(--border)">
        ⚠️ Risk: If it grades ${belowGrade} instead, ${(rs.includeEbayFee?belowNet:belowPrice)-totalCost>=0?`you still profit $${((rs.includeEbayFee?belowNet:belowPrice)-totalCost).toFixed(2)}`:`you lose $${Math.abs((rs.includeEbayFee?belowNet:belowPrice)-totalCost).toFixed(2)}`}
      </div>`:''}`
      :'<div style="font-size:12px;color:var(--text-dim);text-align:center">Fill in the graded price matrix above to see profit/loss analysis</div>'}
    </div>
  `;
}

// Crack candidate list management
window.addToCrackList = function() {
  const rs = window.researchState;
  const customInput = document.getElementById('ebay_custom_search');
  const cardName = customInput?.value?.trim() || rs.cardName || (rs.selectedCard ? rs.selectedCard.name : '');
  if (!cardName) { showToast('Search for a card first'); return; }
  
  const psa8 = num(rs.prices['PSA_8']);
  const cgc9 = num(rs.prices['CGC_9']);
  const cgc10 = num(rs.prices['CGC_10']);
  
  if (!psa8) { showToast('Fill in PSA 8 price in the graded matrix first (this is your buy price)'); return; }
  if (!cgc9 && !cgc10) { showToast('Fill in CGC 9 or CGC 10 price in the graded matrix first'); return; }
  
  if (D.crackList.find(c => c.cardName === cardName)) { showToast('Card already in crack list'); return; }
  
  const gradingFee = num(rs.gradingFee) || 20;
  const totalCost = psa8 + gradingFee;
  const feeRate = rs.includeEbayFee ? 0.16 : 0;
  const bestNet = Math.max((cgc9||0) * (1-feeRate), (cgc10||0) * (1-feeRate));
  const profit = bestNet - totalCost;
  const roi = totalCost > 0 ? (profit / totalCost) * 100 : 0;
  
  D.crackList.push({
    cardName, buyPrice: psa8, cgc9: cgc9||0, cgc10: cgc10||0,
    gradingFee, profit, roi, dateAdded: new Date().toISOString().slice(0,10)
  });
  
  // Also keep in session state for display
  rs.crackCandidates = D.crackList;
  saveData();
  render();
  showToast(`Added ${cardName} — ${profit >= 0 ? '+' : '-'}$${Math.abs(profit).toFixed(2)} potential`);
};

// Research eBay lookup
window.researchEbayLookup = async function() {
  const rs = window.researchState;
  if (!rs.selectedCard || !window.ebayState.appId) return;
  const c = rs.selectedCard;
  const cardName = c.name || '';
  const setName = c.set ? c.set.name : '';
  const number = c.localId || '';
  
  const setShort = setName.split(' ').slice(0, 2).join(' ').replace(/[^a-zA-Z0-9\s]/g, '').trim();
  const numClean = number.replace(/[^\d]/g, '');
  
  rs._ebayError = '';
  rs.prices = {};
  showToast('Searching eBay...');
  
  try {
    // Search raw card - short query like user would search
    const rawQuery = `${setShort} ${cardName} ${numClean} -PSA -CGC -BGS -SGC -graded -slab`.trim();
    const rawResults = await ebaySearch(rawQuery, 25);
    let rawSummary = ebayPricingSummary(rawResults);
    
    // Fallback: just card name + number
    if (!rawSummary) {
      const fallbackQuery = `${cardName} ${numClean} -PSA -CGC -BGS -SGC -graded -slab`.trim();
      const fallbackResults = await ebaySearch(fallbackQuery, 25);
      rawSummary = ebayPricingSummary(fallbackResults);
    }
    
    // Search graded variants - use precise queries
    const graded = {};
    const gradeSearches = [
      {company:'PSA', grade:'10', key:'PSA_10'},
      {company:'PSA', grade:'9', key:'PSA_9'},
      {company:'PSA', grade:'8', key:'PSA_8'},
      {company:'CGC', grade:'10 Pristine', query:'CGC Pristine 10', key:'CGC_10.1'},
      {company:'CGC', grade:'10', query:'CGC 10 -Pristine', key:'CGC_10'},
      {company:'CGC', grade:'9.5', key:'CGC_9.5'},
      {company:'CGC', grade:'9', key:'CGC_9'},
      {company:'CGC', grade:'8.5', key:'CGC_8.5'},
      {company:'CGC', grade:'8', key:'CGC_8'},
      {company:'BGS', grade:'10', key:'BGS_10'},
      {company:'BGS', grade:'9.5', key:'BGS_9.5'},
      {company:'BGS', grade:'9', key:'BGS_9'},
      {company:'BGS', grade:'8', key:'BGS_8'}
    ];
    for (const gs of gradeSearches) {
      const searchTerms = gs.query || `${gs.company} ${gs.grade}`;
      const gQuery = `${cardName} ${numClean} ${setShort} ${searchTerms} -lot -bundle -mystery -repack`.trim();
      const gResults = await ebaySearch(gQuery, 15);
      const gSummary = ebayPricingSummary(gResults);
      if (gSummary && gSummary.count >= 1) {
        graded[`${gs.company} ${gs.grade}`] = gSummary;
        rs.prices[gs.key] = gSummary.median.toFixed(2);
      }
    }
    
    const ebayData = rawSummary ? {...rawSummary, graded: Object.keys(graded).length ? graded : null, query: rawQuery} : {count:0, query: rawQuery};
    rs._ebayData = ebayData;
    render();
    showToast(rawSummary ? `Found ${rawSummary.count} eBay listings!` : 'No eBay listings found');
  } catch(err) {
    rs._ebayError = 'eBay error: ' + err.message;
    render();
    showToast('eBay search failed — check console (F12)');
  }
};

  try {
    const results = await ebaySearch(query, 25);
    const summary = ebayPricingSummary(results);
    rs._ebayData = summary ? {...summary, query: query} : {count:0, query: query};
    
    // Detect grade from query and auto-fill matrix
    const queryUpper = query.toUpperCase();
    const gradePatterns = [
      {re:/PSA\s*10/i, key:'PSA_10'},
      {re:/PSA\s*9(?!\.\d)/i, key:'PSA_9'},
      {re:/PSA\s*8(?!\.\d)/i, key:'PSA_8'},
      {re:/PSA\s*7(?!\.\d)/i, key:'PSA_7'},
      {re:/CGC\s*(PRISTINE|10\s*PRISTINE|PRISTINE\s*10)/i, key:'CGC_10.1'},
      {re:/CGC\s*10(?!\.\d)(?!\s*PRISTINE)/i, key:'CGC_10'},
      {re:/CGC\s*9\.5/i, key:'CGC_9.5'},

{"name":"Card Name","set":"Set Name","number":"Card Number","edition":"1st Edition or Unlimited or Shadowless or Pre-Release or Promo or empty string","rarity":"Rarity"}

// eBay OAuth token management
async function getEbayToken() {
  const eb = window.ebayState;
  if (!eb.appId || !eb.certId) return null;
  if (eb.token && Date.now() < eb.tokenExpiry - 300000) return eb.token;
  try {
    const creds = btoa(`${eb.appId}:${eb.certId}`);
    // Use CORS proxy for OAuth token request
    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.ebay.com/identity/v1/oauth2/token');
    const resp = await fetch(proxyUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'Authorization': `Basic ${creds}`
      },
      body: 'grant_type=client_credentials&scope=https://api.ebay.com/oauth/api_scope'
    });
    if (!resp.ok) throw new Error('eBay auth failed: ' + resp.status);
    const data = await resp.json();
    eb.token = data.access_token;
    eb.tokenExpiry = Date.now() + (data.expires_in * 1000);
    console.log('eBay token obtained, expires in', data.expires_in, 'seconds');
    return eb.token;
  } catch(e) {
    console.error('eBay token error:', e);
    // Try alternative proxy
    try {
      const creds = btoa(`${eb.appId}:${eb.certId}`);
      const resp = await fetch('https://corsproxy.io/?https://api.ebay.com/identity/v1/oauth2/token', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'Authorization': `Basic ${creds}`
        },
        body: 'grant_type=client_credentials&scope=https://api.ebay.com/oauth/api_scope'
      });
      if (!resp.ok) throw new Error('eBay auth (proxy2) failed: ' + resp.status);
      const data = await resp.json();
      eb.token = data.access_token;
      eb.tokenExpiry = Date.now() + (data.expires_in * 1000);
      eb._proxyBase = 'https://corsproxy.io/?';
      console.log('eBay token obtained via corsproxy');
      return eb.token;
    } catch(e2) {
      console.error('eBay token error (both proxies failed):', e2);
      return null;
    }
  }
}

// eBay Browse API search for active listings
async function ebaySearch(query, limit = 20) {
  const token = await getEbayToken();
  if (!token) { console.error('eBay: No token'); showToast('eBay authentication failed — check console'); return null; }
  try {
    const ebayUrl = `https://api.ebay.com/buy/browse/v1/item_summary/search?q=${encodeURIComponent(query)}&limit=${limit}&category_ids=183454&filter=buyingOptions:{FIXED_PRICE|AUCTION}`;
    // Route through CORS proxy
    const proxyBase = window.ebayState._proxyBase || 'https://api.allorigins.win/raw?url=';
    const url = proxyBase + encodeURIComponent(ebayUrl);
    console.log('eBay search:', query);
    const resp = await fetch(url, {
      headers: {
        'Authorization': `Bearer ${token}`,
        'X-EBAY-C-MARKETPLACE-ID': 'EBAY_US',
        'X-EBAY-C-ENDUSERCTX': 'contextualLocation=country=US,zip=19104'
      }
    });
    if (!resp.ok) {
      const errBody = await resp.text().catch(()=>'');
      console.error('eBay search error:', resp.status, errBody);
      return null;
    }

  } catch(e) {

    return null;
  }
}

// Process eBay results into pricing summary with outlier removal
function ebayPricingSummary(results) {
  if (!results || !results.itemSummaries || !results.itemSummaries.length) return null;
  const items = results.itemSummaries;
  const prices = items.map(i => parseFloat(i.price?.value || 0)).filter(p => p > 0).sort((a,b) => a - b);
  if (!prices.length) return null;
  
  // Remove outliers using IQR method (interquartile range)
  const q1Idx = Math.floor(prices.length * 0.25);
  const q3Idx = Math.floor(prices.length * 0.75);
  const q1 = prices[q1Idx];
  const q3 = prices[q3Idx];
  const iqr = q3 - q1;
  const lowerBound = q1 - (iqr * 1.5);
  const upperBound = q3 + (iqr * 1.5);
  
  // Only filter if we have enough data points (5+), otherwise use all
  const filtered = prices.length >= 5 ? prices.filter(p => p >= lowerBound && p <= upperBound) : prices;
  const usePrices = filtered.length >= 2 ? filtered : prices;
  
  const sum = usePrices.reduce((a,b) => a + b, 0);
  // Include listing titles for debugging
  const listings = items.map(i => ({title: i.title||'', price: parseFloat(i.price?.value||0)})).filter(l => l.price > 0);
  return {
    count: usePrices.length,
    low: usePrices[0],
    high: usePrices[usePrices.length - 1],
    avg: sum / usePrices.length,
    median: usePrices[Math.floor(usePrices.length / 2)],
    totalResults: results.total || prices.length,
    outliers: prices.length - usePrices.length,
    listings: listings
  };
}
