window.handleReceiptScan = async function(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  
  const target = window._receiptScanTarget || 'expenses';
  showToast('📸 Reading receipt (' + target + ')...');
  dbg('Receipt', 'Scanning receipt for ' + target);
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    try {
      const base64DataUrl = e.target.result;
      const match = base64DataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
      if (!match) throw new Error('Invalid image format');
      
      // Compress for API call
      let imgData = match[2];
      let mediaType = match[1];
      if (imgData.length > 500000) {
        const compressed = await compressImage(base64DataUrl, 800);
        const cMatch = compressed.match(/^data:(image\/\w+);base64,(.+)$/);
        if (cMatch) { mediaType = cMatch[1]; imgData = cMatch[2]; }
      }
      
      // Compress for storage (smaller, just for reference)
      const storageImg = await compressImage(base64DataUrl, 600);
      
      const ss = window.scannerState;
      
      // Different prompts for expenses vs purchases
      const expensePrompt = `Read this receipt and extract the purchase details. Respond ONLY with a JSON object, no other text or markdown. Use this exact format:
{"vendor":"Store/Company Name","date":"YYYY-MM-DD","amount":00.00,"description":"Brief description of what was purchased","category":"one of: Shipping Supplies, Packaging, Software, Table Fee, Travel, Storage, Marketing, Insurance, Other","payMethod":"Cash, Credit Card, Debit Card, PayPal, or other method if visible","items":[{"name":"item name","qty":1,"price":0.00}],"tax":0.00,"subtotal":0.00,"total":0.00,"notes":"any other relevant details"}
For the category, use your best judgment based on these Pokemon card business categories:
- Shipping Supplies: boxes, mailers, tape, bubble wrap, labels, stamps, postage
- Packaging: toploaders, sleeves, penny sleeves, card savers, team bags, one-touch cases
- Software: any software subscriptions, apps, digital tools
- Table Fee: card show table fees, convention fees, booth rental
- Travel: gas, parking, tolls, hotel, flights for card shows
- Storage: storage units, shelving, organizers
- Marketing: advertising, business cards, promotional items
- Insurance: shipping insurance, business insurance
- Other: anything that doesn't fit above
Use the TOTAL amount (including tax) as the "amount" field.
If you cannot read the receipt clearly: {"error":"Cannot read receipt","notes":"description of what you see"}`;

      const purchasePrompt = `Read this receipt and extract the purchase details for a Pokemon card business inventory purchase. Respond ONLY with a JSON object, no other text or markdown. Use this exact format:
{"vendor":"Store/Company Name","date":"YYYY-MM-DD","items":[{"name":"item name","qty":1,"price":0.00}],"subtotal":0.00,"tax":0.00,"shipping":0.00,"total":0.00,"payMethod":"Cash, Credit Card, Debit Card, PayPal, or other method if visible","category":"one of: Raw Card, Graded Card, Sealed Product, Supplies","sourceType":"one of: eBay, Card Show, LCS, Online Store, Private Sale","notes":"any other relevant details"}
For category, identify what type of items were purchased:
- Sealed Product: booster boxes, ETBs, booster packs, collection boxes, blisters
- Raw Card: individual ungraded cards
- Graded Card: PSA, CGC, BGS slabbed cards
- Supplies: toploaders, sleeves, card savers, shipping materials
Use the TOTAL amount (including tax) as the "total" field.
If you cannot read the receipt clearly: {"error":"Cannot read receipt","notes":"description of what you see"}`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ss.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 600,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: imgData } },
              { type: 'text', text: target === 'purchases' ? purchasePrompt : expensePrompt }
            ]
          }]
        })
      });
      
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || 'API error ' + response.status);
      }
      
      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const cleaned = text.replace(/```json\s*|```/g, '').trim();
      const receiptInfo = JSON.parse(cleaned);
      
      if (receiptInfo.error) {
        showToast('❌ ' + receiptInfo.error + (receiptInfo.notes ? ': ' + receiptInfo.notes : ''));
        return;
      }
      
      if (target === 'purchases') {
        // Open purchase modal pre-filled
        const items = receiptInfo.items || [];
        const firstItem = items[0] || {};
        const allItemNames = items.map(function(it) { return it.name + (it.qty > 1 ? ' x' + it.qty : ''); }).join(', ');
        const totalQty = items.reduce(function(s, it) { return s + (it.qty || 1); }, 0);
        const unitCost = totalQty > 0 ? (receiptInfo.subtotal || receiptInfo.total || 0) / totalQty : (receiptInfo.total || 0);
        
        window.modal = {
          type: 'purchases',
          mode: 'add',
          data: {
            description: allItemNames || receiptInfo.notes || '',
            date: receiptInfo.date || new Date().toISOString().slice(0, 10),
            source: receiptInfo.vendor || '',
            sourceType: receiptInfo.sourceType || 'Online Store',
            category: receiptInfo.category || 'Sealed Product',
            qty: totalQty || 1,
            unitCost: Number((unitCost).toFixed(2)) || 0,
            shipping: receiptInfo.shipping || 0,
            tax: receiptInfo.tax || 0,
            payMethod: receiptInfo.payMethod || '',
            receipt: 'Yes',
            notes: items.length > 1 ? 'Items: ' + items.map(function(it) { return it.name + (it.qty > 1 ? ' x' + it.qty : '') + ' $' + Number(it.price).toFixed(2); }).join(', ') : '',
            _receiptImg: storageImg,
            _receiptScanned: true
          }
        };
      } else {
        // Open expense modal pre-filled
        window.modal = {
          type: 'expenses',
          mode: 'add',
          data: {
            description: receiptInfo.description || (receiptInfo.items && receiptInfo.items.length ? receiptInfo.items.map(function(it) { return it.name; }).join(', ') : ''),
            date: receiptInfo.date || new Date().toISOString().slice(0, 10),
            category: receiptInfo.category || 'Other',
            amount: receiptInfo.amount || receiptInfo.total || 0,
            payMethod: receiptInfo.payMethod || '',
            vendor: receiptInfo.vendor || '',
            receipt: 'Yes',
            notes: (receiptInfo.items && receiptInfo.items.length > 1 ? 'Items: ' + receiptInfo.items.map(function(it) { return it.name + (it.qty > 1 ? ' x' + it.qty : '') + ' $' + Number(it.price).toFixed(2); }).join(', ') : '') + (receiptInfo.tax ? (receiptInfo.items && receiptInfo.items.length > 1 ? ' · ' : '') + 'Tax: $' + Number(receiptInfo.tax).toFixed(2) : ''),
            _receiptImg: storageImg,
            _receiptScanned: true
          }
        };
      }
      
      window.editIdx = null;
      render();
      showToast('Receipt scanned: ' + (receiptInfo.vendor || 'Unknown') + ' — $' + Number(receiptInfo.total || receiptInfo.amount || 0).toFixed(2));
      
    } catch(err) {
      showToast('Receipt scan error: ' + err.message);
      console.error('Receipt scan error:', err);
    }
  };
  reader.readAsDataURL(file);
};

// Override saveModal to handle receipt image storage
const _originalSaveModal = window.saveModal;
window.saveModal = async function() {
  // Capture receipt image before the normal save clears the modal
  const isReceiptType = window.modal && (window.modal.type === 'expenses' || window.modal.type === 'purchases');
  const hasReceiptImg = isReceiptType && window.modal.data && window.modal.data._receiptImg;
  const receiptImg = hasReceiptImg ? window.modal.data._receiptImg : null;
  const modalType = window.modal ? window.modal.type : '';
  const isNew = window.modal && window.modal.mode === 'add';
  
  // For new records, we need to know what ID will be assigned
  let nextRecId = null;
  if (isNew && receiptImg) {
    const prefix = modalType === 'purchases' ? 'P' : 'E';
    const nextNum = D.nextIds?.[prefix] || 1;
    nextRecId = prefix + String(nextNum).padStart(3, '0');
  }
  
  // For edits, use the existing ID
  let editRecId = null;
  if (!isNew && receiptImg) {
    editRecId = window.modal.data.id || null;
  }
  
  // Run the original save
  await _originalSaveModal();
  
  // After save, store the receipt image locally
  if (receiptImg && (nextRecId || editRecId)) {
    const recId = nextRecId || editRecId;
    saveReceiptImage(recId, receiptImg);
    console.log('Receipt image saved for', recId);
  }
};

window.exportReceipts = async function() {
  const receiptCount = getReceiptCount();
  if (!receiptCount) { showToast('No receipt images stored on this device'); return; }
  if (!confirm('Export ' + receiptCount + ' receipt images as a ZIP file?\n\nImages are named by date, vendor/source, and record ID for easy reference.')) return;
  
  showToast('Building ZIP file...');
  
  try {
    const zip = new JSZip();
    const imgFolder = zip.folder('receipts');
    let count = 0;
    
    // Build a manifest CSV
    let manifest = 'Record ID,Type,Date,Vendor/Source,Category,Amount,Description,Payment Method\n';
    
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key.startsWith('_ctReceipt_')) continue;
      
      const recId = key.replace('_ctReceipt_', '');
      const imgData = localStorage.getItem(key);
      if (!imgData) continue;
      
      // Find matching expense or purchase for naming
      const expense = D.expenses.find(function(e) { return e.id === recId; });
      const purchase = !expense ? D.purchases.find(function(p) { return p.id === recId; }) : null;
      const rec = expense || purchase;
      const recType = expense ? 'Expense' : (purchase ? 'Purchase' : 'Unknown');
      const date = rec ? (rec.date || 'nodate') : 'nodate';
      const vendor = rec ? ((rec.vendor || rec.source || 'unknown').replace(/[^a-zA-Z0-9]/g, '_').substring(0, 20)) : 'unknown';
      const filename = date + '_' + vendor + '_' + recId + '.jpg';
      
      // Extract base64 data
      const b64match = imgData.match(/^data:image\/\w+;base64,(.+)$/);
      if (b64match) {
        imgFolder.file(filename, b64match[1], { base64: true });
        count++;
        
        if (expense) {
          manifest += '"' + recId + '","Expense","' + (expense.date || '') + '","' + (expense.vendor || '').replace(/"/g, '""') + '","' + (expense.category || '') + '",' + num(expense.amount) + ',"' + (expense.description || '').replace(/"/g, '""') + '","' + (expense.payMethod || '') + '"\n';
        } else if (purchase) {
          manifest += '"' + recId + '","Purchase","' + (purchase.date || '') + '","' + (purchase.source || '').replace(/"/g, '""') + '","' + (purchase.category || '') + '",' + num(purchase.grandTotal) + ',"' + (purchase.description || '').replace(/"/g, '""') + '","' + (purchase.payMethod || '') + '"\n';
        }
      }
    }
    
    // Add manifest
    zip.file('receipt_manifest.csv', manifest);
    
    const blob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'CardTracker_Receipts_' + new Date().toISOString().slice(0, 10) + '.zip';
    a.click();
    URL.revokeObjectURL(url);
    
    showToast(count + ' receipt' + (count > 1 ? 's' : '') + ' exported to ZIP!');
  } catch(err) {
    showToast('Export error: ' + err.message);
    console.error('Receipt export error:', err);
  }
};

window.gradeUpdateState = {
  rows: [],
  active: false
};

window.openGradeUpdate = function() {

window.handleGradeUpdate = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
      
      if (!json.length) { showToast('No data found in file'); return; }
      
      // Parse each row
      const rows = [];
      json.forEach(function(r) {
        const rawGrade = String(r['PSA Grade'] || '').trim();
        const certId = String(r['PSA Certification Id'] || '').trim();
        const rawCard = String(r['Card'] || '').trim();
        const qty = parseInt(r['Quantity']) || 1;
        const subId = String(r['PSA Submission Id'] || '').trim();
        
        if (!rawGrade || !certId) return; // Skip rows without grade results
        
        // Extract numeric grade from PSA text like "MINT 9", "NEAR MINT-MINT 8"
        var gradeNum = '';
        var gradeMatch = rawGrade.match(/(\d+\.?\d*)\s*$/);
        if (gradeMatch) gradeNum = gradeMatch[1];
        
        // Convert PSA card name to our format for matching
        var matchName = convertPsaName(rawCard);
        
        for (var q = 0; q < qty; q++) {
          rows.push({
            rawCard: rawCard,
            matchName: matchName,
            grade: gradeNum,
            gradeText: rawGrade,
            certId: certId,
            subId: subId,
            _matchedIdx: -1,
            _matchedCard: null,
            _confidence: ''
          });
        }
      });
      
      if (!rows.length) { showToast('No graded cards found in file (missing PSA Grade or Cert ID)'); return; }
      
      // Try to match each row to inventory
      var usedIndices = new Set();
      rows.forEach(function(row) {
        var bestIdx = -1;
        var bestScore = 0;
        var bestConfidence = '';
        
        D.inventory.forEach(function(card, idx) {
          if (usedIndices.has(idx)) return;
          if (card.status !== 'Submitted') return;
          if ((card.gradingCompany || '').toUpperCase() !== 'PSA') return;
          
          var score = 0;
          var cardNameLower = (card.cardName || '').toLowerCase();
          var matchLower = (row.matchName || '').toLowerCase();
          var rawLower = (row.rawCard || '').toLowerCase();
          
          // Check if PSA submission ID matches (stored in notes)
          var notes = (card.notes || '').toLowerCase();
          if (row.subId && notes.includes(row.subId)) score += 10;
          
          // Name similarity
          if (cardNameLower === matchLower) {
            score += 20;
          } else {
            // Extract key parts for fuzzy matching
            var cardWords = cardNameLower.replace(/#\d+/g, '').replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(function(w) { return w.length >= 3; });
            var matchWords = matchLower.replace(/#\d+/g, '').replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(function(w) { return w.length >= 3; });
            
            var commonWords = 0;
            cardWords.forEach(function(w) { if (matchWords.indexOf(w) >= 0) commonWords++; });
            score += commonWords * 3;
            
            // Also check raw PSA name against our card name
            var rawWords = rawLower.replace(/[^a-z0-9\s]/g, ' ').split(/\s+/).filter(function(w) { return w.length >= 3; });
            rawWords.forEach(function(w) { if (cardNameLower.includes(w)) score += 1; });
          }
          
          // Card number match
          var ourNum = (card.cardName || '').match(/#(\w+)/);
          var theirNum = (row.matchName || '').match(/#(\w+)/);
          if (ourNum && theirNum && ourNum[1] === theirNum[1]) score += 15;
          
          if (score > bestScore) {
            bestScore = score;
            bestIdx = idx;
            bestConfidence = score >= 30 ? 'high' : score >= 15 ? 'medium' : 'low';
          }
        });
        
        if (bestIdx >= 0 && bestScore >= 5) {
          row._matchedIdx = bestIdx;
          row._matchedCard = D.inventory[bestIdx];
          row._confidence = bestConfidence;
          usedIndices.add(bestIdx);
        }
      });
      
      window.gradeUpdateState.rows = rows;
      window.gradeUpdateState.active = true;
      window.tab = 'grading';
      render();
      
      var matched = rows.filter(function(r) { return r._matchedIdx >= 0; }).length;
      showToast('Found ' + rows.length + ' graded cards, ' + matched + ' matched to inventory');
      
    } catch(err) {
      showToast('Error reading file: ' + err.message);
      console.error('Grade update error:', err);
    }
  };
  reader.readAsArrayBuffer(file);
};

function convertPsaName(raw) {
  if (!raw) return '';
  var s = String(raw).trim();
  
  // Remove year prefix
  s = s.replace(/^\d{4}\s+/, '');
  // Remove "POKEMON" prefix
  s = s.replace(/^POKEMON\s+/i, '');
  
  // PSA set name mappings
  var setMap = {
    'GAME BASE II': 'Base Set 2',
    'GAME': 'Base Set',
    'ROCKET': 'Team Rocket',
    'FOSSIL': 'Fossil',
    'JUNGLE': 'Jungle',
    'GYM CHALLENGE': 'Gym Challenge',
    'GYM HEROES': 'Gym Heroes',
    'NEO GENESIS': 'Neo Genesis',
    'NEO DISCOVERY': 'Neo Discovery',
    'NEO REVELATION': 'Neo Revelation',
    'NEO DESTINY': 'Neo Destiny',
    'LEGENDARY COLLECTION': 'Legendary Collection',
    'GAME MOVIE': 'Promo'
  };
  
  var setName = '';
  var remainder = s;
  // Try longest match first
  var setKeys = Object.keys(setMap).sort(function(a, b) { return b.length - a.length; });
  for (var i = 0; i < setKeys.length; i++) {
    if (s.toUpperCase().startsWith(setKeys[i])) {
      setName = setMap[setKeys[i]];
      remainder = s.substring(setKeys[i].length).trim();
      break;
    }
  }
  
  // Extract card number (standalone number at start of remainder)
  var cardNumber = '';
  var numMatch = remainder.match(/^(\d+)\s+/);
  if (numMatch) {
    cardNumber = numMatch[1];
    remainder = remainder.substring(numMatch[0].length).trim();
  }
  
  // Clean up card name
  var cardName = remainder
    .replace(/-HOLO/gi, '')
    .replace(/\*$/g, '')
    .replace(/\s+/g, ' ')
    .trim();
  
  // Title case
  cardName = cardName.split(' ').map(function(w) {
    if (w.length <= 2) return w.toLowerCase();
    return w.charAt(0).toUpperCase() + w.substring(1).toLowerCase();
  }).join(' ');
  
  // Handle edition
  var edition = '';
  if (/1ST EDITION/i.test(cardName)) {
    edition = '1st Edition';
    cardName = cardName.replace(/1st edition/gi, '').trim();
  }
  if (/SHADOWLESS/i.test(cardName)) {
    edition = 'Shadowless';
    cardName = cardName.replace(/shadowless/gi, '').trim();
  }
  
  // Fix specific names
  cardName = cardName.replace(/\s+/g, ' ').trim();
  
  var formatted = (setName + ' ' + cardName).trim();
  if (cardNumber) formatted += ' #' + cardNumber;
  if (edition) formatted += ' ' + edition;
  
  return formatted;
}

window.gradeUpdateApply = function() {
  var rows = window.gradeUpdateState.rows;
  var matched = rows.filter(function(r) { return r._matchedIdx >= 0; });
  if (!matched.length) { showToast('No matched cards to update'); return; }
  
  if (!confirm('Update ' + matched.length + ' cards with PSA grades?\n\nThis will change status to Graded and apply the grade in both Inventory and Grading tabs.')) return;
  
  var updated = 0;
  var gradingUpdated = 0;
  matched.forEach(function(row) {
    var card = D.inventory[row._matchedIdx];
    if (!card) return;
    
    // Update inventory card
    card.status = 'Graded';
    card.grade = row.grade;
    card.gradingCompany = 'PSA';
    var certNote = 'PSA Cert: ' + row.certId;
    if (card.notes && card.notes.indexOf(certNote) < 0) {
      card.notes = (card.notes ? card.notes + ' · ' : '') + certNote;
    } else if (!card.notes) {
      card.notes = certNote;
    }
    
    // Update linked Grading tab entry
    var gradingEntry = D.grading.find(function(g) { return g.cardId === card.id; });
    if (gradingEntry) {
      gradingEntry.gradeReceived = row.grade;
      gradingEntry.dateReturned = new Date().toISOString().slice(0, 10);
      if (row.certId) {
        var gCertNote = 'PSA Cert: ' + row.certId;
        if (!gradingEntry.notes || gradingEntry.notes.indexOf(gCertNote) < 0) {
          gradingEntry.notes = (gradingEntry.notes ? gradingEntry.notes + ' · ' : '') + gCertNote;
        }
      }
      gradingUpdated++;
    }
    
    updated++;
  });
  
  saveData();
  window.gradeUpdateState.active = false;
  window.gradeUpdateState.rows = [];
  render();
  showToast(updated + ' card' + (updated > 1 ? 's' : '') + ' updated with PSA grades' + (gradingUpdated ? ', ' + gradingUpdated + ' grading entries synced' : '') + '!');
};

// Weekly auto-backup — checks on app load, triggers on Mondays (or if 7+ days since last backup)
setTimeout(function() {
  try {
    const lastBackup = window.localStorage?.getItem('_ctLastAutoBackup') || '';
    const now = new Date();
    const today = now.toISOString().slice(0, 10);
    const dayOfWeek = now.getDay(); // 0=Sun, 1=Mon
    
    if (lastBackup === today) return; // already backed up today
    
    let shouldBackup = false;
    
    if (!lastBackup) {
      // Never backed up — do it now
      shouldBackup = true;
    } else {
      const daysSince = Math.floor((now - new Date(lastBackup)) / 86400000);
      if (daysSince >= 7) {
        // Been 7+ days — backup regardless of day
        shouldBackup = true;
      } else if (dayOfWeek === 1 && lastBackup < today) {
        // It's Monday and haven't backed up this week
        shouldBackup = true;
      }
    }
    
    if (shouldBackup && D.inventory.length > 0) {
      console.log('Auto-backup triggered — last backup:', lastBackup || 'never');
      exportExcel();
      window.localStorage?.setItem('_ctLastAutoBackup', today);
      showToast('📦 Weekly auto-backup exported!');
    }
  } catch(e) {
    console.error('Auto-backup error:', e);
  }
}, 5000); // 5 second delay after app loads

<script>
// ============================================================
// PASSWORD GATE (inline, loads immediately)
// ============================================================
const PW_HASH = '6226630ff689c1879f1439e37ec1e4989a65d2fb3850ed87afa6c4edbad34664';

async function hashPassword(pw) {
  const data = new TextEncoder().encode(pw);
  const buffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function isAuthenticated() { return sessionStorage.getItem('ct_auth') === 'true'; }

function showLoginScreen() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;animation:fadeUp .5s ease;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:800;background:linear-gradient(135deg,#FF3366,#4E7CFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;">CardTracker</div>
      <div style="color:#7878A0;font-size:14px;margin-bottom:40px;">Enter password to access your dashboard</div>
      <div style="background:#161630;border:1px solid #252545;border-radius:14px;padding:32px;width:380px;max-width:90vw;">
        <div style="margin-bottom:16px;">
          <label style="font-size:10px;color:#7878A0;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;">Password</label>
          <input type="password" id="pwInput" placeholder="Enter password" style="width:100%;padding:12px 16px;background:#0B0B14;border:1px solid #252545;border-radius:8px;color:#E4E4F0;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;" autofocus>
        </div>
        <div id="pwError" style="color:#FF4757;font-size:12px;margin-bottom:12px;display:none;">Incorrect password. Try again.</div>
        <button id="pwBtn" style="width:100%;padding:12px;background:#FF3366;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;">Sign In</button>
      </div>
      <div style="color:#4A4A6A;font-size:11px;margin-top:24px;">🔒 Password protected</div>
    </div>`;

  const input = document.getElementById('pwInput');
  const btn = document.getElementById('pwBtn');
  const err = document.getElementById('pwError');

  async function tryLogin() {
    const hash = await hashPassword(input.value);
    if (hash === PW_HASH) {
      sessionStorage.setItem('ct_auth', 'true');
      err.style.display = 'none';
      loadApp();
    } else {
      err.style.display = 'block';
      input.value = '';
      input.focus();
      input.style.borderColor = '#FF4757';
      setTimeout(() => { input.style.borderColor = '#252545'; }, 1500);
    }
  }
  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
}

function loadApp() {
  // Set a flag so we only reload once after login
  sessionStorage.setItem('ct_just_logged_in', 'true');
  window.location.reload();
}

// On page load, check auth
document.addEventListener('DOMContentLoaded', function() {
  if (isAuthenticated()) {
    // If we just logged in, clear the flag and let the module script run
    if (sessionStorage.getItem('ct_just_logged_in') === 'true') {
      sessionStorage.removeItem('ct_just_logged_in');
      // Module script will handle it — show loading state
      document.getElementById('app').innerHTML = '<div style="text-align:center;padding:100px 20px;color:#7878A0;"><div style="font-size:32px;margin-bottom:12px;">📊</div><div style="font-size:16px;font-weight:600;">Loading CardTracker...</div><div style="font-size:12px;margin-top:8px;">Connecting to cloud database</div></div>';
    }
    // Otherwise module script is already running, do nothing
  } else {
    showLoginScreen();
  }
});
</script>

<div class="app" id="app"></div>
