let firebaseReady = false;
let saving = false;
let lastSaveTime = 0;
let pendingSave = false;

// Load from Firebase on startup
async function loadFromFirebase() {
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) {
      const fbData = snap.data();
      if (fbData.inventory) {
        D = fbData;
        ensureFields();
      }
    }
    firebaseReady = true;
    render();
    showToast('🔄 Connected — data synced from cloud');
  } catch(e) {
    console.error('Firebase load error:', e);
    firebaseReady = true;
    render();
    showToast('⚠️ Offline mode — using local data');
  }
}

// Save to Firebase (debounced)
async function saveToFirebase() {
  if (saving) { pendingSave = true; return; }
  const now = Date.now();
  if (now - lastSaveTime < 1000) {
    pendingSave = true;
    setTimeout(() => { pendingSave = false; saveToFirebase(); }, 1000);
    return;
  }
  saving = true;
  lastSaveTime = now;
  try {
    await setDoc(DOC_REF, JSON.parse(JSON.stringify(D)));
  } catch(e) {
    console.error('Firebase save error:', e);
  }
  saving = false;
  if (pendingSave) { pendingSave = false; saveToFirebase(); }
}

// Real-time listener — updates when partner makes changes
onSnapshot(DOC_REF, (snap) => {
  if (!snap.exists() || saving) return;
  const fbData = snap.data();
  if (fbData && fbData.inventory) {
    D = fbData;
    ensureFields();
    render();
  }
});

const num = v => { if (typeof v === 'number') return v; const n = parseFloat(String(v||'').replace(/[$,()]/g,'')); return isNaN(n)?0:n; };

function destroyCharts() { Object.values(charts).forEach(c => { if(c&&c.destroy)c.destroy(); }); charts = {}; }

// ============================================================
// METRICS
// ============================================================
function M() {
  const inv=D.inventory,sales=D.sales,exp=D.expenses,gr=D.grading;
  const active=inv.filter(c=>c.status!=='Sold');
  const tSale=sales.reduce((s,r)=>s+num(r.salePrice),0);
  const tPlatFee=sales.reduce((s,r)=>s+num(r.platformFee),0);
  const tConFee=sales.reduce((s,r)=>s+num(r.consignFee),0);
  const tShip=sales.reduce((s,r)=>s+num(r.shipCost),0);
  const tCOGS=sales.reduce((s,r)=>s+num(r.costBasis),0);
  const netRev=tSale-tPlatFee-tConFee-tShip;
  const tGrade=gr.reduce((s,r)=>s+num(r.totalCost),0);
  const gross=netRev-tCOGS-tGrade;
  const tExp=exp.reduce((s,r)=>s+num(r.amount),0);
  const net=gross-tExp;
  const gm=tSale?gross/tSale:0;
  const nm=tSale?net/tSale:0;
  const sc=sales.length;
  const avgP=sc?gross/sc:0;
  const invCost=active.reduce((s,r)=>s+num(r.costBasis)+num(r.gradingCost),0);
  const invMkt=active.reduce((s,r)=>s+num(r.marketValue),0);
  const statusCounts={};
  active.forEach(c=>{const st=c.status||'Unknown';statusCounts[st]=(statusCounts[st]||0)+1;});
  const byPlat={};
  sales.forEach(r=>{const p=r.platform||'Other';if(!byPlat[p])byPlat[p]={rev:0,prof:0,cnt:0};byPlat[p].rev+=num(r.salePrice);byPlat[p].prof+=num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);byPlat[p].cnt++;});
  const invByType={};
  active.forEach(r=>{const t=r.cardType||'Other';invByType[t]=(invByType[t]||0)+1;});
  const monthly={};
  sales.forEach(r=>{const m2=(r.date||'').slice(0,7);if(!m2)return;if(!monthly[m2])monthly[m2]={rev:0,prof:0};monthly[m2].rev+=num(r.salePrice);monthly[m2].prof+=num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);});
  const expByCat={};
  exp.forEach(r=>{const c=r.category||'Other';expByCat[c]=(expByCat[c]||0)+num(r.amount);});
  const gradData=gr.map(r=>({name:(r.cardName||'').slice(0,16),fee:num(r.totalCost),pre:num(r.preValue),post:num(r.postValue),va:num(r.postValue)-num(r.preValue)-num(r.totalCost)})).filter(r=>r.name);
  const cap=D.capital||[];
  const sett=D.settings||{};
  const totalContributions=cap.filter(r=>r.type==='Contribution').reduce((s,r)=>s+num(r.amount),0);
  const totalDraws=cap.filter(r=>r.type==='Draw').reduce((s,r)=>s+num(r.amount),0);
  const startingCash=num(sett.startingCash);
  const otherAssets=num(sett.suppliesInventory)+num(sett.equipment)+num(sett.otherAssets);
  // Auto-calculate unpaid grading fees (submissions not yet returned)
  const unpaidGrading=gr.filter(r=>!r.dateReturned).reduce((s,r)=>s+num(r.totalCost),0);
  const totalLiabilities=num(sett.accountsPayable)+unpaidGrading+num(sett.salesTaxOwed)+num(sett.creditCardBal);
  const tPurchases=D.purchases.reduce((s,r)=>s+num(r.grandTotal||num(r.qty)*num(r.unitCost)+num(r.shipping)+num(r.tax)),0);
  const paidGrading=gr.filter(r=>r.dateReturned).reduce((s,r)=>s+num(r.totalCost),0);
  // Cash = Starting Cash + Contributions - Draws + Sales Revenue - All Fees - Purchases - Expenses - All Grading Fees
  const cashBalance=startingCash+totalContributions-totalDraws+tSale-tPlatFee-tConFee-tShip-tPurchases-tExp-paidGrading-unpaidGrading;
  // For the balance sheet, Total Equity = Contributions + Retained Earnings - Draws
  // Total Assets should = Total Liabilities + Total Equity
  // We show cash, inventory, and other assets separately, but note the balance sheet
  // may not perfectly balance if purchase totals don't match inventory cost basis assignments
  const totalAssets=cashBalance+invCost+otherAssets;
  const totalEquity=startingCash+totalContributions-totalDraws+net;
  const balanceCheck=totalAssets-totalLiabilities-totalEquity;
  const totalInvested = startingCash + totalContributions + tPurchases;
  const bizROI = totalInvested ? net / totalInvested : 0;
  return {tSale,netRev,tCOGS,gross,tExp,net,gm,nm,sc,avgP,invCost,invMkt,ac:active.length,statusCounts,byPlat,invByType,monthly,expByCat,gradData,tPlatFee,tConFee,tShip,tGrade,gc:gr.length,totalContributions,totalDraws,startingCash,otherAssets,totalLiabilities,sett,totalInvested,bizROI,cashBalance,unpaidGrading,tPurchases,paidGrading,totalAssets,totalEquity,balanceCheck};
}

      <div class="mc" style="border-left-color:${m.gross>=0?'var(--green)':'var(--red)'}"><div class="lbl">Gross Profit</div><div class="val ${m.gross>=0?'pos':'neg'}">${fmt(m.gross)}</div><div class="sub" style="color:${m.gm>=.3?'var(--green)':'var(--yellow)'}">${pct(m.gm)} margin</div></div>
      <div class="mc" style="border-left-color:${m.net>=0?'var(--green)':'var(--red)'}"><div class="lbl">Net Income</div><div class="val ${m.net>=0?'pos':'neg'}">${fmt(m.net)}</div><div class="sub" style="color:var(--text-dim)">After ${fmt(m.tExp)} expenses</div></div>
      <div class="mc" style="border-left-color:var(--yellow)"><div class="lbl">Avg Profit/Card</div><div class="val">${fmtD(m.avgP)}</div></div>
      <div class="mc" style="border-left-color:var(--purple)"><div class="lbl">Inventory (Cost)</div><div class="val">${fmt(m.invCost)}</div><div class="sub" style="color:var(--text-dim)">${m.ac} cards</div></div>
      <div class="mc" style="border-left-color:var(--cyan)"><div class="lbl">Inventory (Market)</div><div class="val">${fmt(m.invMkt)}</div><div class="sub" style="color:${m.invMkt>m.invCost?'var(--green)':'var(--red)'}">${m.invMkt>m.invCost?'+':''}${fmt(m.invMkt-m.invCost)} unrealized</div></div>
      <div class="mc" style="border-left-color:var(--accent)"><div class="lbl">Total Invested</div><div class="val">${fmt(m.totalInvested)}</div><div class="sub" style="color:var(--text-dim)">All capital + purchases</div></div>
      <div class="mc" style="border-left-color:${m.bizROI>=0?'var(--green)':'var(--red)'}"><div class="lbl">Business ROI</div><div class="val ${m.bizROI>=0?'pos':'neg'}">${m.totalInvested?pct(m.bizROI):'—'}</div><div class="sub" style="color:var(--text-dim)">Net income ÷ total invested</div></div>
    </div>
    <div class="charts-grid">
      <div class="panel chart-card"><h3>Revenue & Profit by Platform</h3><div class="chart-wrap"><canvas id="ch1"></canvas></div></div>
      <div class="panel chart-card"><h3>Inventory by Status</h3><div class="chart-wrap"><canvas id="ch2"></canvas></div></div>
    </div>
    <div class="charts-grid">
      <div class="panel chart-card"><h3>Monthly Sales Trend</h3><div class="chart-wrap"><canvas id="ch3"></canvas></div></div>
      <div class="panel chart-card"><h3>Inventory by Card Type</h3><div class="chart-wrap"><canvas id="ch4"></canvas></div></div>
    </div>
    <div class="charts-grid">
      <div class="panel chart-card"><h3>Top 10 Grading ROI</h3><div class="chart-wrap"><canvas id="ch5"></canvas></div></div>
      <div class="panel chart-card"><h3>Top 10 Value Added by Grading</h3><div class="chart-wrap"><canvas id="ch6"></canvas></div></div>
    </div>`;
}

function renderCharts(m) {
  destroyCharts();
  const p=Object.keys(m.byPlat);
  if(p.length){charts.c1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:p,datasets:[{label:'Revenue',data:p.map(x=>m.byPlat[x].rev),backgroundColor:'#4E7CFF',borderRadius:6},{label:'Profit',data:p.map(x=>m.byPlat[x].prof),backgroundColor:'#00D68F',borderRadius:6}]},options:cOpts()});}
  const st=Object.keys(m.statusCounts);
  const sc2={Raw:'#FFBE0B',Submitted:'#A855F7',Graded:'#4E7CFF',Listed:'#06D6A0',Hold:'#7878A0',Cracked:'#FF4757',Sold:'#00D68F'};
  if(st.length){charts.c2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:st,datasets:[{data:st.map(s=>m.statusCounts[s]),backgroundColor:st.map(s=>sc2[s]||'#7878A0'),borderWidth:0}]},options:pOpts()});}
  const mo=Object.keys(m.monthly).sort();
  if(mo.length){charts.c3=new Chart(document.getElementById('ch3'),{type:'line',data:{labels:mo,datasets:[{label:'Revenue',data:mo.map(x=>m.monthly[x].rev),borderColor:'#4E7CFF',backgroundColor:'#4E7CFF22',fill:true,tension:.3},{label:'Profit',data:mo.map(x=>m.monthly[x].prof),borderColor:'#00D68F',backgroundColor:'#00D68F22',fill:true,tension:.3}]},options:cOpts()});}
  const ty=Object.keys(m.invByType);
  const tc=['#FF3366','#4E7CFF','#00D68F','#FFBE0B','#A855F7','#06D6A0'];
  if(ty.length){charts.c4=new Chart(document.getElementById('ch4'),{type:'doughnut',data:{labels:ty,datasets:[{data:ty.map(t=>m.invByType[t]),backgroundColor:tc,borderWidth:0}]},options:pOpts()});}
  const gd=m.gradData;
  if(gd.length){
    const gdSorted=[...gd].filter(g=>g.post>0).sort((a,b)=>b.va-a.va);
    const top10=gdSorted.slice(0,10);
    const top10va=[...gd].filter(g=>g.post>0).sort((a,b)=>(b.post-b.pre)-(a.post-a.pre)).slice(0,10);
    if(top10.length){
    charts.c5=new Chart(document.getElementById('ch5'),{type:'bar',data:{labels:top10.map(g=>g.name),datasets:[{label:'Grading Fee',data:top10.map(g=>g.fee),backgroundColor:'#FF3366',borderRadius:6},{label:'Net Value Added',data:top10.map(g=>g.va),backgroundColor:top10.map(g=>g.va>=0?'#00D68F':'#FF4757'),borderRadius:6}]},options:{...cOpts(),indexAxis:'y',scales:{x:{ticks:{color:'#7878A0',font:{family:'JetBrains Mono',size:9},callback:v=>'$'+v.toLocaleString()},grid:{color:'#252545'},border:{display:false}},y:{ticks:{color:'#E4E4F0',font:{family:'DM Sans',size:11}},grid:{display:false},border:{display:false}}}}});
    }
    if(top10va.length){
    charts.c6=new Chart(document.getElementById('ch6'),{type:'bar',data:{labels:top10va.map(g=>g.name),datasets:[{label:'Pre-Grade Value',data:top10va.map(g=>g.pre),backgroundColor:'#4E7CFF44',borderColor:'#4E7CFF',borderWidth:1,borderRadius:6},{label:'Post-Grade Value',data:top10va.map(g=>g.post),backgroundColor:'#00D68F44',borderColor:'#00D68F',borderWidth:1,borderRadius:6}]},options:cOpts()});
    }
  }
}

function rTable(type,m) {
  const s=SCHEMAS[type];let data=D[type];
  const addBtn=`<button class="btn btn-accent btn-sm" onclick="openAdd('${type}')">${s.addLabel}</button>`;
  const quickAddBtn=type==='inventory'?` <button class="btn btn-sm" style="background:var(--blue);color:#fff" onclick="openQuickEntry()">⚡ Quick Add</button>`
    :type==='sales'?` <button class="btn btn-sm" style="background:var(--blue);color:#fff" onclick="openQuickSales()">⚡ Quick Log</button>`:'';
  // Apply search and sort
  const filtered = filterData(data, type);
  const sorted = sortData(filtered, s.cols);
  // Build original index map so edit/delete still work on the right record
  const idxMap = sorted.map(row => data.indexOf(row));

  const searchBar = `<div class="search-bar"><input type="text" placeholder="🔍 Search ${s.title.toLowerCase()}..." value="${window.searchTerm}" oninput="setSearch(this.value)" class="search-input">${window.searchTerm?'<button class="btn btn-sm" onclick="clearSearch()" style="margin-left:6px">✕ Clear</button>':''}<span class="search-count">${window.searchTerm?`${sorted.length} of ${data.length}`:''}</span></div>`;

  // Show quick entry mode if active
  if(type==='inventory' && window.quickEntryMode) return rQuickEntry(data, addBtn, quickAddBtn);
  if(type==='sales' && window.quickSalesMode) return rQuickSales(data, addBtn, quickAddBtn);

  if(!data.length) return `<div class="panel"><h3>${s.title} ${addBtn}${quickAddBtn}</h3><div class="empty"><div class="icon">📋</div>No ${type} records yet. Click "${s.addLabel}" to get started.</div></div>`;

  return `<div class="panel"><h3><span>${s.title}</span><span class="right">${addBtn}${quickAddBtn}</span></h3>
    ${searchBar}
    <table><thead><tr>${s.cols.map(c=>`<th class="${c.r?'r ':''}sortable${window.sortCol===c.k?' sorted':''}" onclick="toggleSort('${c.k}')">${c.l}${window.sortCol===c.k?(window.sortDir==='asc'?' ↑':' ↓'):''}</th>`).join('')}<th style="width:${type==='inventory'?'100':'70'}px"></th></tr></thead>
    <tbody>${sorted.length?sorted.map((row,si)=>{const i=idxMap[si];return`<tr>${s.cols.map(c=>{const val=c.render?c.render(row[c.k],row):(row[c.k]||'');return`<td${c.r?' class="r mono"':''}>${val}</td>`;}).join('')}<td class="r">${type==='inventory'?`<select class="quick-status" onchange="quickStatus(${i},this.value)" title="Quick status change"><option value="">⚡</option>${['Raw','Submitted','Graded','Listed','Sold','Hold','Cracked'].map(st=>`<option value="${st}"${row.status===st?' disabled':''}>${st}</option>`).join('')}</select> `:''}<button class="btn btn-sm" onclick="openEdit('${type}',${i})">✏️</button> <button class="btn btn-sm btn-danger" onclick="if(confirm('Delete?'))delRow('${type}',${i})">🗑</button></td></tr>`;}).join(''):`<tr><td colspan="${s.cols.length+1}" style="text-align:center;padding:20px;color:var(--text-dim)">No results matching "${window.searchTerm}"</td></tr>`}
    </tbody></table></div>`;
}

window.saveSetting = function(key, value) {
  if(!D.settings) D.settings={};
  D.settings[key]=parseFloat(value)||0;
  saveData();
  showToast('Setting saved & synced');
};

window.saveModal = function() {
  const s=SCHEMAS[window.modal.type];
  const row=window.modal.mode==='edit'?{...window.modal.data}:{};
  s.fields.forEach(f=>{
    if(f.type==='cardpicker'){
      // Card name comes from the picker input
      const el=document.getElementById('f_cardpicker');
      if(el) row.cardName=el.value;
    } else if(f.type==='pokemonsearch'){
      // Card name comes from hidden input or the search input as fallback
      const hidden=document.getElementById('f_cardName');
      const search=document.getElementById('f_pokemon_search');
      if(hidden && hidden.value) row.cardName=hidden.value;
      else if(search && search.value) row.cardName=search.value;
      // Preserve pokemon metadata
      if(window.modal.data._pokemonImg) row._pokemonImg=window.modal.data._pokemonImg;
      if(window.modal.data._pokemonSetId) row._pokemonSetId=window.modal.data._pokemonSetId;
      if(window.modal.data._pokemonNumber) row._pokemonNumber=window.modal.data._pokemonNumber;
      if(window.modal.data._tcgdexId) row._tcgdexId=window.modal.data._tcgdexId;
    } else {
      const el=document.getElementById('f_'+f.k);
      if(el)row[f.k]=f.type==='number'?parseFloat(el.value)||0:el.value;
    }
  });
  if(s.onSave)s.onSave(row);
  // Preserve linked data not in form fields (only for sales with linked inventory cards)
  if(window.modal.type==='sales' && window.modal.data._linkedInvIdx !== undefined){
    if(window.modal.data.gradingCompany) row.gradingCompany = window.modal.data.gradingCompany;
    if(window.modal.data.grade) row.grade = window.modal.data.grade;
  }
  if(window.modal.mode==='add'){
    row.id=nextId(s.idPrefix);D[window.modal.type].push(row);
    // Auto-update inventory card status when linked
    if(window.modal.data._linkedInvIdx !== undefined){
      const card = D.inventory[window.modal.data._linkedInvIdx];
      if(card && card.status !== 'Sold'){
        const oldStatus = card.status;
        if(window.modal.type==='grading'){
          card.status = 'Submitted';
          showToast(`${card.cardName}: ${oldStatus} → Submitted`);
        } else if(window.modal.type==='sales'){
          card.status = 'Sold';
          showToast(`${card.cardName}: ${oldStatus} → Sold`);
        }
      }
    }
    showToast(`Record added & synced`);
  }
  else{
    D[window.modal.type][window.editIdx]=row;
    // Auto-update inventory when grading entry is edited with return date and grade
    if(window.modal.type==='grading' && row.cardId && row.dateReturned && row.gradeReceived){
      const card = D.inventory.find(c => c.id === row.cardId);
      if(card && (card.status === 'Submitted' || card.status === 'Raw')){
        card.status = 'Graded';
        card.grade = row.gradeReceived;
        card.gradingCost = num(row.totalCost);
        card.gradingCompany = row.company || '';

// Pokemon search for Quick Add
let qePokemonTimers = {};
window.qePokemonSearch = function(rowIdx, val) {
  clearTimeout(qePokemonTimers[rowIdx]);
  const resultsEl = document.getElementById('qe-pokemon-'+rowIdx);
  if (!resultsEl) return;
  if (!val || val.length < 2) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
  qePokemonTimers[rowIdx] = setTimeout(async () => {
    try {
      let url;
      const val_lower = val.toLowerCase().trim();
      const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
      let setFilter = '', nameFilter = val;
      for (const setKw of setKeywords) {
        if (val_lower.startsWith(setKw + ' ') || val_lower === setKw) { setFilter = setKw; nameFilter = val.slice(setKw.length).trim(); break; }
      }
      let params = [];
      if (setFilter) params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
      const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
      if (remainingNumMatch) {
        if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
        params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
      } else if (nameFilter) {
        params.push(`name=like:${encodeURIComponent(nameFilter)}`);
      }
      params.push('pagination:itemsPerPage=6');
      url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
      const resp = await fetch(url);
      if (!resp.ok) return;
      const cards = await resp.json();
      if (!cards.length) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
      // Fetch details for set info
      const details = await Promise.all(cards.slice(0,6).map(async c => {
        try {
          const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`);
          if (r.ok) return await r.json();
          return c;
        } catch(e) { return c; }
      }));
      resultsEl.style.display = 'block';
      resultsEl.innerHTML = details.map((c, idx) => {
        const setName = c.set ? c.set.name : '';
        const number = c.localId || '';
        const formatted = `${setName} ${c.name||''} #${number}`.trim();
        const img = c.image ? c.image + '/low.webp' : '';
        const tp = c.pricing?.tcgplayer || {};
        const tcgPrice = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice ||
                         tp.holofoil?.marketPrice || tp['1stEditionHolofoil']?.marketPrice ||
                         tp.holo?.midPrice || tp.normal?.midPrice || tp.reverse?.midPrice ||
                         c.pricing?.cardmarket?.avg || c.pricing?.cardmarket?.trend || '';
        const priceTag = tcgPrice ? ` · <span style="color:var(--green)">$${Number(tcgPrice).toFixed(2)}</span>` : '';
        window._qePokemonResults = window._qePokemonResults || {};
        window._qePokemonResults[rowIdx+'_'+idx] = {formatted, img, tcgPrice, tcgdexId: c.id||''};
        return `<div class="picker-item" style="display:flex;align-items:center;gap:8px;padding:6px 10px" onclick="qeSelectPokemon(${rowIdx},'${rowIdx}_${idx}')">
          ${img?`<img src="${img}" style="width:32px;height:45px;object-fit:contain;border-radius:3px" loading="lazy">`:''}
          <div><div style="font-weight:600;font-size:12px">${formatted}</div><div style="font-size:10px;color:var(--text-dim)">${c.rarity||''}${priceTag}</div></div>
        </div>`;
      }).join('');
    } catch(e) { /* silently fail */ }
  }, 400);
};

let pokemonSearchTimer = null;
window.pokemonSearchDebounce = function(val) {
  clearTimeout(pokemonSearchTimer);
  const statusEl = document.getElementById('pokemon-search-status');
  if (!val || val.length < 3) {
    const resultsEl = document.getElementById('pokemon-search-results');
    if (resultsEl) resultsEl.innerHTML = '';
    if (statusEl) statusEl.textContent = val && val.length < 3 ? 'Type 3+ characters...' : '';
    return;
  }
  if (statusEl) statusEl.textContent = 'Searching...';
  pokemonSearchTimer = setTimeout(() => pokemonSearch(val), 600);
};

async function pokemonSearch(query) {
  const resultsEl = document.getElementById('pokemon-search-results');
  const statusEl = document.getElementById('pokemon-search-status');
  if (!resultsEl) return;
  try {
    // Smart search: detect patterns like "base set charizard", "charizard 130", "base set charizard 4"
    let url;
    const query_lower = query.toLowerCase().trim();
    
    // Pattern: "name number" (e.g. "charizard 130")
    const nameNumMatch = query.match(/^(.+?)\s+#?(\d+)$/);
    
    // Known set keyword patterns to detect set names in queries
    const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
    
    let setFilter = '';
    let nameFilter = query;
    
    // Check if query starts with a known set name
    for (const setKw of setKeywords) {
      if (query_lower.startsWith(setKw + ' ') || query_lower === setKw) {
        setFilter = setKw;
        nameFilter = query.slice(setKw.length).trim();
        break;
      }
    }
    
    // Build URL with filters
    let params = [];
    if (setFilter) {
      params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
    }
    
    // Check if remaining nameFilter ends with a number
    const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
    if (remainingNumMatch) {
      if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
      params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
    } else if (nameFilter) {
      params.push(`name=like:${encodeURIComponent(nameFilter)}`);
    }
    
    params.push('pagination:itemsPerPage=8');
    url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API status: ' + resp.status);
    const cards = await resp.json();
    if (statusEl) statusEl.textContent = cards.length ? `${cards.length} found` : 'No results';
    if (!cards.length) {
      resultsEl.innerHTML = `<div class="pokemon-no-results">No cards found. Try a different name or set number.<br><span style="font-size:11px">You can also type the name manually and close this.</span></div>`;
      return;
    }
    // Fetch full details for each card to get set info and pricing
    const details = await Promise.all(cards.slice(0,8).map(async c => {
      try {
        const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`);
        if (r.ok) return await r.json();
        return c;
      } catch(e) { return c; }
    }));
    resultsEl.innerHTML = details.map((c, idx) => {
      const setName = c.set ? c.set.name : '';
      const number = c.localId || '';
      const formatted = `${setName} ${c.name||''} #${number}`.trim();
      const img = c.image ? c.image + '/low.webp' : '';
      const rarity = c.rarity || '';
      // Extract TCGPlayer market price - try multiple variant keys
      const tp = c.pricing?.tcgplayer || {};
      const tcgPrice = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice || 
                       tp.holofoil?.marketPrice || tp['1stEditionHolofoil']?.marketPrice ||
                       tp.holo?.midPrice || tp.normal?.midPrice || tp.reverse?.midPrice ||
                       // Also try cardmarket as fallback
                       c.pricing?.cardmarket?.avg || c.pricing?.cardmarket?.trend || '';
      const priceDisplay = tcgPrice ? `<span style="color:var(--green);font-weight:600">$${Number(tcgPrice).toFixed(2)}</span>` : '<span style="color:var(--text-faint)">No price</span>';
      // Store card data for selection
      window._pokemonResults = window._pokemonResults || [];
      window._pokemonResults[idx] = {formatted, img, setName, setId: c.set?c.set.id:'', number, rarity, tcgPrice, tcgdexId: c.id||''};
      return `<div class="pokemon-result" onclick="selectPokemonCard(${idx})">
        ${img?`<img src="${img}" class="pokemon-result-img" loading="lazy">`:'<div class="pokemon-result-img" style="background:var(--bg)"></div>'}
        <div class="pokemon-result-info">
          <div class="pokemon-result-name">${formatted}</div>
          <div class="pokemon-result-meta">${setName} · #${number} · ${rarity||'Unknown'} · ${priceDisplay}</div>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    console.error('Pokemon search error:', err);
    if (statusEl) statusEl.textContent = 'Search failed';
    resultsEl.innerHTML = `<div class="pokemon-no-results">Search error: ${err.message}. Try again or type the name manually.</div>`;
  }
}

function formatPokemonName(card) {
  const setName = card.set ? card.set.name : '';
  const cardName = card.name || '';
  const number = card.localId || card.number || '';
  return `${setName} ${cardName} #${number}`.trim();
}

window.toggleSort = function(col) {

  } else {
    window.sortCol = col;
    window.sortDir = 'asc';
  }
  render();
};

function filterData(data, type) {
  if (!window.searchTerm) return data;
  const term = window.searchTerm.toLowerCase();
  return data.filter(row => {
    return Object.values(row).some(v => String(v).toLowerCase().includes(term));
  });
}

function sortData(data, cols) {
  if (!window.sortCol) return data;
  const col = cols.find(c => c.k === window.sortCol);
  if (!col) return data;
  return [...data].sort((a, b) => {
    let va = a[col.k], vb = b[col.k];
    // For computed columns, compute the value
    if (col.sortVal) { va = col.sortVal(a); vb = col.sortVal(b); }
    else { va = num(va) || va; vb = num(vb) || vb; }
    if (typeof va === 'number' && typeof vb === 'number') {
      return window.sortDir === 'asc' ? va - vb : vb - va;
    }
    return window.sortDir === 'asc' ? String(va||'').localeCompare(String(vb||'')) : String(vb||'').localeCompare(String(va||''));
  });
}
window.resetAll = function() { D=emptyData(); saveData(); render(); };

function rAnalytics(m) {
  const sales = D.sales;
  const inv = D.inventory;

  // Top cards by profit
  const salesWithProfit = sales.map(r => {
    const profit = num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);
    const cost = num(r.costBasis);
    const roi = cost ? profit/cost : 0;
    return {...r, _profit: profit, _roi: roi};
  });
  const topProfit = [...salesWithProfit].sort((a,b) => b._profit - a._profit).slice(0,10);
  const topROI = [...salesWithProfit].filter(r => num(r.costBasis) > 0).sort((a,b) => b._roi - a._roi).slice(0,10);
  const worstROI = [...salesWithProfit].filter(r => num(r.costBasis) > 0).sort((a,b) => a._roi - b._roi).slice(0,10);

  // Performance by card name (group duplicates)
  const byName = {};
  salesWithProfit.forEach(r => {
    const name = (r.cardName||'').toLowerCase().trim();
    if (!name) return;
    if (!byName[name]) byName[name] = { name: r.cardName, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0 };
    byName[name].count++;
    byName[name].totalProfit += r._profit;
    byName[name].totalRevenue += num(r.salePrice);
    byName[name].totalCost += num(r.costBasis);
  });
  const namePerf = Object.values(byName).sort((a,b) => b.totalProfit - a.totalProfit);

  // Performance by card type
  const byType = {};
  salesWithProfit.forEach(r => {
    const t = r.cardType || 'Unknown';
    if (!byType[t]) byType[t] = { type: t, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0 };
    byType[t].count++;
    byType[t].totalProfit += r._profit;
    byType[t].totalRevenue += num(r.salePrice);
    byType[t].totalCost += num(r.costBasis);
  });
  const typePerf = Object.values(byType).sort((a,b) => b.totalProfit - a.totalProfit);

  // Performance by platform
  const byPlatPerf = {};
  salesWithProfit.forEach(r => {
    const p = r.platform || 'Unknown';
    if (!byPlatPerf[p]) byPlatPerf[p] = { platform: p, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0, totalFees: 0 };
    byPlatPerf[p].count++;
    byPlatPerf[p].totalProfit += r._profit;
    byPlatPerf[p].totalRevenue += num(r.salePrice);
    byPlatPerf[p].totalCost += num(r.costBasis);
    byPlatPerf[p].totalFees += num(r.platformFee) + num(r.consignFee);
  });
  const platPerf = Object.values(byPlatPerf).sort((a,b) => b.totalProfit - a.totalProfit);

  // Unsold inventory by value (biggest opportunities)
  const unsold = inv.filter(c => c.status !== 'Sold' && num(c.marketValue) > 0).map(c => {
    const cost = num(c.costBasis) + num(c.gradingCost);
    const mv = num(c.marketValue);
    return {...c, _upside: mv - cost, _roi: cost ? (mv-cost)/cost : 0};
  }).sort((a,b) => b._upside - a._upside).slice(0,10);

  if (!sales.length && !inv.length) return '<div class="panel"><div class="empty"><div class="icon">📊</div>Add some inventory and sales data to unlock analytics.</div></div>';

  return `
    <div class="charts-grid">
      <div class="panel">
        <h3 style="color:var(--green)">🏆 Top 10 Most Profitable Sales</h3>
        ${topProfit.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Sale</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${topProfit.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.salePrice))}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono pos"><strong>${fmt(r._profit)}</strong></td><td class="r mono pos">${pct(r._roi)}</td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
      <div class="panel">
        <h3 style="color:var(--accent)">🎯 Top 10 Best ROI Sales</h3>
        ${topROI.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${topROI.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono ${r._profit>=0?'pos':'neg'}">${fmt(r._profit)}</td><td class="r mono ${r._roi>=0?'pos':'neg'}"><strong>${pct(r._roi)}</strong></td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
    </div>
    <div class="charts-grid">
      <div class="panel">
        <h3 style="color:var(--red)">📉 Worst ROI Sales (Learn From These)</h3>
        ${worstROI.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${worstROI.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono ${r._profit>=0?'pos':'neg'}">${fmt(r._profit)}</td><td class="r mono ${r._roi>=0?'pos':'neg'}"><strong>${pct(r._roi)}</strong></td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
      <div class="panel">
        <h3 style="color:var(--cyan)">💎 Biggest Unrealized Upside (Inventory)</h3>
        ${unsold.length?`<table><thead><tr><th>Card</th><th>Status</th><th class="r">Cost</th><th class="r">Market</th><th class="r">Upside</th><th class="r">ROI</th></tr></thead><tbody>
          ${unsold.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${badge(r.status)}</td><td class="r mono">${fmt(num(r.costBasis)+num(r.gradingCost))}</td><td class="r mono">${fmt(num(r.marketValue))}</td><td class="r mono ${r._upside>=0?'pos':'neg'}"><strong>${fmt(r._upside)}</strong></td><td class="r mono ${r._roi>=0?'pos':'neg'}">${pct(r._roi)}</td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">Add market values to inventory to see opportunities</div>'}
      </div>
    </div>
    <div class="charts-grid">
      ${typePerf.length?`<div class="panel">
        <h3 style="color:var(--purple)">🃏 Performance by Card Type</h3>
        <table><thead><tr><th>Type</th><th class="r">Sold</th><th class="r">Revenue</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${typePerf.map(r=>`<tr><td><strong>${r.type}</strong></td><td class="r mono">${r.count}</td><td class="r mono">${fmt(r.totalRevenue)}</td><td class="r mono ${r.totalProfit>=0?'pos':'neg'}"><strong>${fmt(r.totalProfit)}</strong></td><td class="r mono ${r.totalCost?(r.totalProfit/r.totalCost>=0?'pos':'neg'):''}">${r.totalCost?pct(r.totalProfit/r.totalCost):'—'}</td></tr>`).join('')}
        </tbody></table>
      </div>`:''}
      ${platPerf.length?`<div class="panel">
        <h3 style="color:var(--yellow)">🏪 Performance by Platform</h3>
        <table><thead><tr><th>Platform</th><th class="r">Sold</th><th class="r">Revenue</th><th class="r">Fees</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${platPerf.map(r=>`<tr><td><strong>${r.platform}</strong></td><td class="r mono">${r.count}</td><td class="r mono">${fmt(r.totalRevenue)}</td><td class="r mono neg">${fmt(r.totalFees)}</td><td class="r mono ${r.totalProfit>=0?'pos':'neg'}"><strong>${fmt(r.totalProfit)}</strong></td><td class="r mono ${r.totalCost?(r.totalProfit/r.totalCost>=0?'pos':'neg'):''}">${r.totalCost?pct(r.totalProfit/r.totalCost):'—'}</td></tr>`).join('')}
        </tbody></table>
      </div>`:''}
    </div>`;
}

function rResearchCard(rs) {
  const c = rs.selectedCard;
  const img = c.image ? c.image + '/low.webp' : '';
  const setName = c.set ? c.set.name : '';
  const tp = c.pricing?.tcgplayer || {};
  const cm = c.pricing?.cardmarket || {};
  
  // Collect all available TCGPlayer variant prices
  const variants = [];
  for (const [key, val] of Object.entries(tp)) {
    if (typeof val === 'object' && val !== null && key !== 'updated' && key !== 'unit') {
      variants.push({variant: key, ...val});
    }
  }
  // If no variant objects found, check if prices are at top level (flat structure)
  if (!variants.length && (tp.marketPrice || tp.lowPrice || tp.midPrice)) {
    variants.push({variant: 'market', marketPrice: tp.marketPrice, lowPrice: tp.lowPrice, midPrice: tp.midPrice, highPrice: tp.highPrice});
  }
  
  // Build Cardmarket fallback data
  const cmHasData = cm.avg || cm.low || cm.trend;
  const cmEstUSD = cm.avg ? (cm.avg * 1.08).toFixed(2) : cm.trend ? (cm.trend * 1.08).toFixed(2) : '';
  
  return `
    <div style="display:flex;gap:20px;margin-bottom:20px">
      ${img?`<img src="${img}" style="width:120px;height:168px;object-fit:contain;border-radius:8px;flex-shrink:0">`:''}
      <div style="flex:1">
        <div style="font-size:18px;font-weight:700">${c.name||''}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${setName} · #${c.localId||''} · ${c.rarity||'Unknown'}</div>
        ${c.hp?`<div style="font-size:12px;color:var(--text-dim);margin-top:2px">HP: ${c.hp} · ${(c.types||[]).join(', ')}</div>`:''}
        <div style="margin-top:12px">
          <div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:6px">TCGPlayer PRICING (Raw/Ungraded)</div>
          ${variants.length?variants.map(v=>`
            <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px;font-weight:600;width:100px;text-transform:capitalize">${v.variant}</span>
              ${v.marketPrice?`<span style="color:var(--green);font-weight:600">Market: $${Number(v.marketPrice).toFixed(2)}</span>`:''}
              ${v.lowPrice?`<span style="color:var(--text-dim);font-size:11px">Low: $${Number(v.lowPrice).toFixed(2)}</span>`:''}
              ${v.midPrice?`<span style="color:var(--text-dim);font-size:11px">Mid: $${Number(v.midPrice).toFixed(2)}</span>`:''}
              ${v.highPrice?`<span style="color:var(--text-dim);font-size:11px">High: $${Number(v.highPrice).toFixed(2)}</span>`:''}
            </div>
          `).join(''):cmHasData?`
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">No TCGPlayer (US) pricing — showing Cardmarket (EU) as reference:</div>
            <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px;font-weight:600;width:100px">Cardmarket</span>
              ${cm.avg?`<span style="color:var(--green);font-weight:600">Avg: €${Number(cm.avg).toFixed(2)}</span>`:''}
              ${cm.low?`<span style="color:var(--text-dim);font-size:11px">Low: €${Number(cm.low).toFixed(2)}</span>`:''}
              ${cm.trend?`<span style="color:var(--text-dim);font-size:11px">Trend: €${Number(cm.trend).toFixed(2)}</span>`:''}
            </div>
            ${cmEstUSD?`<div style="font-size:11px;color:var(--text-faint);margin-top:4px">~$${cmEstUSD} USD estimate (approximate conversion)</div>`:''}

      <table style="width:100%;border-collapse:collapse;font-size:12px">

            </tr>`;
          }).join('')}
        </tbody>
      </table>
      <div style="font-size:10px;color:var(--text-faint);margin-top:8px;font-style:italic">Enter prices manually or wait for eBay API integration for auto-populated graded values</div>

function rRegradeResult(rs) {
  const buy = num(rs.buyPrice);
  const fee = num(rs.gradingFee);
  if (!buy || !rs.targetGrade) return '<div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:var(--radius-sm);text-align:center;color:var(--text-dim);font-size:12px">Enter a buy price and target grade to see the analysis.</div>';
  
  const totalCost = buy + fee;
  const targetKey = rs.targetCompany + '_' + rs.targetGrade;
  const targetPrice = num(rs.prices[targetKey]);
  
  // Also check one grade below target for risk analysis
  const gradeNum = parseFloat(rs.targetGrade);
  const belowGrade = gradeNum >= 10 ? '9.5' : gradeNum >= 9.5 ? '9' : gradeNum >= 9 ? '8.5' : gradeNum >= 8.5 ? '8' : String(gradeNum - 1);
  const belowKey = rs.targetCompany + '_' + belowGrade;
  const belowPrice = num(rs.prices[belowKey]);
  
  return `
    <div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:var(--radius-sm)">
      <div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:10px">ANALYSIS</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">Buy + Grade Cost</div>
          <div style="font-size:18px;font-weight:700;color:var(--text)">$${totalCost.toFixed(2)}</div>
          <div style="font-size:10px;color:var(--text-faint)">$${buy.toFixed(2)} card + $${fee.toFixed(2)} grading</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">${rs.targetCompany} ${rs.targetGrade} Value</div>
          <div style="font-size:18px;font-weight:700;${targetPrice?'color:var(--green)':'color:var(--text-faint)'}">${targetPrice?'$'+targetPrice.toFixed(2):'Enter price →'}</div>
          ${targetPrice?`<div style="font-size:10px;color:${targetPrice-totalCost>=0?'var(--green)':'var(--red)'}">Profit: $${(targetPrice-totalCost).toFixed(2)} (${totalCost?(((targetPrice-totalCost)/totalCost)*100).toFixed(0):'0'}% ROI)</div>`:''}
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">${rs.targetCompany} ${belowGrade} Value</div>
          <div style="font-size:18px;font-weight:700;${belowPrice?'color:var(--yellow)':'color:var(--text-faint)'}">${belowPrice?'$'+belowPrice.toFixed(2):'Enter price →'}</div>
          ${belowPrice?`<div style="font-size:10px;color:${belowPrice-totalCost>=0?'var(--green)':'var(--red)'}">If downgraded: $${(belowPrice-totalCost).toFixed(2)}</div>`:''}
        </div>
      </div>
      ${targetPrice?`
      <div style="padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-align:center;${targetPrice-totalCost>=0?'background:rgba(46,213,115,.12);color:var(--green);border:1px solid var(--green)':'background:rgba(255,71,87,.12);color:var(--red);border:1px solid var(--red)'}">
        ${targetPrice-totalCost>=0?
          `✅ PROFITABLE if you hit ${rs.targetCompany} ${rs.targetGrade} — $${(targetPrice-totalCost).toFixed(2)} profit (${(((targetPrice-totalCost)/totalCost)*100).toFixed(0)}% ROI)`:
          `❌ NOT PROFITABLE even at ${rs.targetCompany} ${rs.targetGrade} — loss of $${Math.abs(targetPrice-totalCost).toFixed(2)}`}
      </div>
      ${belowPrice&&targetPrice-totalCost>=0?`
      <div style="margin-top:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;text-align:center;background:var(--bg);border:1px solid var(--border)">
        ⚠️ Risk: If it grades ${belowGrade} instead, ${belowPrice-totalCost>=0?`you still profit $${(belowPrice-totalCost).toFixed(2)}`:`you lose $${Math.abs(belowPrice-totalCost).toFixed(2)}`}
      </div>`:''}`
      :'<div style="font-size:12px;color:var(--text-dim);text-align:center">Fill in the graded price matrix above to see profit/loss analysis</div>'}
    </div>
  `;
}

let researchSearchTimer = null;
window.researchSearchDebounce = function(val) {
  clearTimeout(researchSearchTimer);
  window.researchState.cardName = val;
  const resultsEl = document.getElementById('research-search-results');
  if (!resultsEl) return;
  if (!val || val.length < 3) { resultsEl.style.display = 'none'; return; }
  researchSearchTimer = setTimeout(() => researchSearch(val), 600);
};

async function researchSearch(query) {
  const resultsEl = document.getElementById('research-search-results');
  if (!resultsEl) return;
  try {
    const query_lower = query.toLowerCase().trim();
    const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
    let setFilter = '', nameFilter = query;
    for (const setKw of setKeywords) {
      if (query_lower.startsWith(setKw + ' ') || query_lower === setKw) { setFilter = setKw; nameFilter = query.slice(setKw.length).trim(); break; }
    }
    let params = [];
    if (setFilter) params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
    const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
    if (remainingNumMatch) {
      if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
      params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
    } else if (nameFilter) {
      params.push(`name=like:${encodeURIComponent(nameFilter)}`);
    }
    params.push('pagination:itemsPerPage=6');
    const url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
    const resp = await fetch(url);
    if (!resp.ok) return;
    const cards = await resp.json();
    if (!cards.length) { resultsEl.innerHTML = '<div style="padding:12px;color:var(--text-dim);font-size:12px;text-align:center">No cards found</div>'; resultsEl.style.display = 'block'; return; }
    const details = await Promise.all(cards.slice(0,6).map(async c => {
      try { const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`); if (r.ok) return await r.json(); return c; } catch(e) { return c; }
    }));
    window._researchResults = details;
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = details.map((c, idx) => {
      const setName = c.set ? c.set.name : '';
      const number = c.localId || '';
      const img = c.image ? c.image + '/low.webp' : '';
      const tp = c.pricing?.tcgplayer || {};
      const price = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice || tp.holofoil?.marketPrice || tp.holo?.midPrice || tp.normal?.midPrice || '';
      return `<div class="pokemon-result" onclick="selectResearchCard(${idx})">
        ${img?`<img src="${img}" class="pokemon-result-img" loading="lazy">`:''}
        <div class="pokemon-result-info">
          <div class="pokemon-result-name">${setName} ${c.name||''} #${number}</div>
          <div class="pokemon-result-meta">${c.rarity||''} ${price?`· <span style="color:var(--green)">$${Number(price).toFixed(2)}</span>`:''}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { /* fail silently */ }
}

window.selectResearchCard = function(idx) {
  if (!window._researchResults || !window._researchResults[idx]) return;
  const card = window._researchResults[idx];
  window.researchState.selectedCard = card;
  window.researchState.cardName = `${card.set?card.set.name:''} ${card.name||''} #${card.localId||''}`.trim();
  window.researchState.prices = {};
  const resultsEl = document.getElementById('research-search-results');
  if (resultsEl) resultsEl.style.display = 'none';
  render();
};

window.researchFromInventory = function(invIdx) {
  const card = D.inventory[invIdx];
  if (!card) return;
  window.researchState.cardName = card.cardName || '';
  window.researchState.selectedCard = null;
  window.researchState.prices = {};
  // If card has grade info, pre-fill the calculator
  if (card.grade) window.researchState.currentGrade = card.grade;
  if (card.gradingCompany) window.researchState.currentCompany = card.gradingCompany;
  if (card.costBasis) window.researchState.buyPrice = String(num(card.costBasis) + num(card.gradingCost));
  // Trigger search
  render();
  setTimeout(() => {
    const el = document.getElementById('research_search');
    if (el) { el.value = card.cardName || ''; researchSearch(card.cardName || ''); }
  }, 100);
};

window.exportPDF = function(type) {

    const ee=Object.entries(m.expByCat).sort((a,b)=>b[1]-a[1]);
    doc.autoTable({startY:36,head:[['Line Item','Amount']],body:[
      ['Card Sales (Gross)',fmtD(m.tSale)],['  Less: Platform Fees',`(${fmtD(m.tPlatFee)})`],['  Less: Consignment Fees',`(${fmtD(m.tConFee)})`],['  Less: Shipping Costs',`(${fmtD(m.tShip)})`],
      [{content:'Net Revenue',styles:{fontStyle:'bold'}},{content:fmtD(m.netRev),styles:{fontStyle:'bold'}}],['',''],

      [{content:'Gross Profit',styles:{fontStyle:'bold'}},{content:fmtD(m.gross),styles:{fontStyle:'bold'}}],['  Gross Margin',pct(m.gm)],['',''],
      ...ee.map(([c,a])=>[`  ${c}`,fmtD(a)]),
      [{content:'Total Expenses',styles:{fontStyle:'bold'}},{content:fmtD(m.tExp),styles:{fontStyle:'bold'}}],['',''],
      [{content:'NET INCOME',styles:{fontStyle:'bold',fontSize:12}},{content:fmtD(m.net),styles:{fontStyle:'bold',fontSize:12}}],['  Net Margin',pct(m.nm)]

      [{content:'LIABILITIES',styles:{fontStyle:'bold',fontSize:11}},''],

      ...(num(m.sett.creditCardBal)?[['  Credit Card Balance',fmtD(num(m.sett.creditCardBal))]]:[]),
      [{content:'Total Liabilities',styles:{fontStyle:'bold'}},{content:fmtD(m.totalLiabilities),styles:{fontStyle:'bold'}}],['',''],
      [{content:"OWNER'S EQUITY",styles:{fontStyle:'bold',fontSize:11}},''],
      ["  Owner's Contributions",fmtD(m.startingCash+m.totalContributions)],['  Retained Earnings',fmtD(m.net)],["  Less: Owner's Draws",`(${fmtD(m.totalDraws)})`],
      [{content:'Total Equity',styles:{fontStyle:'bold'}},{content:fmtD(m.totalEquity),styles:{fontStyle:'bold'}}]
    ],theme:'plain',styles:{fontSize:10,cellPadding:3},columnStyles:{1:{halign:'right'}}});
    doc.save('Balance_Sheet.pdf');showToast('Balance Sheet PDF exported!');
  } else if(type==='cashflow'){
    doc.text('Cash Flow Statement',14,22);doc.setFontSize(10);doc.setFont('helvetica','normal');doc.text(`Period ending: ${today}`,14,30);
    doc.autoTable({startY:36,head:[['Item','Amount']],body:[
      [{content:'CASH IN',styles:{fontStyle:'bold'}},''],
      ['  Card Sales (Gross)',fmtD(m.tSale)],['  Owner Contributions',fmtD(m.totalContributions)],
      [{content:'Total Cash In',styles:{fontStyle:'bold'}},{content:fmtD(m.tSale+m.totalContributions),styles:{fontStyle:'bold'}}],['',''],
      [{content:'CASH OUT',styles:{fontStyle:'bold'}},''],
      ['  Card Purchases',`(${fmtD(m.tPurchases)})`],['  Platform & Consign Fees',`(${fmtD(m.tPlatFee+m.tConFee)})`],
      ['  Shipping Costs',`(${fmtD(m.tShip)})`],['  Grading Fees',`(${fmtD(m.paidGrading+m.unpaidGrading)})`],
      ['  Business Expenses',`(${fmtD(m.tExp)})`],["  Owner's Draws",`(${fmtD(m.totalDraws)})`],
      [{content:'Total Cash Out',styles:{fontStyle:'bold'}},{content:`(${fmtD(m.tPurchases+m.tPlatFee+m.tConFee+m.tShip+m.paidGrading+m.unpaidGrading+m.tExp+m.totalDraws)})`,styles:{fontStyle:'bold'}}],['',''],

      ['Total Revenue',fmtD(m.tSale)],['Total COGS',fmtD(m.tCOGS)],['Total Expenses',fmtD(m.tExp)],['Net Income',fmtD(m.net)]

    doc.save('Key_Ratios.pdf');showToast('Key Ratios PDF exported!');
  }
};

window.importExcel = function() { document.getElementById('fileIn').click(); };

window.handleImport = function(e) {
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array',cellDates:true});
      const readSheet=(name,startRow)=>{const ws=wb.Sheets[name];if(!ws)return[];const json=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});const headers=json[startRow-1]||[];return json.slice(startRow).filter(r=>r&&!r.every(c=>c===''||c===null)).map(row=>{const obj={};headers.forEach((h,i)=>{if(h)obj[String(h).trim()]=row[i]!==undefined?row[i]:'';});return obj;});};
      const mapInv=r=>({id:r['Card ID']||'',dateAdded:r['Date Added']||'',cardName:r['Card Name']||'',setSeries:r['Set/Series']||'',cardType:r['Card Type']||'',status:r['Status']||'',grade:r['Condition/Grade']||'',gradingCompany:r['Grading Co.']||'',costBasis:num(r['Cost Basis ($)']),gradingCost:num(r['Grading Cost ($)']),marketValue:num(r['Current Market Value ($)']),platform:r['Platform Listed']||'',notes:r['Notes']||''});
      const mapSale=r=>({id:r['Sale ID']||'',date:r['Date']||'',cardName:r['Card Name']||'',platform:r['Platform']||'',salePrice:num(r['Sale Price ($)']),platformFee:num(r['Platform Fee ($)']),consignFee:num(r['Consignment Fee ($)']),shipCost:num(r['Actual Shipping Cost ($)']),costBasis:num(r['Cost Basis ($)']),buyer:r['Buyer Info']||'',notes:r['Notes']||''});
      const mapGrade=r=>({id:r['Submission ID']||'',dateSubmitted:r['Date Submitted']||'',cardName:r['Card Name']||'',company:r['Grading Company']||'',gradeReceived:r['Grade Received']||'',totalCost:num(r['Total Grading Cost ($)']),gradingFee:num(r['Grading Fee ($)']),shipTo:num(r['Shipping to Grader ($)']),shipBack:num(r['Return Shipping ($)']),preValue:num(r['Pre-Grade Value ($)']),postValue:num(r['Post-Grade Value ($)']),action:r['Action']||'',notes:r['Notes']||''});
      const mapExp=r=>({id:r['Expense ID']||'',date:r['Date']||'',category:r['Category']||'',description:r['Description']||'',amount:num(r['Amount ($)']),payMethod:r['Payment Method']||'',vendor:r['Vendor']||'',notes:r['Notes']||''});
      const inv=readSheet('Inventory',3).filter(r=>r['Card ID']||r['Card Name']).map(mapInv);
      const sales=readSheet('Sales',3).filter(r=>r['Sale ID']||r['Card Name']).map(mapSale);
      const grading=readSheet('Grading Log',3).filter(r=>r['Submission ID']||r['Card Name']).map(mapGrade);
      const expenses=readSheet('Expenses',3).filter(r=>r['Expense ID']||r['Description']).map(mapExp);
      function mergeRecords(existing,incoming,idPrefix){let added=0,updated=0;const map={};existing.forEach((r,i)=>{if(r.id)map[r.id]=i;});incoming.forEach(r=>{if(r.id&&map[r.id]!==undefined){existing[map[r.id]]=r;updated++;}else{if(!r.id)r.id=nextId(idPrefix);existing.push(r);added++;}});return{added,updated};}
      let tA=0,tU=0;
      if(inv.length){const r=mergeRecords(D.inventory,inv,'C');tA+=r.added;tU+=r.updated;}
      if(sales.length){const r=mergeRecords(D.sales,sales,'S');tA+=r.added;tU+=r.updated;}
      if(grading.length){const r=mergeRecords(D.grading,grading,'G');tA+=r.added;tU+=r.updated;}
      if(expenses.length){const r=mergeRecords(D.expenses,expenses,'E');tA+=r.added;tU+=r.updated;}
      saveData();showToast(`Import complete! ${tA} added, ${tU} updated — synced to cloud`);render();
    }catch(err){alert('Error importing: '+err.message);}
  };
  reader.readAsArrayBuffer(file);e.target.value='';
};

window.exportExcel = function() {
  const wb=XLSX.utils.book_new();
  const mkSheet=(data,headers,name)=>{const ws=XLSX.utils.aoa_to_sheet([headers.map(h=>h.v),...data.map(r=>headers.map(h=>r[h.field]!==undefined?r[h.field]:''))]);headers.forEach((h,i)=>{ws['!cols']=ws['!cols']||[];ws['!cols'][i]={wch:h.w||14};});XLSX.utils.book_append_sheet(wb,ws,name);};
  mkSheet(D.inventory,[{v:'Card ID',field:'id',w:10},{v:'Date Added',field:'dateAdded',w:12},{v:'Card Name',field:'cardName',w:25},{v:'Set/Series',field:'setSeries',w:16},{v:'Card Type',field:'cardType',w:12},{v:'Status',field:'status',w:12},{v:'Condition/Grade',field:'grade',w:14},{v:'Grading Co.',field:'gradingCompany',w:10},{v:'Cost Basis ($)',field:'costBasis',w:14},{v:'Grading Cost ($)',field:'gradingCost',w:14},{v:'Current Market Value ($)',field:'marketValue',w:18},{v:'Platform Listed',field:'platform',w:14},{v:'Notes',field:'notes',w:25}],'Inventory');
  mkSheet(D.sales,[{v:'Sale ID',field:'id',w:10},{v:'Date',field:'date',w:12},{v:'Card Name',field:'cardName',w:25},{v:'Platform',field:'platform',w:12},{v:'Sale Price ($)',field:'salePrice',w:14},{v:'Platform Fee ($)',field:'platformFee',w:14},{v:'Consignment Fee ($)',field:'consignFee',w:14},{v:'Actual Shipping Cost ($)',field:'shipCost',w:14},{v:'Cost Basis ($)',field:'costBasis',w:14},{v:'Notes',field:'notes',w:25}],'Sales');
  mkSheet(D.grading,[{v:'Submission ID',field:'id',w:12},{v:'Date Submitted',field:'dateSubmitted',w:14},{v:'Card Name',field:'cardName',w:25},{v:'Grading Company',field:'company',w:14},{v:'Grade Received',field:'gradeReceived',w:12},{v:'Total Grading Cost ($)',field:'totalCost',w:14},{v:'Pre-Grade Value ($)',field:'preValue',w:16},{v:'Post-Grade Value ($)',field:'postValue',w:16},{v:'Notes',field:'notes',w:25}],'Grading Log');
  mkSheet(D.expenses,[{v:'Expense ID',field:'id',w:10},{v:'Date',field:'date',w:12},{v:'Category',field:'category',w:16},{v:'Description',field:'description',w:30},{v:'Amount ($)',field:'amount',w:14},{v:'Vendor',field:'vendor',w:16},{v:'Payment Method',field:'payMethod',w:14},{v:'Notes',field:'notes',w:25}],'Expenses');
  XLSX.writeFile(wb,'CardTracker_Export_'+new Date().toISOString().slice(0,10)+'.xlsx');
  showToast('Excel exported!');
};

<style>
:root{--bg:#0B0B14;--bg2:#111122;--card:#161630;--card-hover:#1C1C3A;--accent:#FF3366;--accent-glow:#FF336633;--blue:#4E7CFF;--blue-soft:#4E7CFF22;--green:#00D68F;--green-soft:#00D68F22;--red:#FF4757;--yellow:#FFBE0B;--purple:#A855F7;--cyan:#06D6A0;--text:#E4E4F0;--text-dim:#7878A0;--text-faint:#4A4A6A;--border:#252545;--border-light:#303060;--radius:14px;--radius-sm:8px;}

<script>
// ============================================================
// PASSWORD GATE (inline, loads immediately)
// ============================================================
const PW_HASH = '6226630ff689c1879f1439e37ec1e4989a65d2fb3850ed87afa6c4edbad34664';

async function hashPassword(pw) {
  const data = new TextEncoder().encode(pw);
  const buffer = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function isAuthenticated() { return sessionStorage.getItem('ct_auth') === 'true'; }

function showLoginScreen() {
  document.getElementById('app').innerHTML = `
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;animation:fadeUp .5s ease;">
      <div style="font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:800;background:linear-gradient(135deg,#FF3366,#4E7CFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;">CardTracker</div>
      <div style="color:#7878A0;font-size:14px;margin-bottom:40px;">Enter password to access your dashboard</div>
      <div style="background:#161630;border:1px solid #252545;border-radius:14px;padding:32px;width:380px;max-width:90vw;">
        <div style="margin-bottom:16px;">
          <label style="font-size:10px;color:#7878A0;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;">Password</label>
          <input type="password" id="pwInput" placeholder="Enter password" style="width:100%;padding:12px 16px;background:#0B0B14;border:1px solid #252545;border-radius:8px;color:#E4E4F0;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;" autofocus>
        </div>
        <div id="pwError" style="color:#FF4757;font-size:12px;margin-bottom:12px;display:none;">Incorrect password. Try again.</div>
        <button id="pwBtn" style="width:100%;padding:12px;background:#FF3366;border:none;border-radius:8px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;">Sign In</button>
      </div>
      <div style="color:#4A4A6A;font-size:11px;margin-top:24px;">🔒 Password protected</div>
    </div>`;

  const input = document.getElementById('pwInput');
  const btn = document.getElementById('pwBtn');
  const err = document.getElementById('pwError');

  async function tryLogin() {
    const hash = await hashPassword(input.value);
    if (hash === PW_HASH) {
      sessionStorage.setItem('ct_auth', 'true');
      err.style.display = 'none';
      loadApp();
    } else {
      err.style.display = 'block';
      input.value = '';
      input.focus();
      input.style.borderColor = '#FF4757';
      setTimeout(() => { input.style.borderColor = '#252545'; }, 1500);
    }
  }
  btn.addEventListener('click', tryLogin);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
}

function loadApp() {
  // Set a flag so we only reload once after login
  sessionStorage.setItem('ct_just_logged_in', 'true');
  window.location.reload();
}

// On page load, check auth
document.addEventListener('DOMContentLoaded', function() {
  if (isAuthenticated()) {
    // If we just logged in, clear the flag and let the module script run
    if (sessionStorage.getItem('ct_just_logged_in') === 'true') {
      sessionStorage.removeItem('ct_just_logged_in');
      // Module script will handle it — show loading state
      document.getElementById('app').innerHTML = '<div style="text-align:center;padding:100px 20px;color:#7878A0;"><div style="font-size:32px;margin-bottom:12px;">📊</div><div style="font-size:16px;font-weight:600;">Loading CardTracker...</div><div style="font-size:12px;margin-top:8px;">Connecting to cloud database</div></div>';
    }
    // Otherwise module script is already running, do nothing
  } else {
    showLoginScreen();
  }
});
</script>
</head>
<body>
<div class="app" id="app"></div>
</body>
