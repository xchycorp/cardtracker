function rResearchCard(rs) {
  const c = rs.selectedCard;
  const img = c.image ? c.image + '/low.webp' : '';
  const setName = c.set ? c.set.name : '';
  const tp = c.pricing?.tcgplayer || {};
  const cm = c.pricing?.cardmarket || {};
  
  // Collect all available TCGPlayer variant prices
  const variants = [];
  for (const [key, val] of Object.entries(tp)) {
    if (typeof val === 'object' && val !== null && key !== 'updated' && key !== 'unit') {
      variants.push({variant: key, ...val});
    }
  }
  // If no variant objects found, check if prices are at top level (flat structure)
  if (!variants.length && (tp.marketPrice || tp.lowPrice || tp.midPrice)) {
    variants.push({variant: 'market', marketPrice: tp.marketPrice, lowPrice: tp.lowPrice, midPrice: tp.midPrice, highPrice: tp.highPrice});
  }
  
  // Build Cardmarket fallback data
  const cmHasData = cm.avg || cm.low || cm.trend;
  const cmEstUSD = cm.avg ? (cm.avg * 1.08).toFixed(2) : cm.trend ? (cm.trend * 1.08).toFixed(2) : '';
  
  return `
    <div style="display:flex;gap:20px;margin-bottom:20px">
      ${img?`<img src="${img}" style="width:120px;height:168px;object-fit:contain;border-radius:8px;flex-shrink:0">`:''}
      <div style="flex:1">
        <div style="font-size:18px;font-weight:700">${c.name||''}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${setName} · #${c.localId||''} · ${c.rarity||'Unknown'} · <span style="color:var(--text-faint)">${c.id||''}</span></div>
        ${c.hp?`<div style="font-size:12px;color:var(--text-dim);margin-top:2px">HP: ${c.hp} · ${(c.types||[]).join(', ')}</div>`:''}
        <div style="margin-top:12px">
          <div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:6px">TCGPlayer PRICING (Raw/Ungraded)</div>
          ${variants.length?variants.map(v=>`
            <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px;font-weight:600;width:100px;text-transform:capitalize">${v.variant}</span>
              ${v.marketPrice?`<span style="color:var(--green);font-weight:600">Market: $${Number(v.marketPrice).toFixed(2)}</span>`:''}
              ${v.lowPrice?`<span style="color:var(--text-dim);font-size:11px">Low: $${Number(v.lowPrice).toFixed(2)}</span>`:''}
              ${v.midPrice?`<span style="color:var(--text-dim);font-size:11px">Mid: $${Number(v.midPrice).toFixed(2)}</span>`:''}
              ${v.highPrice?`<span style="color:var(--text-dim);font-size:11px">High: $${Number(v.highPrice).toFixed(2)}</span>`:''}
            </div>
          `).join(''):cmHasData?`
            <div style="font-size:12px;color:var(--text-dim);margin-bottom:6px">No TCGPlayer (US) pricing — showing Cardmarket (EU) as reference:</div>
            <div style="display:flex;align-items:center;gap:12px;padding:6px 0;border-bottom:1px solid var(--border)">
              <span style="font-size:12px;font-weight:600;width:100px">Cardmarket</span>
              ${cm.avg?`<span style="color:var(--green);font-weight:600">Avg: €${Number(cm.avg).toFixed(2)}</span>`:''}
              ${cm.low?`<span style="color:var(--text-dim);font-size:11px">Low: €${Number(cm.low).toFixed(2)}</span>`:''}
              ${cm.trend?`<span style="color:var(--text-dim);font-size:11px">Trend: €${Number(cm.trend).toFixed(2)}</span>`:''}
            </div>
            ${cmEstUSD?`<div style="font-size:11px;color:var(--text-faint);margin-top:4px">~$${cmEstUSD} USD estimate (approximate conversion)</div>`:''}
          `:'<div style="color:var(--text-dim);font-size:12px">No pricing data available for this card</div>'}
        </div>
    </div>
  `;
}

function rGradedMatrix(rs) {
  const rows = [
    {label:'Pristine', psa:'', cgc:'10.1', bgs:''},
    {label:'10', psa:'10', cgc:'10', bgs:'10'},
    {label:'9.5', psa:'', cgc:'9.5', bgs:'9.5'},
    {label:'9', psa:'9', cgc:'9', bgs:'9'},
    {label:'8.5', psa:'', cgc:'8.5', bgs:'8.5'},
    {label:'8', psa:'8', cgc:'8', bgs:'8'},
    {label:'7', psa:'7', cgc:'7', bgs:'7'},
    {label:'6', psa:'6', cgc:'6', bgs:'6'}
  ];
  function cell(val, key) {
    if (!key) return '<td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right;color:var(--text-faint)">\u2014</td>';
    if (val) return `<td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right"><span style="color:var(--green)">$${Number(val).toFixed(2)}</span></td>`;
    return `<td style="padding:6px 8px;border-bottom:1px solid var(--border);text-align:right"><input type="number" class="qe-input" style="width:80px;text-align:right;display:inline-block" placeholder="\u2014" step="0.01" oninput="window.researchState.prices['${key}']=this.value"></td>`;
  }
  return `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr>
      <th style="text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Grade</th>
      <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">PSA</th>
      <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">CGC</th>
      <th style="text-align:right;padding:6px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">BGS</th>
    </tr></thead>
    <tbody>${rows.map(r => {
      const p = r.psa ? (rs.prices['PSA_'+r.psa]||'') : '';
      const c = r.cgc ? (rs.prices['CGC_'+r.cgc]||'') : '';
      const b = r.bgs ? (rs.prices['BGS_'+r.bgs]||'') : '';
      return `<tr${r.label==='Pristine'?' style="background:rgba(255,215,0,.06)"':''}>
        <td style="padding:6px 8px;border-bottom:1px solid var(--border);font-weight:600">${r.label}</td>
        ${cell(p, r.psa?'PSA_'+r.psa:'')}${cell(c, r.cgc?'CGC_'+r.cgc:'')}${cell(b, r.bgs?'BGS_'+r.bgs:'')}
      </tr>`;
    }).join('')}</tbody>
  </table>
  <div style="font-size:10px;color:var(--text-faint);margin-top:8px;font-style:italic">Prices auto-populate from eBay. You can also enter manually.</div>`;
}

function rRegradeResult(rs) {
  const buy = num(rs.buyPrice);
  const fee = num(rs.gradingFee);
  const ebayFeeRate = rs.includeEbayFee ? 0.16 : 0;
  if (!buy || !rs.targetGrade) return '<div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:var(--radius-sm);text-align:center;color:var(--text-dim);font-size:12px">Enter a buy price and target grade, then click Calculate.</div>';
  
  const totalCost = buy + fee;
  const targetKey = rs.targetCompany + '_' + rs.targetGrade;
  const targetPrice = num(rs.prices[targetKey]);
  
  // Net after eBay fees
  const targetNet = targetPrice ? targetPrice * (1 - ebayFeeRate) : 0;
  
  // One grade below for risk analysis
  const gradeNum = parseFloat(rs.targetGrade);
  const belowGrade = gradeNum >= 10 ? '9.5' : gradeNum >= 9.5 ? '9' : gradeNum >= 9 ? '8.5' : gradeNum >= 8.5 ? '8' : String(gradeNum - 1);
  const belowKey = rs.targetCompany + '_' + belowGrade;
  const belowPrice = num(rs.prices[belowKey]);
  const belowNet = belowPrice ? belowPrice * (1 - ebayFeeRate) : 0;
  
  return `
    <div style="margin-top:16px;padding:16px;background:var(--bg);border-radius:var(--radius-sm)">
      <div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:10px">ANALYSIS${rs.includeEbayFee?' (after ~16% eBay fees)':''}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">Total Cost</div>
          <div style="font-size:18px;font-weight:700;color:var(--text)">$${totalCost.toFixed(2)}</div>
          <div style="font-size:10px;color:var(--text-faint)">$${buy.toFixed(2)} card + $${fee.toFixed(2)} grading</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">${rs.targetCompany} ${rs.targetGrade} ${rs.includeEbayFee?'Net':'Value'}</div>
          <div style="font-size:18px;font-weight:700;${targetPrice?'color:var(--green)':'color:var(--text-faint)'}">${targetPrice?(rs.includeEbayFee?'$'+targetNet.toFixed(2):'$'+targetPrice.toFixed(2)):'Enter price →'}</div>
          ${targetPrice?`<div style="font-size:10px;color:var(--text-faint)">${rs.includeEbayFee?`Sell $${targetPrice.toFixed(2)} - $${(targetPrice*ebayFeeRate).toFixed(2)} fees`:''}</div>`:''}
          ${targetPrice?`<div style="font-size:10px;color:${(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?'var(--green)':'var(--red)'}">Profit: $${((rs.includeEbayFee?targetNet:targetPrice)-totalCost).toFixed(2)} (${totalCost?((((rs.includeEbayFee?targetNet:targetPrice)-totalCost)/totalCost)*100).toFixed(0):'0'}% ROI)</div>`:''}
        </div>
        <div style="text-align:center">
          <div style="font-size:11px;color:var(--text-dim)">${rs.targetCompany} ${belowGrade} ${rs.includeEbayFee?'Net':'Value'}</div>
          <div style="font-size:18px;font-weight:700;${belowPrice?'color:var(--yellow)':'color:var(--text-faint)'}">${belowPrice?(rs.includeEbayFee?'$'+belowNet.toFixed(2):'$'+belowPrice.toFixed(2)):'Enter price →'}</div>
          ${belowPrice?`<div style="font-size:10px;color:${(rs.includeEbayFee?belowNet:belowPrice)-totalCost>=0?'var(--green)':'var(--red)'}">If downgraded: $${((rs.includeEbayFee?belowNet:belowPrice)-totalCost).toFixed(2)}</div>`:''}
        </div>
      </div>
      ${targetPrice?`
      <div style="padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;text-align:center;${(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?'background:rgba(46,213,115,.12);color:var(--green);border:1px solid var(--green)':'background:rgba(255,71,87,.12);color:var(--red);border:1px solid var(--red)'}">
        ${(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?
          `✅ PROFITABLE at ${rs.targetCompany} ${rs.targetGrade} — $${((rs.includeEbayFee?targetNet:targetPrice)-totalCost).toFixed(2)} profit (${((((rs.includeEbayFee?targetNet:targetPrice)-totalCost)/totalCost)*100).toFixed(0)}% ROI)`:
          `❌ NOT PROFITABLE at ${rs.targetCompany} ${rs.targetGrade} — loss of $${Math.abs((rs.includeEbayFee?targetNet:targetPrice)-totalCost).toFixed(2)}`}
      </div>
      ${belowPrice&&(rs.includeEbayFee?targetNet:targetPrice)-totalCost>=0?`
      <div style="margin-top:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:12px;text-align:center;background:var(--bg);border:1px solid var(--border)">
        ⚠️ Risk: If it grades ${belowGrade} instead, ${(rs.includeEbayFee?belowNet:belowPrice)-totalCost>=0?`you still profit $${((rs.includeEbayFee?belowNet:belowPrice)-totalCost).toFixed(2)}`:`you lose $${Math.abs((rs.includeEbayFee?belowNet:belowPrice)-totalCost).toFixed(2)}`}
      </div>`:''}`
      :'<div style="font-size:12px;color:var(--text-dim);text-align:center">Fill in the graded price matrix above to see profit/loss analysis</div>'}
    </div>
  `;
}

// Crack candidate list management
window.addToCrackList = function() {
  const rs = window.researchState;
  const customInput = document.getElementById('ebay_custom_search');
  const cardName = customInput?.value?.trim() || rs.cardName || (rs.selectedCard ? rs.selectedCard.name : '');
  if (!cardName) { showToast('Search for a card first'); return; }
  
  const psa8 = num(rs.prices['PSA_8']);
  const cgc9 = num(rs.prices['CGC_9']);
  const cgc10 = num(rs.prices['CGC_10']);
  
  if (!psa8) { showToast('Fill in PSA 8 price in the graded matrix first (this is your buy price)'); return; }
  if (!cgc9 && !cgc10) { showToast('Fill in CGC 9 or CGC 10 price in the graded matrix first'); return; }
  
  if (D.crackList.find(c => c.cardName === cardName)) { showToast('Card already in crack list'); return; }
  
  const gradingFee = num(rs.gradingFee) || 20;
  const totalCost = psa8 + gradingFee;
  const feeRate = rs.includeEbayFee ? 0.16 : 0;
  const bestNet = Math.max((cgc9||0) * (1-feeRate), (cgc10||0) * (1-feeRate));
  const profit = bestNet - totalCost;
  const roi = totalCost > 0 ? (profit / totalCost) * 100 : 0;
  
  D.crackList.push({
    cardName, buyPrice: psa8, cgc9: cgc9||0, cgc10: cgc10||0,
    gradingFee, profit, roi, dateAdded: new Date().toISOString().slice(0,10)
  });
  
  // Also keep in session state for display
  rs.crackCandidates = D.crackList;
  saveData();
  render();
  showToast(`Added ${cardName} — ${profit >= 0 ? '+' : '-'}$${Math.abs(profit).toFixed(2)} potential`);
};

window.removeCrackCandidate = function(idx) {
  D.crackList.splice(idx, 1);
  window.researchState.crackCandidates = D.crackList;
  saveData();
  render();
};

window.clearCrackList = function() {
  if (confirm('Clear all crack candidates?')) {
    D.crackList = [];
    window.researchState.crackCandidates = D.crackList;
    saveData();
    render();
  }
};

// Research tab search functions
let researchSearchTimer = null;
window.researchSearchDebounce = function(val) {
  clearTimeout(researchSearchTimer);
  window.researchState.cardName = val;
  const resultsEl = document.getElementById('research-search-results');
  if (!resultsEl) return;
  if (!val || val.length < 3) { resultsEl.style.display = 'none'; return; }
  researchSearchTimer = setTimeout(() => researchSearch(val), 600);
};

async function researchSearch(query) {
  const resultsEl = document.getElementById('research-search-results');
  if (!resultsEl) return;
  try {
    const query_lower = query.toLowerCase().trim();
    const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
    let setFilter = '', nameFilter = query;
    for (const setKw of setKeywords) {
      if (query_lower.startsWith(setKw + ' ') || query_lower === setKw) { setFilter = setKw; nameFilter = query.slice(setKw.length).trim(); break; }
    }
    let params = [];
    if (setFilter) params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
    const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
    if (remainingNumMatch) {
      if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
      params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
    } else if (nameFilter) {
      params.push(`name=like:${encodeURIComponent(nameFilter)}`);
    }
    params.push('pagination:itemsPerPage=6');
    const url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
    const resp = await fetch(url);
    if (!resp.ok) return;
    const cards = await resp.json();
    if (!cards.length) { resultsEl.innerHTML = '<div style="padding:12px;color:var(--text-dim);font-size:12px;text-align:center">No cards found</div>'; resultsEl.style.display = 'block'; return; }
    const details = await Promise.all(cards.slice(0,6).map(async c => {
      try { const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`); if (r.ok) return await r.json(); return c; } catch(e) { return c; }
    }));
    window._researchResults = details;
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = details.map((c, idx) => {
      const setName = c.set ? c.set.name : '';
      const number = c.localId || '';
      const img = c.image ? c.image + '/low.webp' : '';
      const tp = c.pricing?.tcgplayer || {};
      const price = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice || tp.holofoil?.marketPrice || tp.holo?.midPrice || tp.normal?.midPrice || '';
      return `<div class="pokemon-result" onclick="selectResearchCard(${idx})">
        ${img?`<img src="${img}" class="pokemon-result-img" loading="lazy">`:''}
        <div class="pokemon-result-info">
          <div class="pokemon-result-name">${setName} ${c.name||''} #${number}</div>
          <div class="pokemon-result-meta">${c.rarity||''} · <span style="color:var(--text-faint)">${c.id||''}</span> ${price?`· <span style="color:var(--green)">$${Number(price).toFixed(2)}</span>`:''}</div>
        </div>
      </div>`;
    }).join('');
  } catch(e) { /* fail silently */ }
}

window.selectResearchCard = function(idx) {
  if (!window._researchResults || !window._researchResults[idx]) return;
  const card = window._researchResults[idx];
  window.researchState.selectedCard = card;
  window.researchState.cardName = `${card.set?card.set.name:''} ${card.name||''} #${card.localId||''}`.trim();
  window.researchState.prices = {};

  window.researchState._ebayCustomQuery = '';

// Research PokeTrace lookup
window.researchPokertraceLookup = async function() {
  const rs = window.researchState;
  if (!window.poketraceState.apiKey) return;
  
  let setName = '', pokeName = '', number = '', matchName = '';
  
  if (rs.selectedCard) {
    setName = rs.selectedCard.set ? rs.selectedCard.set.name : '';
    pokeName = rs.selectedCard.name || '';
    number = rs.selectedCard.localId || '';
    matchName = `${setName} ${pokeName} #${number}`.trim();
  } else if (rs.cardName) {
    matchName = rs.cardName;
    // Try to extract parts from formatted name like "Set Name Pokemon #123"
    const parts = rs.cardName.match(/^(.+?)\s+#(\d+)/);
    if (parts) {
      number = parts[2];
      const beforeNum = parts[1].trim();
      // Last word is likely the pokemon name
      const words = beforeNum.split(/\s+/);
      pokeName = words.pop() || '';
      setName = words.join(' ');
    } else {
      pokeName = rs.cardName;
    }
  } else if (rs._ebayCustomQuery) {
    matchName = rs._ebayCustomQuery;
    pokeName = rs._ebayCustomQuery;
  }
  
  if (!pokeName && !setName) { showToast('Search for a card first'); return; }
  
  rs._poketraceError = '';
  showToast('Searching PokeTrace...');
  
  // Try multiple search strategies to find the right card
  const strategies = [];
  // Strategy 1: Pokemon name + number (most specific for PokeTrace's search)
  if (pokeName && number) strategies.push({ query: `${pokeName} ${number}`, label: 'name+number' });
  // Strategy 2: Set name + pokemon name + number
  if (setName && pokeName && number) strategies.push({ query: `${setName} ${pokeName} ${number}`, label: 'set+name+number' });
  // Strategy 3: Set name + pokemon name (broader)
  if (setName && pokeName) strategies.push({ query: `${setName} ${pokeName}`, label: 'set+name' });
  // Strategy 4: Just pokemon name (broadest fallback)
  if (pokeName) strategies.push({ query: pokeName, label: 'name only' });
  
  try {
    let best = null;
    
    for (const strat of strategies) {
      dbg('PokeTrace', 'Research try: "' + strat.query + '" (' + strat.label + '), match: "' + matchName + '"');
      const ptData = await poketraceSearch(strat.query);
      if (!ptData || !ptData.data || !ptData.data.length) continue;
      
      const candidate = pokectraceBestMatch(ptData, matchName);
      if (!candidate) continue;
      
      // Check if the match is actually good — number must match if we have a target number
      if (number) {
        const cn = (candidate.cardNumber || '').split('/')[0].replace(/^0+/, '');
        const tn = number.replace(/^0+/, '');
        if (cn === tn) {
          dbg('PokeTrace', '✓ Number match confirmed: #' + cn + ' (' + strat.label + ')');
          best = candidate;
          break;
        } else {
          dbg('PokeTrace', '✗ Wrong number: got #' + cn + ', wanted #' + tn + ' (' + strat.label + ')');
          // Keep searching with other strategies, but save as fallback
          if (!best) best = candidate;
        }
      } else {
        // No number to match against, take the best score
        best = candidate;
        break;
      }
    }
    
    if (best) {
      rs._poketraceData = best;
      render();
      const nm = poketraceNMPrice(best);
      showToast(nm ? `PokeTrace: $${Number(nm.avg).toFixed(2)} (${nm.source})` : 'PokeTrace found card but no price');
    } else {
      rs._poketraceData = null;
      render();
      showToast('No PokeTrace results found');
    }
  } catch(err) {
    rs._poketraceError = 'PokeTrace error: ' + err.message;
    render();
  }
};

// Research eBay lookup
window.researchEbayLookup = async function() {
  const rs = window.researchState;
  if (!rs.selectedCard || !window.ebayState.appId) return;
  const c = rs.selectedCard;
  const cardName = c.name || '';
  const setName = c.set ? c.set.name : '';
  const number = c.localId || '';
  
  const setShort = setName.split(' ').slice(0, 2).join(' ').replace(/[^a-zA-Z0-9\s]/g, '').trim();
  const numClean = number.replace(/[^\d]/g, '');
  
  // Build a consistent base query used for ALL searches (raw + graded)
  const baseQuery = `${setShort} ${cardName} ${numClean}`.trim();
  
  // Populate the custom search box so Fill Matrix uses the same query
  rs._ebayCustomQuery = baseQuery;
  const customInput = document.getElementById('ebay_custom_search');
  if (customInput) customInput.value = baseQuery;
  
  rs._ebayError = '';
  rs.prices = {};
  showToast('Searching eBay...');
  dbg('Research', 'Auto Search base query: ' + baseQuery);
  
  try {
    // Search raw card
    const rawQuery = `${baseQuery} -PSA -CGC -BGS -SGC -graded -slab`;
    const rawResults = await ebaySearch(rawQuery, 25);
    let rawSummary = ebayPricingSummary(rawResults);
    
    // Fallback: just card name + number (drop set abbreviation)
    if (!rawSummary) {
      const fallbackQuery = `${cardName} ${numClean} -PSA -CGC -BGS -SGC -graded -slab`.trim();
      const fallbackResults = await ebaySearch(fallbackQuery, 25);
      rawSummary = ebayPricingSummary(fallbackResults);
    }
    
    // Search graded variants using the SAME base query
    const graded = {};
    const gradeSearches = [
      {query:'PSA 10', key:'PSA_10'},
      {query:'PSA 9', key:'PSA_9'},
      {query:'PSA 8', key:'PSA_8'},
      {query:'PSA 7', key:'PSA_7'},
      {query:'CGC Pristine 10', key:'CGC_10.1'},
      {query:'CGC 10 -Pristine', key:'CGC_10'},
      {query:'CGC 9.5', key:'CGC_9.5'},
      {query:'CGC 9', key:'CGC_9'},
      {query:'CGC 8.5', key:'CGC_8.5'},
      {query:'CGC 8', key:'CGC_8'},
      {query:'BGS 10', key:'BGS_10'},
      {query:'BGS 9.5', key:'BGS_9.5'},
      {query:'BGS 9', key:'BGS_9'},
      {query:'BGS 8', key:'BGS_8'}
    ];
    for (const gs of gradeSearches) {
      const gQuery = `${baseQuery} ${gs.query} -lot -bundle -mystery -repack`.trim();
      const gResults = await ebaySearch(gQuery, 15);
      const gSummary = ebayPricingSummary(gResults);
      if (gSummary && gSummary.count >= 1) {
        const label = gs.query.replace('-Pristine','').trim();
        graded[label] = gSummary;
        rs.prices[gs.key] = gSummary.median.toFixed(2);
      }
    }
    
    const ebayData = rawSummary ? {...rawSummary, graded: Object.keys(graded).length ? graded : null, query: baseQuery} : {count:0, query: baseQuery};
    rs._ebayData = ebayData;
    render();
    showToast(rawSummary ? `Found ${rawSummary.count} eBay listings!` : 'No eBay listings found');
  } catch(err) {
    rs._ebayError = 'eBay error: ' + err.message;
    render();
    showToast('eBay search failed');
  }
};

      {re:/PSA\s*7(?!\.\d)/i, key:'PSA_7'},
      {re:/CGC\s*(PRISTINE|10\s*PRISTINE|PRISTINE\s*10)/i, key:'CGC_10.1'},
      {re:/CGC\s*10(?!\.\d)(?!\s*PRISTINE)/i, key:'CGC_10'},
      {re:/CGC\s*9\.5/i, key:'CGC_9.5'},
      {re:/CGC\s*9(?!\.\d)/i, key:'CGC_9'},
      {re:/CGC\s*8\.5/i, key:'CGC_8.5'},
      {re:/CGC\s*8(?!\.\d)/i, key:'CGC_8'},
      {re:/BGS\s*10/i, key:'BGS_10'},
      {re:/BGS\s*9\.5/i, key:'BGS_9.5'},
      {re:/BGS\s*9(?!\.\d)/i, key:'BGS_9'},
      {re:/BGS\s*8(?!\.\d)/i, key:'BGS_8'}
    ];
    if (summary) {
      for (const gp of gradePatterns) {
        if (gp.re.test(query)) {
          rs.prices[gp.key] = summary.median.toFixed(2);
          break;
        }
      }
    }
    
    render();
    showToast(summary ? `Found ${summary.count} listings!` : 'No listings found');
  } catch(err) {
    rs._ebayError = 'eBay error: ' + err.message;
    render();
  }
};

// eBay OAuth token management
async function getEbayToken() {
  const eb = window.ebayState;
  if (!eb.appId || !eb.certId) { dbg('eBay', 'No credentials set'); return null; }
  if (eb.token && Date.now() < eb.tokenExpiry - 300000) { dbg('eBay', 'Using cached token'); return eb.token; }
  try {
    const creds = btoa(`${eb.appId}:${eb.certId}`);
    dbg('eBay', 'Requesting new token via allorigins proxy');
    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.ebay.com/identity/v1/oauth2/token');
    const resp = await fetch(proxyUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/x-www-form-urlencoded',
        'Authorization': `Basic ${creds}`
      },
      body: 'grant_type=client_credentials&scope=https://api.ebay.com/oauth/api_scope'
    });
    if (!resp.ok) throw new Error('eBay auth failed: ' + resp.status);
    const data = await resp.json();
    eb.token = data.access_token;
    eb.tokenExpiry = Date.now() + (data.expires_in * 1000);
    dbg('eBay', 'Token obtained, expires in ' + data.expires_in + 's');
    return eb.token;
  } catch(e) {
    dbg('eBay', 'Token error (proxy1): ' + e.message);
    // Try alternative proxy
    try {
      const creds = btoa(`${eb.appId}:${eb.certId}`);
      const resp = await fetch('https://corsproxy.io/?https://api.ebay.com/identity/v1/oauth2/token', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'Authorization': `Basic ${creds}`
        },
        body: 'grant_type=client_credentials&scope=https://api.ebay.com/oauth/api_scope'
      });
      if (!resp.ok) throw new Error('eBay auth (proxy2) failed: ' + resp.status);
      const data = await resp.json();
      eb.token = data.access_token;
      eb.tokenExpiry = Date.now() + (data.expires_in * 1000);
      eb._proxyBase = 'https://corsproxy.io/?';
      dbg('eBay', 'Token obtained via corsproxy fallback');
      return eb.token;
    } catch(e2) {
      dbg('eBay', 'Token error (both proxies): ' + e2.message);
      return null;
    }
  }
}

// eBay Browse API search for active listings
async function ebaySearch(query, limit = 20) {
  const token = await getEbayToken();
  if (!token) { dbg('eBay', 'Search aborted — no token'); showToast('eBay authentication failed — check console'); return null; }
  try {
    const ebayUrl = `https://api.ebay.com/buy/browse/v1/item_summary/search?q=${encodeURIComponent(query)}&limit=${limit}&category_ids=183454&filter=buyingOptions:{FIXED_PRICE|AUCTION}`;
    const proxyBase = window.ebayState._proxyBase || 'https://api.allorigins.win/raw?url=';
    const url = proxyBase + encodeURIComponent(ebayUrl);
    dbg('eBay', 'Searching: ' + query);
    const resp = await fetch(url, {
      headers: {
        'Authorization': `Bearer ${token}`,
        'X-EBAY-C-MARKETPLACE-ID': 'EBAY_US',
        'X-EBAY-C-ENDUSERCTX': 'contextualLocation=country=US,zip=19104'
      }
    });
    if (!resp.ok) {
      const errBody = await resp.text().catch(()=>'');
      dbg('eBay', 'Search error ' + resp.status, errBody.substring(0, 150));
      return null;
    }
    const data = await resp.json();
    dbg('eBay', 'Found ' + (data.total || 0) + ' results for: ' + query);
    return data;
  } catch(e) {
    dbg('eBay', 'Search fetch error: ' + e.message);
    return null;
  }
}

// Process eBay results into pricing summary with outlier removal
function ebayPricingSummary(results) {
  if (!results || !results.itemSummaries || !results.itemSummaries.length) return null;
  const items = results.itemSummaries;
  const prices = items.map(i => parseFloat(i.price?.value || 0)).filter(p => p > 0).sort((a,b) => a - b);
  if (!prices.length) return null;
  
  // Remove outliers using IQR method (interquartile range)
  const q1Idx = Math.floor(prices.length * 0.25);
  const q3Idx = Math.floor(prices.length * 0.75);
  const q1 = prices[q1Idx];
  const q3 = prices[q3Idx];
  const iqr = q3 - q1;
  const lowerBound = q1 - (iqr * 1.5);
  const upperBound = q3 + (iqr * 1.5);
  
  // Only filter if we have enough data points (5+), otherwise use all
  const filtered = prices.length >= 5 ? prices.filter(p => p >= lowerBound && p <= upperBound) : prices;
  const usePrices = filtered.length >= 2 ? filtered : prices;
  
  const sum = usePrices.reduce((a,b) => a + b, 0);
  // Include listing titles for debugging
  const listings = items.map(i => ({title: i.title||'', price: parseFloat(i.price?.value||0)})).filter(l => l.price > 0);
  return {
    count: usePrices.length,
    low: usePrices[0],
    high: usePrices[usePrices.length - 1],
    avg: sum / usePrices.length,
    median: usePrices[Math.floor(usePrices.length / 2)],
    totalResults: results.total || prices.length,
    outliers: prices.length - usePrices.length,
    listings: listings
  };
}

// Find best matching card from PokeTrace results
function pokectraceBestMatch(ptData, cardName) {
  if (!ptData || !ptData.data || !ptData.data.length) return null;
  if (ptData.data.length === 1) return ptData.data[0];
  
  const nameLower = (cardName || '').toLowerCase();
  const numMatch = cardName.match(/#(\d+)/);
  const targetNum = numMatch ? numMatch[1] : '';
  // Strip leading zeros for comparison but keep original for exact match
  const targetNumStripped = targetNum.replace(/^0+/, '') || targetNum;
  
  // Extract set name words from the search for set matching
  const nameWithoutNum = nameLower.replace(/#\d+.*$/, '').trim();
  const nameWords = nameWithoutNum.split(/\s+/).filter(function(w) { return w.length >= 3; });
  
  // Score each result
  let bestScore = -1;
  let bestCard = null;
  
  ptData.data.forEach(function(card) {
    let score = 0;
    // Parse the card number from PokeTrace format "013/100" or "231"
    const rawCN = (card.cardNumber || '').split('/')[0];
    const cnStripped = rawCN.replace(/^0+/, '') || rawCN;
    const setNameLower = (card.set?.name || '').toLowerCase();
    const setSlugLower = (card.set?.slug || '').toLowerCase();
    const cardNameLower = (card.name || '').toLowerCase();
    
    // EXACT card number match (most important — worth 20 points)
    if (targetNum && cnStripped === targetNumStripped) {
      score += 20;
    } else if (targetNum) {
      // Wrong number — apply penalty to push mismatches down
      score -= 5;
    }
    
    // Set name matching — check if set words appear in the result's set name
    nameWords.forEach(function(word) {
      if (setNameLower.includes(word)) score += 3;
      else if (setSlugLower.includes(word)) score += 2;
    });
    
    // Bonus if the pokemon name from the result appears in the search
    if (cardNameLower.length > 2 && nameLower.includes(cardNameLower)) score += 5;
    
    // Bonus if full set name appears in the search
    if (setNameLower.length > 3 && nameLower.includes(setNameLower)) score += 8;
    
    if (score > bestScore) {
      bestScore = score;
      bestCard = card;
    }
  });
  
  // Log what we matched for debugging
  if (bestCard) {
    dbg('PokeTrace', 'Best match: ' + (bestCard.name || '') + ' #' + ((bestCard.cardNumber || '').split('/')[0]) + ' from ' + (bestCard.set?.name || '') + ' (score: ' + bestScore + ')');
  }
  
  return bestCard || ptData.data[0];
}

// Extract best sold price from PokeTrace card — tries NM first, falls back to other conditions
function poketraceNMPrice(card) {
  if (!card || !card.prices) return null;
  
  // Priority order: NM > LP > MP > HP > Damaged
  const conditions = ['NEAR_MINT', 'LIGHTLY_PLAYED', 'MODERATELY_PLAYED', 'HEAVILY_PLAYED', 'DAMAGED'];
  const condLabels = { NEAR_MINT: 'NM', LIGHTLY_PLAYED: 'LP', MODERATELY_PLAYED: 'MP', HEAVILY_PLAYED: 'HP', DAMAGED: 'DMG' };
  
  // Try eBay sold prices first (prefer over TCGPlayer)
  for (const cond of conditions) {
    const eb = card.prices?.ebay?.[cond];
    if (eb && eb.avg) {
      return { avg: eb.avg, low: eb.low, high: eb.high, saleCount: eb.saleCount, avg7d: eb.avg7d, avg30d: eb.avg30d, lastUpdated: eb.lastUpdated, source: 'PokeTrace (eBay sold' + (cond !== 'NEAR_MINT' ? ' · ' + condLabels[cond] : '') + ')' };
    }
  }
  
  // Fallback to TCGPlayer sold prices
  for (const cond of conditions) {
    const tc = card.prices?.tcgplayer?.[cond];
    if (tc && tc.avg) {
      return { avg: tc.avg, low: tc.low, high: tc.high, saleCount: tc.saleCount, avg7d: tc.avg7d, avg30d: tc.avg30d, lastUpdated: tc.lastUpdated, source: 'PokeTrace (TCGPlayer sold' + (cond !== 'NEAR_MINT' ? ' · ' + condLabels[cond] : '') + ')' };
    }
  }
  
  return null;
}

// Get all condition prices from PokeTrace
function poketraceAllPrices(card) {
  if (!card || !card.prices) return null;
  const conditions = ['NEAR_MINT', 'LIGHTLY_PLAYED', 'MODERATELY_PLAYED', 'HEAVILY_PLAYED', 'DAMAGED'];
  const condLabels = { NEAR_MINT: 'Near Mint', LIGHTLY_PLAYED: 'Lightly Played', MODERATELY_PLAYED: 'Moderately Played', HEAVILY_PLAYED: 'Heavily Played', DAMAGED: 'Damaged' };
  const result = { ebay: [], tcgplayer: [] };
  conditions.forEach(cond => {
    const eb = card.prices?.ebay?.[cond];
    if (eb && eb.avg) result.ebay.push({ condition: condLabels[cond], ...eb });
    const tc = card.prices?.tcgplayer?.[cond];
    if (tc && tc.avg) result.tcgplayer.push({ condition: condLabels[cond], ...tc });
  });
  return result;
}

async function scannerIdentify(base64DataUrl) {
  const ss = window.scannerState;
  try {
    // Extract the base64 data and media type
    const match = base64DataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
    if (!match) throw new Error('Invalid image format');
    
    // Resize image if too large
    let imgData = match[2];
    let mediaType = match[1];
    if (imgData.length > 500000) {
      const compressed = await compressImage(base64DataUrl, 800);
      const cMatch = compressed.match(/^data:(image\/\w+);base64,(.+)$/);
      if (cMatch) { mediaType = cMatch[1]; imgData = cMatch[2]; }
    }
    
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ss.apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: imgData }
            },
            {
              type: 'text',
              text: `Identify this Pokemon trading card. Respond ONLY with a JSON object, no other text or markdown. Use this exact format:
{"name":"Card Name","set":"Set Name","number":"Card Number","edition":"1st Edition or Shadowless or Pre-Release or Promo or empty string if none","rarity":"Rarity","holo":true/false,"cardType":"Pokemon or Trainer or Energy","language":"English or Japanese etc","notes":"any other notable details"}
Important: For the number field, use ONLY the card number itself, NOT the set total (e.g. 8/102 = just "8").

CRITICAL — Check for these edition/variant indicators very carefully:
- SHADOWLESS: Look at the RIGHT SIDE of the card art border. If there is NO drop shadow (dark vertical line) on the right edge of the art box, it is Shadowless. Also check the bottom frame — no shadow under the card border. Only applies to the original Base Set (1999).
- 1ST EDITION: Look for a circled "1" stamp with "EDITION" text, usually on the left side below the art.
- PRE-RELEASE: Look for a "PRERELEASE" or "PRE-RELEASE" stamp, usually in the bottom-right of the card art.
- PROMO: Look for a black star symbol with "PROMO" text where the set symbol would be.
- BASE SET vs BASE SET 2: Base Set 2 has a "2" inside a Pokeball as its set symbol. Original Base Set has no set symbol. Copyright: Base Set is 1999, Base Set 2 is 2000.
- UNLIMITED: If a Base Set card has a shadow on the art border and NO 1st Edition stamp, it is Unlimited (leave edition as empty string).

Include the variant in the edition field. If none apply, leave edition as empty string.
If this is not a Pokemon card, respond with: {"error":"Not a Pokemon card","notes":"description of what you see"}`
            }
          ]
        }]
      })
    });
    
    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error: ${response.status}`);
    }
    
    const data = await response.json();
    const text = data.content?.[0]?.text || '';
    
    // Parse the JSON response
    let cardInfo;
    try {
      const cleaned = text.replace(/```json\s*|```/g, '').trim();
      cardInfo = JSON.parse(cleaned);
    } catch(e) {
      throw new Error('Could not parse AI response: ' + text.substring(0, 100));
    }
    
    if (cardInfo.error) {
      ss.error = cardInfo.error + (cardInfo.notes ? ': ' + cardInfo.notes : '');
      ss.scanning = false;
      render();
      return;
    }
    
    // Build formatted card name (check corrections dictionary first)
    const scanResult = buildScannedName(cardInfo);
    const formatted = scanResult.formatted;
    const setName = cardInfo.set || '';
    const cardName = cardInfo.name || '';
    const number = cardInfo.number || '';
    const edition = cardInfo.edition || '';
    if (scanResult.corrected) {
      showToast(`✅ Auto-corrected: ${formatted}`);
    }
    
    // Try to match against TCGdex for image and pricing
    let tcgImg = '';
    let marketValue = '';
    let tcgdexId = '';
    try {
      let tcgCards = [];
      let params = [];
      if (setName) params.push(`set.name=like:${encodeURIComponent(setName)}`);
      if (cardName) params.push(`name=like:${encodeURIComponent(cardName)}`);
      if (number) {
        const cleanNum = number.replace(/[^\d]/g, '');
        if (cleanNum) params.push(`localId=${encodeURIComponent(cleanNum)}`);
      }
      params.push('pagination:itemsPerPage=1');
      let tcgResp = await fetch(`https://api.tcgdex.net/v2/en/cards?${params.join('&')}`);
      if (tcgResp.ok) tcgCards = await tcgResp.json();
      
      // Fallback: name + number only if set name didn't match
      if (!tcgCards.length && cardName) {
        let params2 = [`name=like:${encodeURIComponent(cardName)}`];
        const cleanNum = (number||'').replace(/[^\d]/g,'');
        if (cleanNum) params2.push(`localId=${encodeURIComponent(cleanNum)}`);
        params2.push('pagination:itemsPerPage=1');
        tcgResp = await fetch(`https://api.tcgdex.net/v2/en/cards?${params2.join('&')}`);
        if (tcgResp.ok) tcgCards = await tcgResp.json();
      }
      
      if (tcgCards.length) {
          const detailResp = await fetch(`https://api.tcgdex.net/v2/en/cards/${tcgCards[0].id}`);
          if (detailResp.ok) {
            const detail = await detailResp.json();
            tcgImg = detail.image ? detail.image + '/low.webp' : '';
            tcgdexId = detail.id || '';
            const tp = detail.pricing?.tcgplayer || {};
            marketValue = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice || tp.holofoil?.marketPrice || tp.holo?.midPrice || tp.normal?.midPrice || '';
          }
      }
    } catch(e) { /* TCGdex lookup failed, continue without */ }
    
    // Add to queue
    ss.queue.push({
      img: tcgImg || base64DataUrl,
      cardName: formatted,
      _originalName: formatted,
      _scanKey: scanResult._scanKey || '',
      setName: setName,
      number: number,
      edition: edition,
      rarity: cardInfo.rarity || '',
      cardType: cardInfo.cardType || 'Pokemon',
      holo: cardInfo.holo || false,
      language: cardInfo.language || 'English',
      notes: cardInfo.notes || '',
      tcgdexId: tcgdexId,
      marketValue: marketValue ? Number(marketValue).toFixed(2) : '',
      costBasis: '',
      confirmed: false
    });
    
    ss.scanning = false;
    ss.error = '';
    render();
    showToast(`Identified: ${formatted}`);
    
  } catch(err) {
    ss.scanning = false;
    ss.error = err.message;
    render();
  }
}

window.scannerRemoveFromQueue = function(idx) {
  window.scannerState.queue.splice(idx, 1);
  render();
};

window.scannerClearQueue = function() {
  if (confirm('Clear all scanned cards from queue?')) {
    window.scannerState.queue = [];
    render();
  }
};

window.scannerSaveAll = function() {
  const ss = window.scannerState;
  if (!ss.queue.length) return;
  
  let count = 0;
  let corrections = 0;
  for (const card of ss.queue) {
    // Check if user edited the card name — save correction if so
    if (card._scanKey && card.cardName !== card._originalName) {
      saveNameCorrection(card._scanKey, card._originalName, card.cardName);
      corrections++;
    }
    
    const row = {
      id: nextId('C'),
      cardName: card.cardName || '',
      cardType: card.cardType || 'Pokemon',
      status: 'Raw',
      dateAdded: new Date().toISOString().slice(0,10),
      datePurchased: new Date().toISOString().slice(0,10),
      costBasis: parseFloat(card.costBasis) || 0,
      marketValue: parseFloat(card.marketValue) || 0,
      platform: '',
      gradingCompany: '',
      grade: '',
      gradingCost: 0,
      notes: '',
      _pokemonRarity: card.rarity || '',
      _tcgdexId: card.tcgdexId || ''
    };
    if (card.img && !card.img.startsWith('data:')) row._pokemonImg = card.img;
    D.inventory.push(row);
    count++;
  }
  
  saveData();
  let msg = `${count} card${count>1?'s':''} saved to inventory & synced!`;
  if (corrections) msg += ` ${corrections} name correction${corrections>1?'s':''} learned.`;
  showToast(msg);
  ss.queue = [];
  render();
};

function r1099K(m) {
  // Filter eBay sales only
  const ebaySales = D.sales.filter(function(s) { return (s.platform || '').toLowerCase() === 'ebay'; });
  if (!ebaySales.length) {
    return '<div class="panel" style="margin-top:14px"><h3 style="color:var(--accent)">📋 1099-K Reconciliation</h3><div style="font-size:12px;color:var(--text-dim)">No eBay sales recorded yet. This section reconciles your sales data with the 1099-K gross amount eBay reports to the IRS.</div></div>';
  }
  
  const totalSalePrice = ebaySales.reduce(function(s, r) { return s + num(r.salePrice); }, 0);
  const totalPlatformFee = ebaySales.reduce(function(s, r) { return s + num(r.platformFee); }, 0);
  const totalShipCost = ebaySales.reduce(function(s, r) { return s + num(r.shipCost); }, 0);
  const totalEbayShipping = ebaySales.reduce(function(s, r) { return s + num(r.ebayShipping || 0); }, 0);
  const totalEbayTax = ebaySales.reduce(function(s, r) { return s + num(r.ebayTax || 0); }, 0);
  
  // 1099-K gross = sale price + buyer-paid shipping + sales tax collected
  // This is what eBay reports to the IRS
  const gross1099K = totalSalePrice + totalEbayShipping + totalEbayTax;
  
  // Group by month for breakdown
  const byMonth = {};
  ebaySales.forEach(function(s) {
    const mo = (s.date || '').slice(0, 7) || 'Unknown';
    if (!byMonth[mo]) byMonth[mo] = { sales: 0, shipping: 0, tax: 0, count: 0 };
    byMonth[mo].sales += num(s.salePrice);
    byMonth[mo].shipping += num(s.ebayShipping || 0);
    byMonth[mo].tax += num(s.ebayTax || 0);
    byMonth[mo].count++;
  });
  const months = Object.keys(byMonth).sort();
  
  // Non-eBay sales summary
  const otherSales = D.sales.filter(function(s) { return (s.platform || '').toLowerCase() !== 'ebay'; });
  const otherTotal = otherSales.reduce(function(s, r) { return s + num(r.salePrice); }, 0);

  return '<div class="panel" style="margin-top:14px">' +

      '<div class="fin-row bold bd"><span class="lbl">Expected 1099-K Gross</span><span class="amt">' + fmtD(gross1099K) + '</span></div>' +

        if (missingCount === 0) return '';
        if (missingCount === ebaySales.length) return '<div style="margin-top:10px;padding:8px 12px;background:rgba(255,190,11,.1);border:1px solid var(--yellow);border-radius:var(--radius-sm);font-size:11px;color:var(--yellow)">⚠️ None of your ' + ebaySales.length + ' eBay sales have buyer shipping or tax data. Import your eBay CSV or edit individual sales to add these amounts — they\'re needed for accurate 1099-K reconciliation.</div>';
        return '<div style="margin-top:10px;padding:8px 12px;background:rgba(255,190,11,.1);border:1px solid var(--yellow);border-radius:var(--radius-sm);font-size:11px;color:var(--yellow)">⚠️ ' + missingCount + ' of ' + ebaySales.length + ' eBay sales are missing buyer shipping and tax data. Edit those sales to add the amounts, or re-import via eBay CSV.</div>';
      })() +
    '</div></div>' +
    '<div style="margin-top:12px;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);font-size:11px;color:var(--text-dim)">' +
      '<strong>How to use this:</strong> When you receive your 1099-K from eBay, compare the gross amount to the "Expected 1099-K Gross" above. They should match (within a few dollars for rounding). Show your accountant this reconciliation to explain why the 1099-K is higher than your actual card sales revenue. The difference is buyer-paid shipping and sales tax — neither is your income.' +
    '</div>' +
  '</div>';

window._yeirYear = new Date().getFullYear();

function rYearEndInventory(m) {
  const year = window._yeirYear || new Date().getFullYear();
  const cutoffDate = year + '-12-31';
  
  // Get all unsold inventory as of the cutoff date
  // Cards added on or before cutoff AND not sold before cutoff
  const currentYear = new Date().getFullYear();
  const unsoldAsOf = D.inventory.filter(function(card) {
    // If card has no date, treat it as added in the current year
    const added = card.dateAdded || card.datePurchased || '';
    if (!added) {
      // No date — only include in current year's report
      if (year !== currentYear) return false;
    } else if (added > cutoffDate) {
      return false; // Added after this year's cutoff
    }
    
    // Exclude if sold on or before cutoff
    if (card.status === 'Sold') {
      // Check if there's a linked sale with a date
      const sale = D.sales.find(function(s) { return s.cardId === card.id; });
      if (sale && sale.date && sale.date <= cutoffDate) return false;
      // If sold but no date info, exclude (assume sold before cutoff)
      if (!sale) return false;
      // Sale date after cutoff — card was still in inventory at year end
      if (sale && sale.date > cutoffDate) return true;
      return false;
    }
    return true;
  });
  
  const totalCostBasis = unsoldAsOf.reduce(function(s, c) { return s + num(c.costBasis); }, 0);
  const totalGradingCost = unsoldAsOf.reduce(function(s, c) { return s + num(c.gradingCost); }, 0);
  const totalInvested = totalCostBasis + totalGradingCost;
  const totalMarketValue = unsoldAsOf.reduce(function(s, c) { return s + num(c.marketValue); }, 0);
  
  // Group by status
  const byStatus = {};
  unsoldAsOf.forEach(function(c) {
    var st = c.status || 'Unknown';
    if (!byStatus[st]) byStatus[st] = { count: 0, cost: 0, grading: 0, market: 0 };
    byStatus[st].count++;
    byStatus[st].cost += num(c.costBasis);
    byStatus[st].grading += num(c.gradingCost);
    byStatus[st].market += num(c.marketValue);
  });
  
  // Group by card type
  const byType = {};
  unsoldAsOf.forEach(function(c) {
    var t = c.cardType || 'Other';
    if (!byType[t]) byType[t] = { count: 0, cost: 0, grading: 0, market: 0 };
    byType[t].count++;
    byType[t].cost += num(c.costBasis);
    byType[t].grading += num(c.gradingCost);
    byType[t].market += num(c.marketValue);
  });
  
  // Top 10 most valuable cards by cost basis
  var topCards = unsoldAsOf.slice().sort(function(a, b) { return (num(b.costBasis) + num(b.gradingCost)) - (num(a.costBasis) + num(a.gradingCost)); }).slice(0, 10);

  return '<div class="panel" style="margin-top:14px">' +
    '<h3><span style="color:var(--green)">📦 Year-End Inventory Report</span><span class="right">' +
      '<select onchange="window._yeirYear=parseInt(this.value);render()" style="background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:var(--radius-sm);padding:4px 8px;font-size:12px;font-family:\'DM Sans\',sans-serif">' +
      (function(){
        var cy = new Date().getFullYear();
        var minYear = cy;
        D.inventory.forEach(function(c) {
          var d = c.dateAdded || c.datePurchased || '';
          if (d) { var y = parseInt(d.slice(0,4)); if (y && y < minYear) minYear = y; }
        });
        var years = [];
        for (var y = minYear; y <= cy + 1; y++) years.push(y);
        return years.map(function(y) { return '<option value="' + y + '"' + (y === year ? ' selected' : '') + '>' + y + '</option>'; }).join('');
      })() +
      '</select> ' +
      '<button class="btn btn-sm" onclick="exportInventoryReport()" style="font-size:10px">📄 Export PDF</button>' +
    '</span></h3>' +
    '<div style="font-size:11px;color:var(--text-dim);margin-bottom:14px">Inventory valuation as of December 31, ' + year + ' for tax purposes. Shows all cards that were in your possession at year end, valued at cost basis (what you paid).</div>' +
    '<div class="metrics" style="margin-bottom:14px">' +
      '<div class="mc" style="border-left-color:var(--blue)"><div class="lbl">Cards in Inventory</div><div class="val">' + unsoldAsOf.length + '</div></div>' +
      '<div class="mc" style="border-left-color:var(--green)"><div class="lbl">Total Cost Basis</div><div class="val">' + fmtD(totalCostBasis) + '</div><div class="sub" style="color:var(--text-dim)">What you paid for cards</div></div>' +
      '<div class="mc" style="border-left-color:var(--purple)"><div class="lbl">Total Grading Costs</div><div class="val">' + fmtD(totalGradingCost) + '</div></div>' +
      '<div class="mc" style="border-left-color:var(--yellow)"><div class="lbl">Total Invested</div><div class="val">' + fmtD(totalInvested) + '</div><div class="sub" style="color:var(--text-dim)">Cost basis + grading</div></div>' +
      '<div class="mc" style="border-left-color:var(--cyan)"><div class="lbl">Est. Market Value</div><div class="val">' + fmtD(totalMarketValue) + '</div><div class="sub" style="color:' + (totalMarketValue > totalInvested ? 'var(--green)' : 'var(--red)') + '">' + (totalMarketValue > totalInvested ? '+' : '') + fmtD(totalMarketValue - totalInvested) + ' unrealized</div></div>' +
    '</div>' +
    '<div class="fin-grid">' +
      '<div>' +
        '<div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:8px">BY STATUS</div>' +
        '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr><th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Status</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Cards</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Cost Basis</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Grading</th></tr></thead><tbody>' +
        Object.keys(byStatus).map(function(st) { var d = byStatus[st]; return '<tr><td style="padding:4px 8px;border-bottom:1px solid var(--border)">' + st + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + d.count + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + fmtD(d.cost) + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + fmtD(d.grading) + '</td></tr>'; }).join('') +
        '</tbody></table>' +
      '</div>' +
      '<div>' +
        '<div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:8px">BY CARD TYPE</div>' +
        '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr><th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Type</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Cards</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Cost Basis</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Market</th></tr></thead><tbody>' +
        Object.keys(byType).map(function(t) { var d = byType[t]; return '<tr><td style="padding:4px 8px;border-bottom:1px solid var(--border)">' + t + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + d.count + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + fmtD(d.cost) + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + fmtD(d.market) + '</td></tr>'; }).join('') +
        '</tbody></table>' +
      '</div>' +
    '</div>' +
    (topCards.length ? '<div style="margin-top:14px"><div style="font-size:11px;color:var(--text-faint);font-weight:600;margin-bottom:8px">TOP 10 HIGHEST COST BASIS CARDS</div>' +
      '<table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr><th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">#</th><th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Card</th><th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Status</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Cost</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Grade $</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Total</th><th class="r" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">Market</th></tr></thead><tbody>' +
      topCards.map(function(c, i) { var total = num(c.costBasis) + num(c.gradingCost); return '<tr><td style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--text-dim)">' + (i + 1) + '</td><td style="padding:4px 8px;border-bottom:1px solid var(--border);font-weight:600">' + (c.cardName || '') + (c.gradingCompany ? ' <span style="color:var(--yellow)">' + c.gradingCompany + ' ' + (c.grade || '') + '</span>' : '') + '</td><td style="padding:4px 8px;border-bottom:1px solid var(--border)">' + (c.status || '') + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + fmtD(num(c.costBasis)) + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border)">' + fmtD(num(c.gradingCost)) + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border);font-weight:700">' + fmtD(total) + '</td><td class="r mono" style="padding:4px 8px;border-bottom:1px solid var(--border);color:var(--green)">' + (num(c.marketValue) ? fmtD(num(c.marketValue)) : '—') + '</td></tr>'; }).join('') +
      '</tbody></table></div>' : '') +
    '<div style="margin-top:12px;padding:10px 14px;background:var(--bg);border-radius:var(--radius-sm);font-size:11px;color:var(--text-dim)">' +
      '<strong>For your accountant:</strong> The "Total Cost Basis" figure is your ending inventory value for tax purposes. This represents what you paid to acquire cards that remained unsold as of 12/31/' + year + '. Grading costs are a separate deductible expense. Export this as a PDF for your records.' +
    '</div>' +
  '</div>';
}

// Export year-end inventory report as PDF
window.exportInventoryReport = function() {
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF();
  const m = M();
  const year = window._yeirYear || new Date().getFullYear();
  const cutoffDate = year + '-12-31';
  
  const unsoldAsOf = D.inventory.filter(function(card) {
    const added = card.dateAdded || card.datePurchased || '';
    if (added && added > cutoffDate) return false;
    if (card.status === 'Sold') {
      const sale = D.sales.find(function(s) { return s.cardId === card.id; });
      if (sale && sale.date && sale.date <= cutoffDate) return false;
      if (!sale) return false;
      if (sale && sale.date > cutoffDate) return true;
      return false;
    }
    return true;
  });
  
  const totalCost = unsoldAsOf.reduce(function(s, c) { return s + num(c.costBasis); }, 0);
  const totalGrading = unsoldAsOf.reduce(function(s, c) { return s + num(c.gradingCost); }, 0);
  
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('Year-End Inventory Report', 14, 22);
  doc.setFontSize(10);
  doc.setFont('helvetica', 'normal');
  doc.text('As of December 31, ' + year, 14, 30);
  doc.text('Generated: ' + new Date().toLocaleDateString(), 14, 36);
  
  doc.autoTable({
    startY: 42,
    head: [['Summary', 'Value']],
    body: [
      ['Total Cards in Inventory', String(unsoldAsOf.length)],
      ['Total Cost Basis', fmtD(totalCost)],
      ['Total Grading Costs', fmtD(totalGrading)],
      ['Total Invested (Cost + Grading)', fmtD(totalCost + totalGrading)]
    ],
    theme: 'plain',
    styles: { fontSize: 10, cellPadding: 3 },
    columnStyles: { 1: { halign: 'right', fontStyle: 'bold' } }
  });
  
  var cardRows = unsoldAsOf.map(function(c) {
    return [
      c.id || '',
      (c.cardName || '').substring(0, 30),
      c.status || '',
      (c.gradingCompany || '') + (c.grade ? ' ' + c.grade : ''),
      fmtD(num(c.costBasis)),
      fmtD(num(c.gradingCost)),
      fmtD(num(c.costBasis) + num(c.gradingCost))
    ];
  });
  
  doc.autoTable({
    startY: doc.lastAutoTable.finalY + 10,
    head: [['ID', 'Card Name', 'Status', 'Grade', 'Cost Basis', 'Grading', 'Total']],
    body: cardRows,
    theme: 'striped',
    styles: { fontSize: 8, cellPadding: 2 },
    columnStyles: { 4: { halign: 'right' }, 5: { halign: 'right' }, 6: { halign: 'right', fontStyle: 'bold' } },
    headStyles: { fillColor: [30, 30, 60], textColor: [228, 228, 240] }
  });
  
  doc.save('Inventory_Report_' + year + '.pdf');
  showToast('Year-End Inventory Report exported!');
};

      const mapSealed=r=>({id:r['Sealed ID']||'',dateAcquired:r['Date Acquired']||'',productName:r['Product Name']||'',productType:r['Product Type']||'',setSeries:r['Set/Series']||'',year:r['Year']||'',purchasePrice:num(r['Purchase Price ($)']),source:r['Source']||'',status:r['Status']||'',dateSold:r['Date Sold']||'',salePrice:num(r['Sale Price ($)']),pullValue:num(r['Est Pull Value ($)']),notes:r['Notes']||''});

      const mapCrack=r=>({cardName:r['Card Name']||'',buyPrice:num(r['Buy Price ($)']),cgc9:num(r['CGC 9 ($)']),cgc10:num(r['CGC 10 ($)']),gradingFee:num(r['Grading Fee ($)']),profit:num(r['Profit ($)']),roi:num(r['ROI (%)']),dateAdded:r['Date Added']||''});

      let tA=0,tU=0;

      if(purchases.length){const r=mergeRecords(D.purchases,purchases,'P');tA+=r.added;tU+=r.updated;}

      if(sealed.length){const r=mergeRecords(D.sealed,sealed,'SL');tA+=r.added;tU+=r.updated;}
      if(expenses.length){const r=mergeRecords(D.expenses,expenses,'E');tA+=r.added;tU+=r.updated;}

        if(!D.settings)D.settings={};

      // Auto-create Grading tab entries for Submitted cards that don't have one
      const importToday = new Date().toISOString().slice(0, 10);
      let gradingCreated = 0;
      D.inventory.forEach(function(card) {
        // Stamp date on any card missing one
        if (!card.dateAdded) {
          card.dateAdded = card.datePurchased || importToday;
        }
        if (card.status === 'Submitted' && card.gradingCompany && card.id) {
          // Check if a grading entry already exists for this card
          const hasEntry = D.grading.some(function(g) { return g.cardId === card.id; });
          if (!hasEntry) {
            D.grading.push({
              id: nextId('G'),
              cardName: card.cardName || '',
              cardId: card.id,
              company: card.gradingCompany || 'PSA',
              serviceLevel: '',
              dateSubmitted: card.dateAdded || '',
              dateReturned: '',
              gradingFee: num(card.gradingCost) || 0,
              shipTo: 0,

              totalCost: num(card.gradingCost) || 0,
              preCondition: '',
              gradeReceived: '',
              preValue: num(card.marketValue) || num(card.costBasis) || 0,
              postValue: 0,
              action: 'New Grade',
              notes: 'Auto-created from import'
            });
            gradingCreated++;
          }
        }
      });

      let msg = `Import complete! ${tA} added, ${tU} updated`;
      if (gradingCreated) msg += `, ${gradingCreated} grading entries auto-created`;

window.handleEbayCsvImport = function(event) {
  const file = event.target.files[0];
  if (!file) return;
  event.target.value = '';
  
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const text = e.target.result;
      const parsed = parseEbayCsv(text);
      if (!parsed.length) { showToast('No valid rows found in CSV'); return; }
      
      window.ebayCsvState.rows = parsed;

function parseEbayCsv(text) {
  // Parse CSV with proper handling of quoted fields
  function csvSplitRow(line) {
    const result = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
        else { inQuotes = !inQuotes; }
      } else if (ch === ',' && !inQuotes) {
        result.push(current.trim());
        current = '';
      } else {
        current += ch;
      }
    }
    result.push(current.trim());
    return result;
  }
  
  const lines = text.split('\n').map(l => l.replace(/\r$/, ''));
  // Row 0: blank, Row 1: headers, Row 2: blank, Row 3+: data
  if (lines.length < 4) return [];
  
  const headers = csvSplitRow(lines[1]);
  
  // Find key column indices by header name
  const colIdx = {};
  const colMap = {
    'Order Number': 'orderNumber',
    'Item Number': 'itemNumber',
    'Item Title': 'itemTitle',
    'Sold For': 'soldFor',
    'Shipping And Handling': 'shipping',
    'eBay Collected Tax': 'ebayTax',
    'Total Price': 'totalPrice',
    'Sale Date': 'saleDate',
    'Transaction ID': 'transactionId',
    'Quantity': 'quantity',
    'Buyer Username': 'buyerUsername',
    'Sales Record Number': 'salesRecordNumber'
  };
  
  headers.forEach((h, i) => {
    const clean = h.replace(/^"|"$/g, '').trim();
    if (colMap[clean]) colIdx[colMap[clean]] = i;
  });
  
  // Parse data rows (row 3+, skip blank rows and footer)
  const dataRows = [];
  for (let i = 3; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Stop at footer lines like "5,record(s) downloaded,"
    if (line.match(/^\d+,record\(s\)/i)) break;
    if (line.startsWith('Seller ID')) break;
    
    const cols = csvSplitRow(line);
    if (cols.length < 10) continue;
    
    const getCol = (key) => {
      const idx = colIdx[key];
      if (idx === undefined) return '';
      return (cols[idx] || '').replace(/^"|"$/g, '').trim();
    };
    
    dataRows.push({
      orderNumber: getCol('orderNumber'),
      salesRecordNumber: getCol('salesRecordNumber'),
      itemNumber: getCol('itemNumber'),
      itemTitle: getCol('itemTitle'),
      soldFor: getCol('soldFor'),
      shipping: getCol('shipping'),
      ebayTax: getCol('ebayTax'),
      totalPrice: getCol('totalPrice'),
      saleDate: getCol('saleDate'),
      transactionId: getCol('transactionId'),
      quantity: getCol('quantity'),
      buyerUsername: getCol('buyerUsername')
    });
  }
  
  // Process into import rows
  // Multi-item orders: summary row (no Item Number) followed by individual item rows
  const importRows = [];
  let i = 0;
  while (i < dataRows.length) {
    const row = dataRows[i];
    
    if (!row.itemNumber && row.orderNumber) {
      // This is a multi-item order summary row
      const summaryShipping = parseDollar(row.shipping);
      const summaryTax = parseDollar(row.ebayTax);
      const summaryTotalPrice = parseDollar(row.totalPrice);
      const summarySoldFor = parseDollar(row.soldFor);
      const orderNum = row.orderNumber;
      const saleDate = row.saleDate;
      const buyerUsername = row.buyerUsername;
      
      // Collect all child rows for this order
      const children = [];
      let j = i + 1;
      while (j < dataRows.length && dataRows[j].orderNumber === orderNum && dataRows[j].itemNumber) {
        children.push(dataRows[j]);
        j++;
      }
      
      if (children.length) {
        // Calculate total sold amount for proportional distribution
        const childTotalSold = children.reduce((s, c) => s + parseDollar(c.soldFor), 0);
        
        children.forEach(child => {
          const childSold = parseDollar(child.soldFor);
          const ratio = childTotalSold > 0 ? childSold / childTotalSold : 1 / children.length;
          const childShipping = summaryShipping * ratio;
          const childTax = summaryTax * ratio;
          // eBay fee = 13.25% of (sold + shipping + tax)
          const ebayFee = (childSold + childShipping + childTax) * 0.1325;
          
          importRows.push({
            orderNumber: orderNum,
            itemNumber: child.itemNumber,
            itemTitle: child.itemTitle,
            soldFor: childSold,
            shipping: childShipping,
            ebayTax: childTax,
            ebayFee: Number(ebayFee.toFixed(2)),
            saleDate: saleDate || child.saleDate,
            transactionId: child.transactionId,
            buyerUsername: buyerUsername || child.buyerUsername,
            // For linking
            _cardName: '',
            _cardId: '',
            _linkedInvIdx: undefined,
            _costBasis: 0,
            _shipCost: 0,
            _skip: false,
            _duplicate: false
          });
        });
        i = j;
      } else {
        // Summary row with no children — skip it
        i++;
      }
    } else if (row.itemNumber) {
      // Single-item order
      const soldFor = parseDollar(row.soldFor);
      const shipping = parseDollar(row.shipping);
      const tax = parseDollar(row.ebayTax);
      const ebayFee = (soldFor + shipping + tax) * 0.1325;
      
      importRows.push({
        orderNumber: row.orderNumber,
        itemNumber: row.itemNumber,
        itemTitle: row.itemTitle,
        soldFor: soldFor,
        shipping: shipping,
        ebayTax: tax,
        ebayFee: Number(ebayFee.toFixed(2)),
        saleDate: row.saleDate,
        transactionId: row.transactionId,
        buyerUsername: row.buyerUsername,
        _cardName: '',
        _cardId: '',
        _linkedInvIdx: undefined,
        _costBasis: 0,
        _shipCost: 0,
        _skip: false,
        _duplicate: false
      });
      i++;
    } else {
      i++;
    }
  }
  
  // Check for duplicates against existing sales
  importRows.forEach(row => {
    if (row.transactionId && D.sales.some(s => s.ebayTransactionId === row.transactionId)) {
      row._duplicate = true;
      row._skip = true;
    }
  });
  
  return importRows;
}

function parseDollar(str) {
  return parseFloat(String(str || '0').replace(/[$,]/g, '')) || 0;
}

// eBay CSV card picker for import
window.ebayCsvFilterPicker = function(rowIdx, val) {
  const resultsEl = document.getElementById('ebcsv-picker-' + rowIdx);
  if (!resultsEl) return;
  if (!val || val.length < 1) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
  const term = val.toLowerCase();
  const matches = D.inventory.filter(c => c.status !== 'Sold' && (
    (c.cardName || '').toLowerCase().includes(term) || (c.id || '').toLowerCase().includes(term) ||
    (c.grade || '').toLowerCase().includes(term) || (c.gradingCompany || '').toLowerCase().includes(term)
  )).slice(0, 6);
  if (!matches.length) { resultsEl.innerHTML = '<div class="picker-item" style="color:var(--text-dim)">No match</div>'; resultsEl.style.display = 'block'; return; }
  resultsEl.innerHTML = matches.map(function(c) {
    return '<div class="picker-item" onclick="ebayCsvSelectCard(' + rowIdx + ',' + D.inventory.indexOf(c) + ')"><strong>' + (c.id || '') + '</strong> — ' + (c.cardName || '') + ' ' + (c.gradingCompany || c.grade ? '<span style="color:var(--yellow);font-weight:600">' + (c.gradingCompany ? c.gradingCompany + ' ' : '') + (c.grade || '') + '</span>' : '') + ' <span style="color:var(--text-dim);font-size:11px">' + (c.cardType || '') + ' · ' + (c.status || '') + '</span></div>';
  }).join('');
  resultsEl.style.display = 'block';
};

window.ebayCsvSelectCard = function(rowIdx, invIdx) {
  const card = D.inventory[invIdx];
  const row = window.ebayCsvState.rows[rowIdx];
  if (!card || !row) return;
  row._cardName = card.cardName || '';
  row._cardId = card.id || '';
  row._linkedInvIdx = invIdx;
  row._costBasis = num(card.costBasis) + num(card.gradingCost);
  const resultsEl = document.getElementById('ebcsv-picker-' + rowIdx);
  if (resultsEl) resultsEl.style.display = 'none';
  render();
};

window.ebayCsvUnlinkCard = function(rowIdx) {
  const row = window.ebayCsvState.rows[rowIdx];
  if (!row) return;
  row._cardName = '';
  row._cardId = '';
  row._linkedInvIdx = undefined;
  row._costBasis = 0;

};

window.ebayCsvToggleSkip = function(rowIdx) {
  const row = window.ebayCsvState.rows[rowIdx];
  if (!row) return;
  row._skip = !row._skip;
  render();
};

window.ebayCsvApplyShipping = function() {
  const singleCost = parseFloat(window.ebayCsvState.defaultShipCost) || 0;
  const multiCost = parseFloat(window.ebayCsvState.defaultMultiShipCost) || 0;
  if (!singleCost && !multiCost) { showToast('Enter at least one shipping cost'); return; }
  
  const rows = window.ebayCsvState.rows;
  
  // Group rows by order number to identify multi-item orders
  const orderGroups = {};
  rows.forEach(function(row, i) {
    if (row._skip || row._duplicate) return;
    const orderKey = row.orderNumber || ('single_' + i);
    if (!orderGroups[orderKey]) orderGroups[orderKey] = [];
    orderGroups[orderKey].push(row);
  });
  
  let singleCount = 0, multiCount = 0;
  
  // Apply shipping cost per order
  Object.keys(orderGroups).forEach(function(orderKey) {
    const group = orderGroups[orderKey];
    if (group.length === 1) {
      // Single-item order — use single cost
      group[0]._shipCost = singleCost ? Number(singleCost.toFixed(2)) : 0;
      if (singleCost) singleCount++;
    } else {
      // Multi-item order — use multi cost, distributed proportionally
      const costForOrder = multiCost || singleCost; // fall back to single if multi not set
      const totalSold = group.reduce(function(s, r) { return s + r.soldFor; }, 0);
      group.forEach(function(row) {
        const ratio = totalSold > 0 ? row.soldFor / totalSold : 1 / group.length;
        row._shipCost = Number((costForOrder * ratio).toFixed(2));
      });
      if (costForOrder) multiCount++;
    }
  });
  
  render();
  var msg = 'Shipping applied:';
  if (singleCount) msg += ' ' + singleCount + ' single orders @ $' + singleCost.toFixed(2);
  if (multiCount) msg += (singleCount ? ' ·' : '') + ' ' + multiCount + ' multi-item orders @ $' + (multiCost || singleCost).toFixed(2) + ' (split proportionally)';
  showToast(msg);
};

window.ebayCsvSaveAll = function() {
  const rows = window.ebayCsvState.rows.filter(r => !r._skip && !r._duplicate);
  if (!rows.length) { showToast('No rows to import — all skipped or duplicates'); return; }
  
  let count = 0;
  rows.forEach(function(row) {
    const sale = {
      id: nextId('S'),
      cardName: row._cardName || row.itemTitle || '',
      cardId: row._cardId || '',
      gradingCompany: '',
      grade: '',
      date: formatEbayDate(row.saleDate),
      platform: 'eBay',
      salePrice: row.soldFor,
      platformFee: row.ebayFee,
      consignFee: 0,
      shipCost: row._shipCost || 0,
      costBasis: row._costBasis || 0,
      cardType: 'Pokemon',
      buyer: row.buyerUsername || '',
      notes: 'eBay import · Order: ' + (row.orderNumber || '') + ' · Item: ' + (row.itemNumber || ''),
      ebayTransactionId: row.transactionId || '',
      ebayItemNumber: row.itemNumber || '',
      ebayShipping: row.shipping,
      ebayTax: row.ebayTax
    };
    
    // Copy grade info from linked inventory card
    if (row._linkedInvIdx !== undefined) {
      const card = D.inventory[row._linkedInvIdx];
      if (card) {
        sale.gradingCompany = card.gradingCompany || '';
        sale.grade = card.grade || '';
        sale.cardType = card.cardType || 'Pokemon';
        // Mark inventory card as sold
        if (card.status !== 'Sold') {
          card.status = 'Sold';
        }
      }
    }
    
    D.sales.push(sale);
    count++;
  });
  
  saveData();
  window.ebayCsvState.active = false;
  window.ebayCsvState.rows = [];
  render();
  showToast(count + ' sale' + (count > 1 ? 's' : '') + ' imported from eBay CSV & synced!');
};

window.ebayCsvCancel = function() {
  const active = window.ebayCsvState.rows.filter(r => !r._skip && !r._duplicate);
  if (active.length && !confirm('Discard eBay CSV import? No data will be saved.')) return;
  window.ebayCsvState.active = false;
  window.ebayCsvState.rows = [];
  render();
};

function formatEbayDate(dateStr) {
  // Convert "Mar-10-26" to "2026-03-10"
  if (!dateStr) return '';
  const months = { Jan:'01', Feb:'02', Mar:'03', Apr:'04', May:'05', Jun:'06', Jul:'07', Aug:'08', Sep:'09', Oct:'10', Nov:'11', Dec:'12' };
  const parts = dateStr.split('-');
  if (parts.length === 3) {
    const mon = months[parts[0]] || '01';
    const day = parts[1].padStart(2, '0');
    let year = parts[2];
    if (year.length === 2) year = '20' + year;
    return year + '-' + mon + '-' + day;
  }
  return dateStr;
}

// Receipt images stored in localStorage, keyed by expense ID
// Format: _ctReceipt_E001 = compressed base64 JPEG

function getReceiptImage(expenseId) {
  try { return window.localStorage?.getItem('_ctReceipt_' + expenseId) || null; } catch(e) { return null; }
}

function saveReceiptImage(expenseId, base64DataUrl) {
  try { window.localStorage?.setItem('_ctReceipt_' + expenseId, base64DataUrl); } catch(e) {
    console.error('Failed to save receipt image:', e);
    showToast('⚠️ Could not save receipt image — localStorage may be full');
  }
}

function deleteReceiptImage(expenseId) {
  try { window.localStorage?.removeItem('_ctReceipt_' + expenseId); } catch(e) {}
}

function getReceiptCount() {
  try {
    let count = 0;
    for (let i = 0; i < localStorage.length; i++) {
      if (localStorage.key(i).startsWith('_ctReceipt_')) count++;
    }
    return count;
  } catch(e) { return 0; }
}

window._receiptScanTarget = 'expenses'; // 'expenses' or 'purchases'
