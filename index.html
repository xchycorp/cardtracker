// Load from Firebase on startup
async function loadFromFirebase() {
  try {
    const snap = await getDoc(DOC_REF);
    if (snap.exists()) {
      const fbData = snap.data();
      if (fbData.inventory) {
        D = fbData;
        ensureFields(); if(typeof syncCrackList==="function") syncCrackList();
      }
    }
    firebaseReady = true;
    render();
    showToast('🔄 Connected — data synced from cloud');
    // Backfill: auto-create grading entries for Submitted cards missing them
    try { backfillGradingEntries(); } catch(e) { console.error('Backfill error:', e); }
  } catch(e) {
    console.error('Firebase load error:', e);
    firebaseReady = true;
    render();
    showToast('⚠️ Offline mode — using local data');
  }
}

function backfillGradingEntries() {
  let created = 0;
  let datesFixed = 0;
  const today = new Date().toISOString().slice(0, 10);
  
  D.inventory.forEach(function(card) {
    // Backfill dates on cards with no dateAdded
    if (!card.dateAdded) {
      card.dateAdded = card.datePurchased || today;
      datesFixed++;
    }
    
    // Backfill grading entries for Submitted cards
    if (card.status === 'Submitted' && card.gradingCompany && card.id) {
      const hasEntry = D.grading.some(function(g) { return g.cardId === card.id; });
      if (!hasEntry) {
        D.grading.push({
          id: nextId('G'),
          cardName: card.cardName || '',
          cardId: card.id,
          company: card.gradingCompany || 'PSA',
          serviceLevel: '',
          dateSubmitted: card.dateAdded || today,
          dateReturned: '',
          gradingFee: num(card.gradingCost) || 0,
          shipTo: 0,
          shipBack: 0,
          totalCost: num(card.gradingCost) || 0,
          preCondition: '',
          gradeReceived: '',
          preValue: num(card.marketValue) || num(card.costBasis) || 0,
          postValue: 0,
          action: 'New Grade',
          notes: 'Auto-created from backfill'
        });
        created++;
      }
    }
  });
  if (created || datesFixed) {
    saveData();
    render();
    var msg = [];
    if (created) msg.push(created + ' grading entries auto-created');
    if (datesFixed) msg.push(datesFixed + ' card dates backfilled');
    showToast('📋 ' + msg.join(', '));
  }
}

// Save to Firebase (debounced)
async function saveToFirebase() {
  if (saving) { pendingSave = true; return; }
  const now = Date.now();
  if (now - lastSaveTime < 1000) {
    pendingSave = true;
    setTimeout(() => { pendingSave = false; saveToFirebase(); }, 1000);
    return;
  }
  saving = true;
  lastSaveTime = now;
  try {
    await setDoc(DOC_REF, JSON.parse(JSON.stringify(D)));
  } catch(e) {
    console.error('Firebase save error:', e);
  }
  saving = false;
  if (pendingSave) { pendingSave = false; saveToFirebase(); }
}

// ============================================================
// CARD NAME CORRECTION SYSTEM
// ============================================================
// Builds a key from AI identification for the corrections dictionary
function scanKey(set, name, number) {
  return [set||'', name||'', (number||'').replace(/[^\d]/g,'')].join('|').toLowerCase().trim();
}

// Build formatted name from AI response, checking corrections first
function buildScannedName(cardInfo) {
  const setName = cardInfo.set || '';
  const cardName = cardInfo.name || '';
  const number = cardInfo.number || '';
  const edition = cardInfo.edition || '';
  const key = scanKey(setName, cardName, number);
  
  // Check if we have a user correction for this exact AI identification
  if (D.nameCorrections && D.nameCorrections[key]) {
    return { formatted: D.nameCorrections[key], corrected: true, _scanKey: key };
  }
  
  // Build the default formatted name
  let formatted = `${setName} ${cardName}`.trim();
  if (number) formatted += ` #${number.replace('#','').split('/')[0].trim()}`;
  if (edition && edition !== 'Unlimited' && edition !== '') formatted += ` ${edition}`;
  return { formatted, corrected: false, _scanKey: key };
}

// Save a correction if the user changed the name from what the AI identified
function saveNameCorrection(scanKeyStr, originalFormatted, finalName) {
  if (!scanKeyStr || !finalName) return;
  const trimmedFinal = finalName.trim();
  const trimmedOrig = (originalFormatted || '').trim();
  // Only save if the name actually changed
  if (trimmedFinal && trimmedFinal !== trimmedOrig) {
    if (!D.nameCorrections) D.nameCorrections = {};
    D.nameCorrections[scanKeyStr] = trimmedFinal;
    saveData();
    console.log('Name correction saved:', scanKeyStr, '→', trimmedFinal);
  }
}

function dbg(source, msg, data) {
  const ts = new Date().toLocaleTimeString();
  const entry = { ts, source, msg, data: data !== undefined ? String(data).substring(0, 200) : '' };
  debugLog.unshift(entry);
  if (debugLog.length > MAX_DEBUG) debugLog.pop();
  console.log(`[${source}] ${msg}`, data !== undefined ? data : '');
}

function nextId(prefix) {
  if (!D.nextIds) D.nextIds = { C:1,S:1,P:1,G:1,SL:1,E:1,CAP:1 };
  const n = D.nextIds[prefix] || 1;
  D.nextIds[prefix] = n + 1;
  return prefix + String(n).padStart(3,'0');
}

const num = v => { if (typeof v === 'number') return v; const n = parseFloat(String(v||'').replace(/[$,()]/g,'')); return isNaN(n)?0:n; };

// ============================================================
// METRICS
// ============================================================
function M() {
  const inv=D.inventory,sales=D.sales,exp=D.expenses,gr=D.grading;
  const active=inv.filter(c=>c.status!=='Sold');
  const tSale=sales.reduce((s,r)=>s+num(r.salePrice),0);
  const tPlatFee=sales.reduce((s,r)=>s+num(r.platformFee),0);
  const tConFee=sales.reduce((s,r)=>s+num(r.consignFee),0);
  const tShip=sales.reduce((s,r)=>s+num(r.shipCost),0);
  const tCOGS=sales.reduce((s,r)=>s+num(r.costBasis),0);
  const netRev=tSale-tPlatFee-tConFee-tShip;
  const tGrade=gr.reduce((s,r)=>s+num(r.totalCost),0);
  const gross=netRev-tCOGS-tGrade;
  const tExp=exp.reduce((s,r)=>s+num(r.amount),0);
  const net=gross-tExp;
  const gm=tSale?gross/tSale:0;
  const nm=tSale?net/tSale:0;
  const sc=sales.length;
  const avgP=sc?gross/sc:0;
  const invCost=active.reduce((s,r)=>s+num(r.costBasis)+num(r.gradingCost),0);
  const invMkt=active.reduce((s,r)=>s+num(r.marketValue),0);
  const statusCounts={};
  active.forEach(c=>{const st=c.status||'Unknown';statusCounts[st]=(statusCounts[st]||0)+1;});
  const byPlat={};
  sales.forEach(r=>{const p=r.platform||'Other';if(!byPlat[p])byPlat[p]={rev:0,prof:0,cnt:0};byPlat[p].rev+=num(r.salePrice);byPlat[p].prof+=num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);byPlat[p].cnt++;});
  const invByType={};
  active.forEach(r=>{const t=r.cardType||'Other';invByType[t]=(invByType[t]||0)+1;});
  const monthly={};
  sales.forEach(r=>{const m2=(r.date||'').slice(0,7);if(!m2)return;if(!monthly[m2])monthly[m2]={rev:0,prof:0};monthly[m2].rev+=num(r.salePrice);monthly[m2].prof+=num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);});
  const expByCat={};
  exp.forEach(r=>{const c=r.category||'Other';expByCat[c]=(expByCat[c]||0)+num(r.amount);});
  const gradData=gr.map(r=>({name:(r.cardName||'').slice(0,16),fee:num(r.totalCost),pre:num(r.preValue),post:num(r.postValue),va:num(r.postValue)-num(r.preValue)-num(r.totalCost)})).filter(r=>r.name);
  const cap=D.capital||[];
  const sett=D.settings||{};
  const totalContributions=cap.filter(r=>r.type==='Contribution').reduce((s,r)=>s+num(r.amount),0);
  const totalDraws=cap.filter(r=>r.type==='Draw').reduce((s,r)=>s+num(r.amount),0);
  const startingCash=num(sett.startingCash);
  const otherAssets=num(sett.suppliesInventory)+num(sett.equipment)+num(sett.otherAssets);
  // Auto-calculate unpaid grading fees (submissions not yet returned)
  const unpaidGrading=gr.filter(r=>!r.dateReturned).reduce((s,r)=>s+num(r.totalCost),0);
  const totalLiabilities=num(sett.accountsPayable)+unpaidGrading+num(sett.salesTaxOwed)+num(sett.creditCardBal);
  const tPurchases=D.purchases.reduce((s,r)=>s+num(r.grandTotal||num(r.qty)*num(r.unitCost)+num(r.shipping)+num(r.tax)),0);
  const paidGrading=gr.filter(r=>r.dateReturned).reduce((s,r)=>s+num(r.totalCost),0);
  // Cash = Starting Cash + Contributions - Draws + Sales Revenue - All Fees - Purchases - Expenses - All Grading Fees
  const cashBalance=startingCash+totalContributions-totalDraws+tSale-tPlatFee-tConFee-tShip-tPurchases-tExp-paidGrading-unpaidGrading;
  // For the balance sheet, Total Equity = Contributions + Retained Earnings - Draws
  // Total Assets should = Total Liabilities + Total Equity
  // We show cash, inventory, and other assets separately, but note the balance sheet
  // may not perfectly balance if purchase totals don't match inventory cost basis assignments
  const totalAssets=cashBalance+invCost+otherAssets;
  const totalEquity=startingCash+totalContributions-totalDraws+net;
  const balanceCheck=totalAssets-totalLiabilities-totalEquity;
  const totalInvested = startingCash + totalContributions + tPurchases;
  const bizROI = totalInvested ? net / totalInvested : 0;
  return {tSale,netRev,tCOGS,gross,tExp,net,gm,nm,sc,avgP,invCost,invMkt,ac:active.length,statusCounts,byPlat,invByType,monthly,expByCat,gradData,tPlatFee,tConFee,tShip,tGrade,gc:gr.length,totalContributions,totalDraws,startingCash,otherAssets,totalLiabilities,sett,totalInvested,bizROI,cashBalance,unpaidGrading,tPurchases,paidGrading,totalAssets,totalEquity,balanceCheck};
}

function renderCharts(m) {
  destroyCharts();
  const p=Object.keys(m.byPlat);
  if(p.length){charts.c1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:p,datasets:[{label:'Revenue',data:p.map(x=>m.byPlat[x].rev),backgroundColor:'#4E7CFF',borderRadius:6},{label:'Profit',data:p.map(x=>m.byPlat[x].prof),backgroundColor:'#00D68F',borderRadius:6}]},options:cOpts()});}
  const st=Object.keys(m.statusCounts);
  const sc2={Raw:'#FFBE0B',Submitted:'#A855F7',Graded:'#4E7CFF',Listed:'#06D6A0',Hold:'#7878A0',Cracked:'#FF4757',Sold:'#00D68F'};
  if(st.length){charts.c2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:st,datasets:[{data:st.map(s=>m.statusCounts[s]),backgroundColor:st.map(s=>sc2[s]||'#7878A0'),borderWidth:0}]},options:pOpts()});}
  const mo=Object.keys(m.monthly).sort();

// ============================================================
// TABLE ROW RENDERER (avoids deeply nested template literals)
// ============================================================
function renderTableRow(type, row, i, s) {
  let html = '<tr';
  // Highlight selected grading cards
  if (type === 'inventory' && window.gradingSelectMode && window.gradingSelectedCards.has(i)) {
    html += ' style="background:rgba(168,85,247,.08)"';
  }
  html += '>';
  
  // Grading checkbox column
  if (type === 'inventory' && window.gradingSelectMode) {
    const isEligible = row.status !== 'Sold' && row.status !== 'Submitted' && row.status !== 'Graded';
    const isChecked = window.gradingSelectedCards.has(i);
    if (isEligible) {
      html += '<td style="text-align:center"><input type="checkbox" ' + (isChecked ? 'checked' : '') + ' onchange="toggleGradingCard(' + i + ')" style="width:18px;height:18px;cursor:pointer;accent-color:var(--purple)"></td>';
    } else {
      html += '<td style="text-align:center"><span style="color:var(--text-faint);font-size:10px" title="' + (row.status || '') + '">—</span></td>';
    }
  }
  
  // Data columns
  s.cols.forEach(function(c) {
    const val = c.render ? c.render(row[c.k], row) : (row[c.k] || '');
    html += '<td' + (c.r ? ' class="r mono"' : '') + '>' + val + '</td>';
  });
  
  // Action column
  html += '<td class="r">';
  if (type === 'inventory') {
    html += '<select class="quick-status" onchange="quickStatus(' + i + ',this.value)" title="Quick status change"><option value="">⚡</option>';
    ['Raw','Submitted','Graded','Listed','Sold','Hold','Cracked'].forEach(function(st) {
      html += '<option value="' + st + '"' + (row.status === st ? ' disabled' : '') + '>' + st + '</option>';
    });
    html += '</select> ';
    if (row.status !== 'Sold' && (window.poketraceState.apiKey || window.ebayState.appId)) {
      html += '<button class="btn btn-sm" onclick="event.stopPropagation();refreshSinglePrice(' + i + ')" title="Refresh price" style="font-size:10px;padding:4px 6px">🔄</button> ';
    }
  }
  html += '<button class="btn btn-sm" onclick="openEdit(\'' + type + '\',' + i + ')">✏️</button> ';
  html += '<button class="btn btn-sm btn-danger" onclick="if(confirm(\'Delete?\'))delRow(\'' + type + '\',' + i + ')">🗑</button>';
  html += '</td></tr>';
  return html;
}

// TABLE RENDERER
// ============================================================
function rTable(type,m) {
  const s=SCHEMAS[type];let data=D[type];
  const addBtn=`<button class="btn btn-accent btn-sm" onclick="openAdd('${type}')">${s.addLabel}</button>`;
  const quickAddBtn=type==='inventory'?` <button class="btn btn-sm" style="background:var(--blue);color:#fff" onclick="openQuickEntry()">⚡ Quick Add</button> <button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="showGradingCompanyPicker()">📦 Submission</button>`
    :type==='sales'?` <button class="btn btn-sm" style="background:var(--blue);color:#fff" onclick="openQuickSales()">⚡ Quick Log</button> <button class="btn btn-sm" style="background:var(--green);color:#fff" onclick="openEbayCsvImport()">📥 eBay CSV</button>`
    :type==='expenses'?` <button class="btn btn-sm" style="background:var(--cyan);color:#fff" onclick="scanReceipt('expenses')">📷 Scan Receipt</button>${getReceiptCount()>0?` <button class="btn btn-sm" onclick="exportReceipts()">📦 Export Receipts</button>`:''}`
    :type==='purchases'?` <button class="btn btn-sm" style="background:var(--cyan);color:#fff" onclick="scanReceipt('purchases')">📷 Scan Receipt</button>`
    :type==='grading'?` <button class="btn btn-sm" style="background:var(--green);color:#fff" onclick="openGradeUpdate()">📥 Grade Update</button>`
    :'';
  // Apply search and sort
  const filtered = filterData(data, type);
  const sorted = sortData(filtered, s.cols);
  // Build original index map so edit/delete still work on the right record
  const idxMap = sorted.map(row => data.indexOf(row));

  const statusFilterBar = type==='inventory' ? `<div style="display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap">${
    ['','Raw','Submitted','Graded','Listed','Hold','Cracked','Sold'].map(st => {
      const isActive = window.statusFilter === st;
      const label = st || 'All';
      const count = st ? data.filter(r => r.status === st).length : data.length;
      return `<button class="btn btn-sm" style="font-size:10px;padding:4px 10px;${isActive ? 'background:var(--accent);color:#fff;border-color:var(--accent)' : ''}" onclick="window.statusFilter='${st}';render()">${label}<span style="font-size:9px;opacity:.7;margin-left:3px">${count}</span></button>`;
    }).join('')
  }</div>` : type==='grading' ? `<div style="display:flex;gap:3px;margin-bottom:10px;flex-wrap:wrap">${
    ['','PSA','CGC','BGS','Other'].map(co => {
      const isActive = window.gradingCompanyFilter === co;
      const label = co || 'All';
      const count = co ? data.filter(r => (r.company || '') === co).length : data.length;
      if (co && !count) return '';
      return `<button class="btn btn-sm" style="font-size:10px;padding:4px 10px;${isActive ? 'background:var(--accent);color:#fff;border-color:var(--accent)' : ''}" onclick="window.gradingCompanyFilter='${co}';render()">${label}<span style="font-size:9px;opacity:.7;margin-left:3px">${count}</span></button>`;
    }).filter(Boolean).join('')
  }</div>` : '';

  const hasActiveFilter = window.searchTerm || window.statusFilter || window.gradingCompanyFilter;
  const searchBar = `<div class="search-bar"><input type="text" placeholder="🔍 Search ${s.title.toLowerCase()}..." value="${window.searchTerm}" oninput="setSearch(this.value)" class="search-input">${hasActiveFilter?'<button class="btn btn-sm" onclick="clearSearch()" style="margin-left:6px">✕ Clear</button>':''}<span class="search-count">${hasActiveFilter?`${sorted.length} of ${data.length}`:''}</span></div>`;

  // Show quick entry mode if active
  if(type==='inventory' && window.quickEntryMode) return rQuickEntry(data, addBtn, quickAddBtn);
  if(type==='grading' && window.gradeUpdateState.active) return rGradeUpdate();
  if(type==='sales' && window.quickSalesMode) return rQuickSales(data, addBtn, quickAddBtn);
  if(type==='sales' && window.ebayCsvState.active) return rEbayCsvImport();

window.saveModal = async function() {
  const s=SCHEMAS[window.modal.type];
  const row=window.modal.mode==='edit'?{...window.modal.data}:{};
  s.fields.forEach(f=>{
    if(f.type==='cardpicker'){
      const el=document.getElementById('f_cardpicker');
      if(el) row.cardName=el.value;
    } else if(f.type==='pokemonsearch'){
      const hidden=document.getElementById('f_cardName');
      const search=document.getElementById('f_pokemon_search');
      if(hidden && hidden.value) row.cardName=hidden.value;
      else if(search && search.value) row.cardName=search.value;
      if(window.modal.data._pokemonImg) row._pokemonImg=window.modal.data._pokemonImg;
      if(window.modal.data._pokemonSetId) row._pokemonSetId=window.modal.data._pokemonSetId;
      if(window.modal.data._pokemonNumber) row._pokemonNumber=window.modal.data._pokemonNumber;
      if(window.modal.data._tcgdexId) row._tcgdexId=window.modal.data._tcgdexId;
    } else {
      const el=document.getElementById('f_'+f.k);
      if(el)row[f.k]=f.type==='number'?parseFloat(el.value)||0:el.value;
    }
  });
  if(s.onSave)s.onSave(row);
  // Preserve linked data not in form fields (only for sales with linked inventory cards)
  if(window.modal.type==='sales' && window.modal.data._linkedInvIdx !== undefined){
    if(window.modal.data.gradingCompany) row.gradingCompany = window.modal.data.gradingCompany;
    if(window.modal.data.grade) row.grade = window.modal.data.grade;
  }
  
  // Auto-fetch market value for inventory adds if no market value set
  // Save name correction if user edited after scanning
  if(window.modal.type==='inventory' && window.modal.data._scanKey && row.cardName) {
    saveNameCorrection(window.modal.data._scanKey, window.modal.data._originalScanName, row.cardName);
  }
  
  if(window.modal.type==='inventory' && window.modal.mode==='add' && !num(row.marketValue) && row.cardName) {
    const isRaw = !row.grade || !row.gradingCompany;
    // Prefer PokeTrace for raw cards
    if (isRaw && window.poketraceState.apiKey) {
      try {
        showToast('Fetching PokeTrace price...');
        const ptData = await poketraceSearch(row.cardName);
        const best = pokectraceBestMatch(ptData, row.cardName);
        const nmPrice = poketraceNMPrice(best);
        if (nmPrice && nmPrice.avg) {
          row.marketValue = Number(nmPrice.avg.toFixed(2));
          showToast(`Market value set: $${row.marketValue} (PokeTrace NM sold avg)`);
        }
      } catch(e) { /* continue without pricing */ }
    }
    // Fallback to eBay if still no price
    if (!num(row.marketValue) && window.ebayState.appId) {
      try {
        showToast('Fetching eBay price...');
        const query = `${row.cardName} -PSA -CGC -BGS -SGC -graded -slab`.trim();
        const results = await ebaySearch(query, 15);
        const summary = ebayPricingSummary(results);
        if (summary && summary.median) {
          row.marketValue = Number(summary.median.toFixed(2));
          showToast(`Market value set: $${row.marketValue} (eBay median)`);
        }
      } catch(e) { /* continue without pricing */ }
    }
  }
  
  if(window.modal.mode==='add'){
    row.id=nextId(s.idPrefix);D[window.modal.type].push(row);
    // Auto-update inventory card status when linked
    if(window.modal.data._linkedInvIdx !== undefined){
      const card = D.inventory[window.modal.data._linkedInvIdx];
      if(card && card.status !== 'Sold'){
        const oldStatus = card.status;
        if(window.modal.type==='grading'){
          card.status = 'Submitted';
          card.gradingCompany = row.company || card.gradingCompany || '';
          card.gradingCost = num(row.totalCost) || card.gradingCost || 0;
          showToast(`${card.cardName}: ${oldStatus} → Submitted (${card.gradingCompany})`);
        } else if(window.modal.type==='sales'){
          card.status = 'Sold';
          showToast(`${card.cardName}: ${oldStatus} → Sold`);
        }
      }
    }
    showToast(`Record added & synced`);
  }
  else{
    D[window.modal.type][window.editIdx]=row;
    // Auto-update inventory when grading entry is edited
    if(window.modal.type==='grading' && row.cardId){
      const card = D.inventory.find(c => c.id === row.cardId);
      if(card){
        // Always sync grading cost back to inventory
        card.gradingCost = num(row.totalCost);
        card.gradingCompany = row.company || card.gradingCompany || '';
        
        // If grade received and return date filled in, update status to Graded
        if(row.dateReturned && row.gradeReceived){
          if(card.status === 'Submitted' || card.status === 'Raw'){
            card.status = 'Graded';
            card.grade = row.gradeReceived;
            if(num(row.postValue)) card.marketValue = num(row.postValue);
            showToast(`${card.cardName}: → Graded (${card.grade})`);
          }
        }
      }
    }
    // Auto-mark inventory as Sold when linking a card to a sale on edit
    if(window.modal.type==='sales' && window.modal.data._linkedInvIdx !== undefined){
      const card = D.inventory[window.modal.data._linkedInvIdx];
      if(card){
        // Update card name to inventory name (replaces eBay auction title)
        if(card.cardName) row.cardName = card.cardName;
        // Copy grade info to sale record
        if(card.gradingCompany) row.gradingCompany = card.gradingCompany;
        if(card.grade) row.grade = card.grade;
        if(card.cardType) row.cardType = card.cardType;
        // Auto-fill cost basis if empty
        if(!num(row.costBasis)){
          row.costBasis = num(card.costBasis) + num(card.gradingCost);
        }
        row.cardId = card.id;
        // Mark as sold if not already
        if(card.status !== 'Sold'){
          const oldStatus = card.status;
          card.status = 'Sold';
          showToast(`${card.cardName}: ${oldStatus} → Sold`);
        }
      }
    }
    showToast('Record updated & synced');
  }
  saveData();window.modal=null;render();
};

// Refresh all inventory market values from eBay
window.refreshAllMarketValues = async function() {
  const hasPT = !!window.poketraceState.apiKey;
  const hasEB = !!window.ebayState.appId;
  if (!hasPT && !hasEB) { showToast('Set PokeTrace or eBay keys in Scanner tab first'); return; }
  
  // If a status filter is active, only refresh those cards; otherwise all unsold
  let cardsToRefresh;
  let filterLabel;
  if (window.statusFilter) {
    cardsToRefresh = D.inventory.filter(c => c.status === window.statusFilter);
    filterLabel = window.statusFilter;
  } else {
    cardsToRefresh = D.inventory.filter(c => c.status !== 'Sold');
    filterLabel = 'all unsold';
  }
  
  if (!cardsToRefresh.length) { showToast('No cards to refresh in current filter'); return; }
  if (!confirm(`Refresh market values for ${cardsToRefresh.length} cards (${filterLabel})?\n\nRaw cards: ${hasPT?'PokeTrace (sold data)':'eBay (active listings)'}\nGraded cards: ${hasEB?'eBay Browse API':'PokeTrace if available'}\n\nThis may take a minute.`)) return;
  
  let updated = 0, failed = 0;
  showToast(`Refreshing prices for ${cardsToRefresh.length} cards...`);
  
  for (let i = 0; i < cardsToRefresh.length; i++) {
    const card = cardsToRefresh[i];
    if (!card.cardName) { failed++; continue; }
    
    try {
      const hasGrade = card.grade && card.gradingCompany;
      
      if (hasGrade && hasEB) {
        // Graded card — use eBay Browse API for active listing prices
        const company = card.gradingCompany.toUpperCase();
        let gradeStr = card.grade;
        let query = '';
        
        if (company === 'CGC' && (gradeStr === '10.1' || gradeStr === '11')) {
          query = `${card.cardName} CGC Pristine 10`;
        } else {
          query = `${card.cardName} ${company} ${gradeStr}`;
        }
        
        const results = await ebaySearch(query.trim(), 15);
        const summary = ebayPricingSummary(results);
        
        if (summary && summary.median) {
          card.marketValue = Number(summary.median.toFixed(2));
          updated++;
        } else {
          failed++;
        }
      } else if (!hasGrade && hasPT) {
        // Raw card — try PokeTrace first, fall back to eBay if it fails
        let gotPrice = false;
        try {
          const ptData = await poketraceSearch(card.cardName);
          const best = pokectraceBestMatch(ptData, card.cardName);
          const nmPrice = poketraceNMPrice(best);
          if (nmPrice && nmPrice.avg) {
            card.marketValue = Number(nmPrice.avg.toFixed(2));
            updated++;
            gotPrice = true;
          }
        } catch(ptErr) {
          console.log('PokeTrace failed for', card.cardName, '— trying eBay fallback');
        }
        // Fallback to eBay if PokeTrace returned nothing or errored
        if (!gotPrice && hasEB) {
          try {
            const query = `${card.cardName} -PSA -CGC -BGS -SGC -graded -slab`;
            const results = await ebaySearch(query.trim(), 15);
            const summary = ebayPricingSummary(results);
            if (summary && summary.median) {
              card.marketValue = Number(summary.median.toFixed(2));
              updated++;
              gotPrice = true;
            }
          } catch(ebErr) { /* both failed */ }
        }
        if (!gotPrice) failed++;
      } else if (!hasGrade && hasEB) {
        // Raw card fallback to eBay if no PokeTrace
        const query = `${card.cardName} -PSA -CGC -BGS -SGC -graded -slab`;
        const results = await ebaySearch(query.trim(), 15);
        const summary = ebayPricingSummary(results);
        
        if (summary && summary.median) {
          card.marketValue = Number(summary.median.toFixed(2));
          updated++;
        } else {
          failed++;
        }
      } else if (hasGrade && hasPT) {
        // Graded card fallback to PokeTrace if no eBay (free tier won't have graded, but try)
        const ptData = await poketraceSearch(card.cardName);
        const best = pokectraceBestMatch(ptData, card.cardName);
        const nmPrice = poketraceNMPrice(best);
        if (nmPrice && nmPrice.avg) {
          card.marketValue = Number(nmPrice.avg.toFixed(2));
          updated++;
        } else {
          failed++;
        }
      } else {
        failed++;
      }
      
      // Update progress every 5 cards
      if ((i + 1) % 5 === 0) {
        showToast(`Progress: ${i + 1}/${cardsToRefresh.length} cards...`);
        render();
      }
      
      // Small delay to avoid rate limiting
      await new Promise(r => setTimeout(r, 300));
      
    } catch(e) {
      failed++;
    }
  }
  
  saveData();
  render();
  showToast(`Done! ${updated} prices updated, ${failed} couldn't be found`);
};

// Refresh price for a single inventory card
window.refreshSinglePrice = async function(idx) {
  const card = D.inventory[idx];
  if (!card || !card.cardName) { showToast('No card name'); return; }
  if (card.status === 'Sold') { showToast('Card is sold'); return; }
  
  const hasGrade = card.grade && card.gradingCompany;
  const hasPT = !!window.poketraceState.apiKey;
  const hasEB = !!window.ebayState.appId;
  
  showToast('Refreshing price for ' + card.cardName.substring(0, 30) + '...');
  dbg('Refresh', 'Single card: ' + card.cardName + (hasGrade ? ' (' + card.gradingCompany + ' ' + card.grade + ')' : ' (raw)'));
  
  try {
    let gotPrice = false;
    
    if (hasGrade && hasEB) {
      // Graded — use eBay
      const company = card.gradingCompany.toUpperCase();
      let query = '';
      if (company === 'CGC' && (card.grade === '10.1' || card.grade === '11')) {
        query = card.cardName + ' CGC Pristine 10';
      } else {
        query = card.cardName + ' ' + company + ' ' + card.grade;
      }
      const results = await ebaySearch(query.trim(), 15);
      const summary = ebayPricingSummary(results);
      if (summary && summary.median) {
        card.marketValue = Number(summary.median.toFixed(2));
        gotPrice = true;
        dbg('Refresh', 'eBay price: $' + card.marketValue);
      }
    } else if (!hasGrade && hasPT) {
      // Raw — try PokeTrace first
      try {
        const ptData = await poketraceSearch(card.cardName);
        const best = pokectraceBestMatch(ptData, card.cardName);
        const nmPrice = poketraceNMPrice(best);
        if (nmPrice && nmPrice.avg) {
          card.marketValue = Number(nmPrice.avg.toFixed(2));
          gotPrice = true;
          dbg('Refresh', 'PokeTrace price: $' + card.marketValue + ' (' + nmPrice.source + ')');
        }
      } catch(e) { dbg('Refresh', 'PokeTrace failed: ' + e.message); }
      
      // Fallback to eBay
      if (!gotPrice && hasEB) {
        const query = card.cardName + ' -PSA -CGC -BGS -SGC -graded -slab';
        const results = await ebaySearch(query.trim(), 15);
        const summary = ebayPricingSummary(results);
        if (summary && summary.median) {
          card.marketValue = Number(summary.median.toFixed(2));
          gotPrice = true;
          dbg('Refresh', 'eBay fallback price: $' + card.marketValue);
        }
      }
    } else if (!hasGrade && hasEB) {
      // Raw, no PokeTrace — eBay only
      const query = card.cardName + ' -PSA -CGC -BGS -SGC -graded -slab';
      const results = await ebaySearch(query.trim(), 15);
      const summary = ebayPricingSummary(results);
      if (summary && summary.median) {
        card.marketValue = Number(summary.median.toFixed(2));
        gotPrice = true;
        dbg('Refresh', 'eBay price: $' + card.marketValue);
      }
    } else if (hasGrade && hasPT) {
      // Graded, no eBay — try PokeTrace anyway
      const ptData = await poketraceSearch(card.cardName);
      const best = pokectraceBestMatch(ptData, card.cardName);
      const nmPrice = poketraceNMPrice(best);
      if (nmPrice && nmPrice.avg) {
        card.marketValue = Number(nmPrice.avg.toFixed(2));
        gotPrice = true;
      }
    }
    
    if (gotPrice) {
      saveData();
      render();
      showToast(card.cardName.substring(0, 25) + ': $' + card.marketValue);
    } else {
      dbg('Refresh', '⚠️ No price found for ' + card.cardName);
      showToast('No price found for ' + card.cardName.substring(0, 25));
    }
  } catch(e) {
    dbg('Refresh', 'Error: ' + e.message);
    showToast('Price refresh failed');
  }
};

// Pokemon search for Quick Add
let qePokemonTimers = {};
window.qePokemonSearch = function(rowIdx, val) {
  clearTimeout(qePokemonTimers[rowIdx]);
  const resultsEl = document.getElementById('qe-pokemon-'+rowIdx);
  if (!resultsEl) return;
  if (!val || val.length < 2) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
  qePokemonTimers[rowIdx] = setTimeout(async () => {
    try {
      let url;
      const val_lower = val.toLowerCase().trim();
      const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
      let setFilter = '', nameFilter = val;
      for (const setKw of setKeywords) {
        if (val_lower.startsWith(setKw + ' ') || val_lower === setKw) { setFilter = setKw; nameFilter = val.slice(setKw.length).trim(); break; }
      }
      let params = [];
      if (setFilter) params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
      const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
      if (remainingNumMatch) {
        if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
        params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
      } else if (nameFilter) {
        params.push(`name=like:${encodeURIComponent(nameFilter)}`);
      }
      params.push('pagination:itemsPerPage=6');
      url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
      const resp = await fetch(url);
      if (!resp.ok) return;
      const cards = await resp.json();
      if (!cards.length) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
      // Fetch details for set info
      const details = await Promise.all(cards.slice(0,6).map(async c => {
        try {
          const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`);
          if (r.ok) return await r.json();
          return c;
        } catch(e) { return c; }
      }));
      resultsEl.style.display = 'block';
      resultsEl.innerHTML = details.map((c, idx) => {
        const setName = c.set ? c.set.name : '';
        const number = c.localId || '';
        const formatted = `${setName} ${c.name||''} #${number}`.trim();
        const img = c.image ? c.image + '/low.webp' : '';
        const tp = c.pricing?.tcgplayer || {};
        const tcgPrice = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice ||
                         tp.holofoil?.marketPrice || tp['1stEditionHolofoil']?.marketPrice ||
                         tp.holo?.midPrice || tp.normal?.midPrice || tp.reverse?.midPrice || '';
        const priceTag = tcgPrice ? ` · <span style="color:var(--green)">$${Number(tcgPrice).toFixed(2)}</span>` : '';
        window._qePokemonResults = window._qePokemonResults || {};
        window._qePokemonResults[rowIdx+'_'+idx] = {formatted, img, tcgPrice, tcgdexId: c.id||''};
        return `<div class="picker-item" style="display:flex;align-items:center;gap:8px;padding:6px 10px" onclick="qeSelectPokemon(${rowIdx},'${rowIdx}_${idx}')">
          ${img?`<img src="${img}" style="width:32px;height:45px;object-fit:contain;border-radius:3px" loading="lazy">`:''}
          <div><div style="font-weight:600;font-size:12px">${formatted}</div><div style="font-size:10px;color:var(--text-dim)">${c.rarity||''}${priceTag}</div></div>
        </div>`;
      }).join('');
    } catch(e) { /* silently fail */ }
  }, 400);
};

let pokemonSearchTimer = null;
window.pokemonSearchDebounce = function(val) {
  clearTimeout(pokemonSearchTimer);
  const statusEl = document.getElementById('pokemon-search-status');
  if (!val || val.length < 3) {
    const resultsEl = document.getElementById('pokemon-search-results');
    if (resultsEl) resultsEl.innerHTML = '';
    if (statusEl) statusEl.textContent = val && val.length < 3 ? 'Type 3+ characters...' : '';
    return;
  }
  if (statusEl) statusEl.textContent = 'Searching...';
  pokemonSearchTimer = setTimeout(() => pokemonSearch(val), 600);
};

async function pokemonSearch(query) {
  const resultsEl = document.getElementById('pokemon-search-results');
  const statusEl = document.getElementById('pokemon-search-status');
  if (!resultsEl) return;
  try {
    // Smart search: detect patterns like "base set charizard", "charizard 130", "base set charizard 4"
    let url;
    const query_lower = query.toLowerCase().trim();
    
    // Pattern: "name number" (e.g. "charizard 130")
    const nameNumMatch = query.match(/^(.+?)\s+#?(\d+)$/);
    
    // Known set keyword patterns to detect set names in queries
    const setKeywords = ['base set','jungle','fossil','team rocket','gym heroes','gym challenge','neo genesis','neo discovery','neo revelation','neo destiny','legendary collection','expedition','aquapolis','skyridge','ruby','sapphire','sandstorm','dragon','magma','hidden legends','firered','leafgreen','deoxys','emerald','unseen forces','delta species','legend maker','holon phantoms','crystal guardians','dragon frontiers','power keepers','diamond','pearl','mysterious treasures','secret wonders','great encounters','majestic dawn','legends awakened','stormfront','platinum','rising rivals','supreme victors','arceus','heartgold','soulsilver','unleashed','undaunted','triumphant','black','white','emerging powers','noble victories','next destinies','dark explorers','dragons exalted','boundaries crossed','plasma storm','plasma freeze','plasma blast','legendary treasures','kalos','flashfire','furious fists','phantom forces','primal clash','roaring skies','ancient origins','breakthrough','breakpoint','fates collide','steam siege','evolutions','sun','moon','guardians rising','burning shadows','crimson invasion','ultra prism','forbidden light','celestial storm','lost thunder','team up','unbroken bonds','unified minds','cosmic eclipse','sword','shield','rebel clash','darkness ablaze','vivid voltage','battle styles','chilling reign','evolving skies','fusion strike','brilliant stars','astral radiance','lost origin','silver tempest','crown zenith','scarlet','violet','paldea evolved','obsidian flames','paradox rift','paldean fates','temporal forces','twilight masquerade','shrouded fable','stellar crown','surging sparks','prismatic evolutions','journey together','destined rivals','phantasmal','base','classic'];
    
    let setFilter = '';
    let nameFilter = query;
    
    // Check if query starts with a known set name
    for (const setKw of setKeywords) {
      if (query_lower.startsWith(setKw + ' ') || query_lower === setKw) {
        setFilter = setKw;
        nameFilter = query.slice(setKw.length).trim();
        break;
      }
    }
    
    // Build URL with filters
    let params = [];
    if (setFilter) {
      params.push(`set.name=like:${encodeURIComponent(setFilter)}`);
    }
    
    // Check if remaining nameFilter ends with a number
    const remainingNumMatch = nameFilter.match(/^(.+?)\s+#?(\d+)$/);
    if (remainingNumMatch) {
      if (remainingNumMatch[1].trim()) params.push(`name=like:${encodeURIComponent(remainingNumMatch[1].trim())}`);
      params.push(`localId=${encodeURIComponent(remainingNumMatch[2])}`);
    } else if (nameFilter) {
      params.push(`name=like:${encodeURIComponent(nameFilter)}`);
    }
    
    params.push('pagination:itemsPerPage=8');
    url = `https://api.tcgdex.net/v2/en/cards?${params.join('&')}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('API status: ' + resp.status);
    const cards = await resp.json();
    if (statusEl) statusEl.textContent = cards.length ? `${cards.length} found` : 'No results';
    if (!cards.length) {
      resultsEl.innerHTML = `<div class="pokemon-no-results">No cards found. Try a different name or set number.<br><span style="font-size:11px">You can also type the name manually and close this.</span></div>`;
      return;
    }
    // Fetch full details for each card to get set info and pricing
    const details = await Promise.all(cards.slice(0,8).map(async c => {
      try {
        const r = await fetch(`https://api.tcgdex.net/v2/en/cards/${c.id}`);
        if (r.ok) return await r.json();
        return c;
      } catch(e) { return c; }
    }));
    resultsEl.innerHTML = details.map((c, idx) => {
      const setName = c.set ? c.set.name : '';
      const number = c.localId || '';
      const formatted = `${setName} ${c.name||''} #${number}`.trim();
      const img = c.image ? c.image + '/low.webp' : '';
      const rarity = c.rarity || '';
      // Extract TCGPlayer market price - try multiple variant keys
      const tp = c.pricing?.tcgplayer || {};
      const tcgPrice = tp.holo?.marketPrice || tp.normal?.marketPrice || tp.reverse?.marketPrice || 
                       tp.holofoil?.marketPrice || tp['1stEditionHolofoil']?.marketPrice ||
                       tp.holo?.midPrice || tp.normal?.midPrice || tp.reverse?.midPrice || '';
      const priceDisplay = tcgPrice ? `<span style="color:var(--green);font-weight:600">$${Number(tcgPrice).toFixed(2)}</span>` : '<span style="color:var(--text-faint)">No price</span>';
      // Store card data for selection
      window._pokemonResults = window._pokemonResults || [];
      window._pokemonResults[idx] = {formatted, img, setName, setId: c.set?c.set.id:'', number, rarity, tcgPrice, tcgdexId: c.id||''};
      return `<div class="pokemon-result" onclick="selectPokemonCard(${idx})">
        ${img?`<img src="${img}" class="pokemon-result-img" loading="lazy">`:'<div class="pokemon-result-img" style="background:var(--bg)"></div>'}
        <div class="pokemon-result-info">
          <div class="pokemon-result-name">${formatted}</div>
          <div class="pokemon-result-meta">${setName} · #${number} · ${rarity||'Unknown'} · ${priceDisplay}</div>
        </div>
      </div>`;
    }).join('');
  } catch (err) {
    console.error('Pokemon search error:', err);
    if (statusEl) statusEl.textContent = 'Search failed';
    resultsEl.innerHTML = `<div class="pokemon-no-results">Search error: ${err.message}. Try again or type the name manually.</div>`;
  }
}

function formatPokemonName(card) {
  const setName = card.set ? card.set.name : '';
  const cardName = card.name || '';
  const number = card.localId || card.number || '';
  return `${setName} ${cardName} #${number}`.trim();
}

window.selectPokemonCard = function(idx) {
  if (!window.modal || !window._pokemonResults || !window._pokemonResults[idx]) return;
  const card = window._pokemonResults[idx];
  window.modal.data.cardName = card.formatted;
  window.modal.data._pokemonImg = card.img || window.modal.data._scanImg || '';
  window.modal.data._pokemonSet = card.setName;
  window.modal.data._pokemonSetId = card.setId;
  window.modal.data._pokemonNumber = card.number;
  window.modal.data._pokemonRarity = card.rarity;
  window.modal.data._tcgdexId = card.tcgdexId;
  // Auto-set card type to Pokemon
  window.modal.data.cardType = 'Pokemon';
  const nameEl = document.getElementById('f_cardName');
  if (nameEl) nameEl.value = card.formatted;
  const typeEl = document.getElementById('f_cardType');
  if (typeEl) typeEl.value = 'Pokemon';
  // Auto-fill market value from TCGPlayer price
  if (card.tcgPrice) {
    window.modal.data.marketValue = card.tcgPrice;
    const mvEl = document.getElementById('f_marketValue');
    if (mvEl) mvEl.value = Number(card.tcgPrice).toFixed(2);
  }
  const resultsEl = document.getElementById('pokemon-search-results');
  if (resultsEl) resultsEl.innerHTML = '';
  render();
};

window.clearPokemonSelection = function() {
  if (!window.modal) return;
  window.modal.data.cardName = '';
  window.modal.data._pokemonImg = '';
  window.modal.data._pokemonSet = '';
  window.modal.data._pokemonSetId = '';
  window.modal.data._pokemonNumber = '';
  window.modal.data._pokemonRarity = '';
  window.modal.data._scanImg = '';

  if (nameEl) nameEl.value = '';
  render();
  setTimeout(()=>{const el=document.getElementById('f_pokemon_search');if(el)el.focus();},50);
};

window.modalScanHandle = async function(event) {
  const file = event.target.files[0];
  if (!file || !window.modal) return;
  event.target.value = '';
  
  const reader = new FileReader();
  reader.onload = async function(e) {
    const base64DataUrl = e.target.result;
    window.modal.data._scanImg = base64DataUrl;
    window.modal.data._scanStatus = 'Identifying card...';
    render();
    
    try {
      const match = base64DataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
      if (!match) throw new Error('Invalid image format');
      
      // Resize image if too large (mobile photos can be huge)
      let imgData = match[2];
      let mediaType = match[1];
      if (imgData.length > 500000) {
        // Compress by resizing via canvas
        const compressed = await compressImage(base64DataUrl, 800);
        const cMatch = compressed.match(/^data:(image\/\w+);base64,(.+)$/);
        if (cMatch) { mediaType = cMatch[1]; imgData = cMatch[2]; }
      }
      
      const ss = window.scannerState;
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': ss.apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 500,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: imgData } },
              { type: 'text', text: `Identify this Pokemon trading card. Respond ONLY with a JSON object, no other text or markdown. Use this exact format:
{"name":"Card Name","set":"Set Name","number":"Card Number","edition":"1st Edition or Unlimited or Shadowless or Pre-Release or Promo or empty string if none","rarity":"Rarity","holo":true/false,"cardType":"Pokemon or Trainer or Energy"}
Important: For the number field, use ONLY the card number itself, NOT the set total. For example if the card shows 8/102, return just "8". If it shows 051/193, return just "051".

CRITICAL — Check for these edition/variant indicators very carefully:
- SHADOWLESS: Look at the RIGHT SIDE of the card art border. If there is NO drop shadow (dark vertical line) on the right edge of the art box, it is Shadowless. Also check the bottom frame — Shadowless cards have no shadow under the card border. Only applies to the original Base Set (1999).
- 1ST EDITION: Look for a circled "1" stamp with "EDITION" text, usually on the left side of the card below the art.
- PRE-RELEASE: Look for a "PRERELEASE" or "PRE-RELEASE" stamp, usually in the bottom-right corner of the card art.
- PROMO: Look for a black star symbol with "PROMO" text, usually where the set symbol would be.
- BASE SET vs BASE SET 2: Base Set 2 has a "2" inside a Pokeball as its set symbol (right side of card, below art). The original Base Set has no set symbol. Also check copyright — Base Set is 1999, Base Set 2 is 2000.
- UNLIMITED: If a Base Set card has a shadow on the right side of the art border and NO 1st Edition stamp, it is Unlimited (leave edition as empty string).

Include the variant in the edition field. If none apply, leave edition as empty string.
If not a Pokemon card: {"error":"Not a Pokemon card"}` }
            ]
          }]
        })
      });
      
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || `API error ${response.status}`);
      }
      
      const data = await response.json();
      const text = data.content?.[0]?.text || '';
      const cleaned = text.replace(/```json\s*|```/g, '').trim();
      const cardInfo = JSON.parse(cleaned);
      
      if (cardInfo.error) {
        window.modal.data._scanStatus = '❌ ' + cardInfo.error;
        render();
        return;
      }
      
      const setName = cardInfo.set || '';
      const cardName = cardInfo.name || '';
      const number = cardInfo.number || '';
      const edition = cardInfo.edition || '';
      const scanResult = buildScannedName(cardInfo);
      let formatted = scanResult.formatted;
      
      window.modal.data.cardName = formatted;
      window.modal.data.cardType = cardInfo.cardType || 'Pokemon';
      window.modal.data._pokemonRarity = cardInfo.rarity || '';
      window.modal.data._scanStatus = (scanResult.corrected ? '✅ Auto-corrected: ' : '✅ ') + formatted;
      window.modal.data._scanKey = scanResult._scanKey || '';
      window.modal.data._originalScanName = formatted;
      
      // Instead of auto-picking, trigger search dropdown so user can confirm correct card
      render();
      showToast(`Identified: ${formatted}`);
      
      // Trigger pokemon search with card name + number for user to pick correct match
      setTimeout(() => {
        const searchEl = document.getElementById('f_pokemon_search');
        if (searchEl) {
          const cleanNum = (number||'').replace(/[^\d]/g,'');
          const searchQuery = cleanNum ? `${cardName} ${cleanNum}` : cardName;
          searchEl.value = searchQuery;
          pokemonSearch(searchQuery);
        }
      }, 200);
      
    } catch(err) {
      window.modal.data._scanStatus = '❌ ' + err.message;
      render();
    }
  };
  reader.readAsDataURL(file);
};

// Image compression helper for large mobile photos
async function compressImage(dataUrl, maxWidth) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.8));
    };
    img.src = dataUrl;
  });
}
window.filterCardPicker = function(val) {
  const resultsEl = document.getElementById('card-picker-results');
  if (!resultsEl) return;
  if (!val || val.length < 1) { resultsEl.innerHTML = ''; resultsEl.style.display = 'none'; return; }
  const term = val.toLowerCase();
  const matches = D.inventory.filter(c => c.status !== 'Sold' && (
    (c.cardName||'').toLowerCase().includes(term) || (c.id||'').toLowerCase().includes(term) ||
    (c.grade||'').toLowerCase().includes(term) || (c.gradingCompany||'').toLowerCase().includes(term)
  )).slice(0, 8);
  if (!matches.length) { resultsEl.innerHTML = '<div class="picker-item" style="color:var(--text-dim)">No matching cards</div>'; resultsEl.style.display = 'block'; return; }
  resultsEl.innerHTML = matches.map((c,i) => `<div class="picker-item" onclick="selectCard(${D.inventory.indexOf(c)})"><strong>${c.id||''}</strong> — ${c.cardName||''} ${c.gradingCompany||c.grade?'<span style="color:var(--yellow);font-weight:600">'+(c.gradingCompany?c.gradingCompany+' ':'')+(c.grade||'')+'</span>':''} <span style="color:var(--text-dim);font-size:11px">${c.cardType||''} · ${c.status||''}</span></div>`).join('');
  resultsEl.style.display = 'block';
};

window.selectCard = function(idx) {
  const card = D.inventory[idx];
  const pickerInput = document.getElementById('f_cardpicker');
  const cardIdInput = document.getElementById('f_cardId');
  if (pickerInput) pickerInput.value = card.cardName || '';
  if (cardIdInput) cardIdInput.value = card.id || '';
  window.modal.data.cardName = card.cardName || '';
  window.modal.data.cardId = card.id || '';
  window.modal.data._linkedInvIdx = idx;
  const resultsEl = document.getElementById('card-picker-results');
  if (resultsEl) { resultsEl.style.display = 'none'; }

  if (window.modal.type === 'grading') {
    // Auto-fill pre-grade value from inventory cost basis
    const preVal = document.getElementById('f_preValue');
    if (preVal && !preVal.value) preVal.value = num(card.costBasis) || '';
  } else if (window.modal.type === 'sales') {
    // Auto-fill cost basis, card type, and grade from inventory
    const costEl = document.getElementById('f_costBasis');
    if (costEl && !costEl.value) costEl.value = (num(card.costBasis) + num(card.gradingCost)) || '';
    const typeEl = document.getElementById('f_cardType');
    if (typeEl && card.cardType) typeEl.value = card.cardType;
    window.modal.data.gradingCompany = card.gradingCompany || '';
    window.modal.data.grade = card.grade || '';
  }
};

// Keyboard navigation for card pickers (arrow keys + enter)
window._pickerHighlight = -1;

window.pickerKeyHandler = function(e, pickerId, selectFn) {
  const resultsEl = document.getElementById(pickerId);
  if (!resultsEl || resultsEl.style.display === 'none') {
    window._pickerHighlight = -1;
    return;
  }
  const items = resultsEl.querySelectorAll('.picker-item');
  if (!items.length) return;
  
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    window._pickerHighlight = Math.min(window._pickerHighlight + 1, items.length - 1);
    highlightPickerItem(items, window._pickerHighlight);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    window._pickerHighlight = Math.max(window._pickerHighlight - 1, 0);
    highlightPickerItem(items, window._pickerHighlight);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (window._pickerHighlight >= 0 && window._pickerHighlight < items.length) {
      items[window._pickerHighlight].click();
      window._pickerHighlight = -1;
    }
  } else if (e.key === 'Escape') {
    resultsEl.style.display = 'none';
    window._pickerHighlight = -1;
  } else {
    window._pickerHighlight = -1;
  }
};

function highlightPickerItem(items, idx) {
  items.forEach(function(el, i) {
    if (i === idx) {
      el.style.background = 'var(--accent)';
      el.style.color = '#fff';
      el.scrollIntoView({ block: 'nearest' });
    } else {
      el.style.background = '';
      el.style.color = '';
    }
  });
}

window.showGradingCompanyPicker = function() {
  // Show a small dropdown overlay to pick grading company
  const existing = document.getElementById('grading-company-picker');
  if (existing) { existing.remove(); return; }
  
  const btn = document.querySelector('[onclick="showGradingCompanyPicker()"]');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  
  const picker = document.createElement('div');
  picker.id = 'grading-company-picker';
  picker.style.cssText = 'position:fixed;z-index:9999;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);box-shadow:0 8px 24px rgba(0,0,0,.4);padding:6px;min-width:140px;top:' + (rect.bottom + 4) + 'px;left:' + rect.left + 'px;animation:fadeUp .15s ease';
  picker.innerHTML = ['PSA','CGC','Other'].map(function(co) {
    return '<div style="padding:8px 14px;cursor:pointer;border-radius:6px;font-size:13px;font-weight:600;color:var(--text);transition:background .15s" onmouseover="this.style.background=\'var(--card-hover)\'" onmouseout="this.style.background=\'transparent\'" onclick="document.getElementById(\'grading-company-picker\').remove();startGradingSelect(\'' + co + '\')">' + co + '</div>';
  }).join('');
  
  document.body.appendChild(picker);
  
  // Close on click outside
  const closeHandler = function(e) {
    if (!picker.contains(e.target) && e.target !== btn) {
      picker.remove();
      document.removeEventListener('click', closeHandler);
    }
  };
  setTimeout(function() { document.addEventListener('click', closeHandler); }, 10);
};

window.generateGradingSubmission = function() {
  const selected = Array.from(window.gradingSelectedCards).sort((a,b) => a - b);
  if (!selected.length) { showToast('No cards selected'); return; }
  
  const company = window.gradingCompanyChoice;
  const declaredVal = window.gradingDeclaredValue ? parseFloat(window.gradingDeclaredValue) : 0;
  const today = new Date().toISOString().slice(0, 10);
  
  // Build the submission list
  const lines = [];
  const cards = selected.map(idx => D.inventory[idx]).filter(Boolean);
  
  lines.push(company + ' GRADING SUBMISSION — ' + today);
  lines.push('═'.repeat(60));
  lines.push('');
  lines.push(padRight('Card Name', 35) + ' | ' + padRight('Set', 25) + ' | ' + padRight('Number', 8) + ' | ' + 'Declared Value');
  lines.push('─'.repeat(35) + ' | ' + '─'.repeat(25) + ' | ' + '─'.repeat(8) + ' | ' + '─'.repeat(14));
  
  cards.forEach(card => {
    // Parse card name: format is typically "SetName CardName #Number"
    const cardName = card.cardName || '';
    let parsedSet = '', parsedName = '', parsedNumber = '';
    
    const numMatch = cardName.match(/^(.+?)\s+#(\S+)\s*(.*)$/);
    if (numMatch) {
      const fullName = numMatch[1].trim();
      parsedNumber = numMatch[2];
      const suffix = numMatch[3] || '';
      
      // Try to split set from card name — last 1-2 words are usually the pokemon name
      const words = fullName.split(/\s+/);
      if (words.length >= 3) {
        // Heuristic: pokemon names are 1-2 words at the end
        // Try finding where the card name starts (capitalize after set pattern)
        parsedName = words.slice(-1).join(' ');
        parsedSet = words.slice(0, -1).join(' ');
      } else if (words.length === 2) {
        parsedSet = words[0];
        parsedName = words[1];
      } else {
        parsedName = fullName;
      }
      if (suffix) parsedName += ' ' + suffix;
    } else {
      parsedName = cardName;
    }
    
    const dv = declaredVal ? '$' + declaredVal.toFixed(2) : (num(card.marketValue) ? '$' + num(card.marketValue).toFixed(2) : '—');
    lines.push(padRight(parsedName || cardName, 35) + ' | ' + padRight(parsedSet, 25) + ' | ' + padRight(parsedNumber, 8) + ' | ' + dv);
  });
  
  lines.push('');
  lines.push('═'.repeat(60));
  lines.push(`Total Cards: ${cards.length}`);
  if (declaredVal) lines.push(`Blanket Declared Value: $${declaredVal.toFixed(2)} per card`);
  lines.push(`Total Declared Value: $${(declaredVal ? declaredVal * cards.length : cards.reduce((s, c) => s + num(c.marketValue), 0)).toFixed(2)}`);
  
  const submissionText = lines.join('\n');
  
  // Create grading entries and update inventory status
  let gradingCount = 0;
  selected.forEach(idx => {
    const card = D.inventory[idx];
    if (!card) return;
    
    // Update inventory card status to Submitted
    const oldStatus = card.status;
    card.status = 'Submitted';
    
    // Create grading entry linked to this inventory card
    const gradingEntry = {
      id: nextId('G'),
      cardName: card.cardName || '',
      cardId: card.id || '',
      company: company,
      serviceLevel: '',
      dateSubmitted: today,
      dateReturned: '',
      gradingFee: 0,
      shipTo: 0,
      shipBack: 0,
      totalCost: 0,
      preCondition: '',
      gradeReceived: '',
      preValue: declaredVal || num(card.marketValue) || num(card.costBasis) || 0,
      postValue: 0,
      action: 'New Grade',
      notes: 'Auto-created from PSA batch submission'
    };
    D.grading.push(gradingEntry);
    gradingCount++;
  });
  
  saveData();
  
  // Show the submission in a modal for copying
  window.gradingSelectMode = false;
  window.gradingSelectedCards = new Set();
  window.gradingDeclaredValue = '';
  
  // Use a special modal to show the copyable text
  render();
  
  // Show submission result modal after render
  setTimeout(() => {
    showGradingSubmissionModal(submissionText, gradingCount, company);
  }, 100);
};

function padRight(str, len) {
  str = String(str || '');
  if (str.length > len) return str.substring(0, len - 1) + '…';
  return str + ' '.repeat(Math.max(0, len - str.length));
}

window.setSearch = function(val) { window.searchTerm = val; render(); setTimeout(()=>{const el=document.querySelector('.search-input');if(el){el.focus();el.selectionStart=el.selectionEnd=val.length;}},0); };
window.toggleSort = function(col) {
  if (window.sortCol === col) {
    window.sortDir = window.sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    window.sortCol = col;
    window.sortDir = 'asc';
  }
  render();
};
window.clearSearch = function() { window.searchTerm = ''; window.sortCol = null; window.sortDir = 'asc'; window.statusFilter = ''; window.gradingCompanyFilter = ''; render(); };

function filterData(data, type) {
  let result = data;
  // Apply status filter for inventory
  if (type === 'inventory' && window.statusFilter) {
    result = result.filter(row => row.status === window.statusFilter);
  }
  // Apply grading company filter for grading tab
  if (type === 'grading' && window.gradingCompanyFilter) {
    result = result.filter(row => (row.company || '') === window.gradingCompanyFilter);
  }
  // Apply text search
  if (window.searchTerm) {
    const term = window.searchTerm.toLowerCase();
    result = result.filter(row => {
      return Object.values(row).some(v => String(v).toLowerCase().includes(term));
    });
  }
  return result;
}

function sortData(data, cols) {
  if (!window.sortCol) return data;
  const col = cols.find(c => c.k === window.sortCol);
  if (!col) return data;
  return [...data].sort((a, b) => {
    let va = a[col.k], vb = b[col.k];
    // For computed columns, compute the value
    if (col.sortVal) { va = col.sortVal(a); vb = col.sortVal(b); }
    else { va = num(va) || va; vb = num(vb) || vb; }
    if (typeof va === 'number' && typeof vb === 'number') {
      return window.sortDir === 'asc' ? va - vb : vb - va;
    }
    return window.sortDir === 'asc' ? String(va||'').localeCompare(String(vb||'')) : String(vb||'').localeCompare(String(va||''));
  });
}

function rAnalytics(m) {
  const sales = D.sales;
  const inv = D.inventory;

  // Top cards by profit
  const salesWithProfit = sales.map(r => {
    const profit = num(r.salePrice)-num(r.platformFee)-num(r.consignFee)-num(r.shipCost)-num(r.costBasis);
    const cost = num(r.costBasis);
    const roi = cost ? profit/cost : 0;
    return {...r, _profit: profit, _roi: roi};
  });
  const topProfit = [...salesWithProfit].sort((a,b) => b._profit - a._profit).slice(0,10);
  const topROI = [...salesWithProfit].filter(r => num(r.costBasis) > 0).sort((a,b) => b._roi - a._roi).slice(0,10);
  const worstROI = [...salesWithProfit].filter(r => num(r.costBasis) > 0).sort((a,b) => a._roi - b._roi).slice(0,10);

  // Performance by card name (group duplicates)
  const byName = {};
  salesWithProfit.forEach(r => {
    const name = (r.cardName||'').toLowerCase().trim();
    if (!name) return;
    if (!byName[name]) byName[name] = { name: r.cardName, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0 };
    byName[name].count++;
    byName[name].totalProfit += r._profit;
    byName[name].totalRevenue += num(r.salePrice);
    byName[name].totalCost += num(r.costBasis);
  });
  const namePerf = Object.values(byName).sort((a,b) => b.totalProfit - a.totalProfit);

  // Performance by card type
  const byType = {};
  salesWithProfit.forEach(r => {
    const t = r.cardType || 'Unknown';
    if (!byType[t]) byType[t] = { type: t, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0 };
    byType[t].count++;
    byType[t].totalProfit += r._profit;
    byType[t].totalRevenue += num(r.salePrice);
    byType[t].totalCost += num(r.costBasis);
  });
  const typePerf = Object.values(byType).sort((a,b) => b.totalProfit - a.totalProfit);

  // Performance by platform
  const byPlatPerf = {};
  salesWithProfit.forEach(r => {
    const p = r.platform || 'Unknown';
    if (!byPlatPerf[p]) byPlatPerf[p] = { platform: p, count: 0, totalProfit: 0, totalRevenue: 0, totalCost: 0, totalFees: 0 };
    byPlatPerf[p].count++;
    byPlatPerf[p].totalProfit += r._profit;
    byPlatPerf[p].totalRevenue += num(r.salePrice);
    byPlatPerf[p].totalCost += num(r.costBasis);
    byPlatPerf[p].totalFees += num(r.platformFee) + num(r.consignFee);
  });
  const platPerf = Object.values(byPlatPerf).sort((a,b) => b.totalProfit - a.totalProfit);

  // Unsold inventory by value (biggest opportunities)
  const unsold = inv.filter(c => c.status !== 'Sold' && num(c.marketValue) > 0).map(c => {
    const cost = num(c.costBasis) + num(c.gradingCost);
    const mv = num(c.marketValue);
    return {...c, _upside: mv - cost, _roi: cost ? (mv-cost)/cost : 0};
  }).sort((a,b) => b._upside - a._upside).slice(0,10);

  if (!sales.length && !inv.length) return '<div class="panel"><div class="empty"><div class="icon">📊</div>Add some inventory and sales data to unlock analytics.</div></div>';

  return `
    <div class="charts-grid">
      <div class="panel">
        <h3 style="color:var(--green)">🏆 Top 10 Most Profitable Sales</h3>
        ${topProfit.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Sale</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${topProfit.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.salePrice))}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono pos"><strong>${fmt(r._profit)}</strong></td><td class="r mono pos">${pct(r._roi)}</td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
      <div class="panel">
        <h3 style="color:var(--accent)">🎯 Top 10 Best ROI Sales</h3>
        ${topROI.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${topROI.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono ${r._profit>=0?'pos':'neg'}">${fmt(r._profit)}</td><td class="r mono ${r._roi>=0?'pos':'neg'}"><strong>${pct(r._roi)}</strong></td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
    </div>
    <div class="charts-grid">
      <div class="panel">
        <h3 style="color:var(--red)">📉 Worst ROI Sales (Learn From These)</h3>
        ${worstROI.length?`<table><thead><tr><th>Card</th><th>Platform</th><th class="r">Cost</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${worstROI.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${r.platform||''}</td><td class="r mono">${fmt(num(r.costBasis))}</td><td class="r mono ${r._profit>=0?'pos':'neg'}">${fmt(r._profit)}</td><td class="r mono ${r._roi>=0?'pos':'neg'}"><strong>${pct(r._roi)}</strong></td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No sales data yet</div>'}
      </div>
      <div class="panel">
        <h3 style="color:var(--cyan)">💎 Biggest Unrealized Upside (Inventory)</h3>
        ${unsold.length?`<table><thead><tr><th>Card</th><th>Status</th><th class="r">Cost</th><th class="r">Market</th><th class="r">Upside</th><th class="r">ROI</th></tr></thead><tbody>
          ${unsold.map((r,i)=>`<tr><td>${i+1}. <strong>${r.cardName||''}</strong></td><td>${badge(r.status)}</td><td class="r mono">${fmt(num(r.costBasis)+num(r.gradingCost))}</td><td class="r mono">${fmt(num(r.marketValue))}</td><td class="r mono ${r._upside>=0?'pos':'neg'}"><strong>${fmt(r._upside)}</strong></td><td class="r mono ${r._roi>=0?'pos':'neg'}">${pct(r._roi)}</td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">Add market values to inventory to see opportunities</div>'}
      </div>
    </div>
    <div class="charts-grid">
      ${typePerf.length?`<div class="panel">
        <h3 style="color:var(--purple)">🃏 Performance by Card Type</h3>
        <table><thead><tr><th>Type</th><th class="r">Sold</th><th class="r">Revenue</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${typePerf.map(r=>`<tr><td><strong>${r.type}</strong></td><td class="r mono">${r.count}</td><td class="r mono">${fmt(r.totalRevenue)}</td><td class="r mono ${r.totalProfit>=0?'pos':'neg'}"><strong>${fmt(r.totalProfit)}</strong></td><td class="r mono ${r.totalCost?(r.totalProfit/r.totalCost>=0?'pos':'neg'):''}">${r.totalCost?pct(r.totalProfit/r.totalCost):'—'}</td></tr>`).join('')}
        </tbody></table>
      </div>`:''}
      ${platPerf.length?`<div class="panel">
        <h3 style="color:var(--yellow)">🏪 Performance by Platform</h3>
        <table><thead><tr><th>Platform</th><th class="r">Sold</th><th class="r">Revenue</th><th class="r">Fees</th><th class="r">Profit</th><th class="r">ROI</th></tr></thead><tbody>
          ${platPerf.map(r=>`<tr><td><strong>${r.platform}</strong></td><td class="r mono">${r.count}</td><td class="r mono">${fmt(r.totalRevenue)}</td><td class="r mono neg">${fmt(r.totalFees)}</td><td class="r mono ${r.totalProfit>=0?'pos':'neg'}"><strong>${fmt(r.totalProfit)}</strong></td><td class="r mono ${r.totalCost?(r.totalProfit/r.totalCost>=0?'pos':'neg'):''}">${r.totalCost?pct(r.totalProfit/r.totalCost):'—'}</td></tr>`).join('')}
        </tbody></table>
      </div>`:''}
    </div>`;
}

            const roi = totalCost > 0 ? (profit / totalCost) * 100 : 0;
            const isProfit = profit >= 0;
            return `<tr>
              <td style="padding:6px 8px;border-bottom:1px solid var(--border)"><strong>${c.cardName}</strong></td>
